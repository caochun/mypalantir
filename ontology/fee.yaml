version: "1.0"
namespace: "com.fee.ontology"

data_sources:
  - id: local_h2
    type: h2
    host: file
    port: 0
    database: mypalantir
    username: sa
    password: ""
    jdbc_url: jdbc:h2:file:./data/h2/mypalantir;AUTO_SERVER=TRUE
    properties:
      AUTO_SERVER: true
      DB_CLOSE_DELAY: -1

object_types:

  - name: TollStation
    display_name: 收费站
    description: "高速公路收费站"
    properties:
      - name: station_id
        display_name: 收费站编号
        data_type: string
        required: true
      - name: name
        display_name: 收费站名称
        data_type: string
      - name: type
        display_name: 站点类型
        data_type: int
        description: "1=省界站, 2=非省界站"
      - name: toll_plaza_count
        display_name: 收费广场数
        data_type: int
      - name: use_status
        display_name: 使用状态
        data_type: int
        description: "2=在用, 3=停用"
      - name: real_type
        display_name: 实际类型
        data_type: int
      - name: region_name
        display_name: 区域名称
        data_type: string
      - name: country_name
        display_name: 县市名称
        data_type: string
      - name: regionalism_code
        display_name: 行政区划代码
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_TOLL_STATION
      id_column: STATIONID
      field_mapping:
        station_id: STATIONID
        name: NAME
        type: TYPE
        toll_plaza_count: TOLLPLAZACOUNT
        use_status: USESTATUS
        real_type: REALTYPE
        region_name: REGIONNAME
        country_name: COUNTRYNAME
        regionalism_code: REGIONALISMCODE

  - name: TollUnit
    display_name: 收费单元
    description: "路段上相邻两个节点之间的收费区间"
    properties:
      - name: toll_interval_id
        display_name: 收费单元编号
        data_type: string
        required: true
      - name: toll_interval_name
        display_name: 收费单元名称
        data_type: string
      - name: province_id
        display_name: 省份编号
        data_type: string
      - name: toll_road_id
        display_name: 路线编号
        data_type: string
      - name: rate_code
        display_name: 费率代码
        data_type: string
      - name: section_id
        display_name: 路段编号
        data_type: string
      - name: start_org_id
        display_name: 起始节点ID
        data_type: string
      - name: start_org_type
        display_name: 起始节点类型
        data_type: int
        description: "1=收费站, 2=枢纽, 3=虚拟节点"
      - name: end_org_id
        display_name: 终止节点ID
        data_type: string
      - name: end_org_type
        display_name: 终止节点类型
        data_type: int
      - name: start_org_name
        display_name: 起始节点名称
        data_type: string
      - name: end_org_name
        display_name: 终止节点名称
        data_type: string
      - name: actual_length
        display_name: 实际里程(米)
        data_type: string
      - name: charge_length
        display_name: 计费里程(米)
        data_type: string
      - name: direction
        display_name: 方向
        data_type: int
        description: "1=上行, 2=下行"
      - name: province_type
        display_name: 省界类型
        data_type: int
        description: "0=非省界, 1=省界"
      - name: opposite_id
        display_name: 对向收费单元ID
        data_type: string
      - name: gantry_id
        display_name: 门架编号
        data_type: string
      - name: gantry_name
        display_name: 门架名称
        data_type: string
      - name: toll_flag
        display_name: 收费标志
        data_type: int
        description: "0=正常收费, 1=虚拟单元(不收费)"
      - name: road_type
        display_name: 路段类型
        data_type: string
      - name: version
        display_name: 版本号
        data_type: string
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_TOLL_UNIT
      id_column: TOLLINTERVALID
      field_mapping:
        toll_interval_id: TOLLINTERVALID
        toll_interval_name: TOLLINTERVALNAME
        province_id: PROVINCEID
        toll_road_id: TOLLROADID
        rate_code: RATECODE
        section_id: SECTIONID
        start_org_id: STARTORGID
        start_org_type: STARTORGTYPE
        end_org_id: ENDORGID
        end_org_type: ENDORGTYPE
        start_org_name: STARTORGNAME
        end_org_name: ENDORGNAME
        actual_length: ACTUALLENGTH
        charge_length: CHARGELENGTH
        direction: DIRECTION
        province_type: PROVINCETYPE
        opposite_id: OPPOSITEID
        gantry_id: GANTRYID
        gantry_name: GANTRYNAME
        toll_flag: TOLLFLAG
        road_type: ROADTYPE
        version: VERSION
        lastver: LASTVER

  - name: BaseRate
    display_name: 基础费率
    description: "按费率代码和车型定义的基础收费费率"
    properties:
      - name: province_id
        display_name: 省份编号
        data_type: string
      - name: rate_code
        display_name: 费率代码
        data_type: string
        required: true
      - name: rate_type
        display_name: 费率类型
        data_type: int
      - name: rate_desc
        display_name: 费率描述
        data_type: string
      - name: vc
        display_name: 车型代码
        data_type: int
        required: true
      - name: vc_rate
        display_name: 费率值
        data_type: string
        description: "rateCode<50时为元/米, >=50时为固定金额(元)"
      - name: version
        display_name: 版本号
        data_type: string
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_BASE_RATE
      id_column: ID
      field_mapping:
        province_id: PROVINCEID
        rate_code: RATECODE
        rate_type: RATETYPE
        rate_desc: RATEDESC
        vc: VC
        vc_rate: VCRATE
        version: VERSION
        lastver: LASTVER

  - name: SpecialTimeDiscount
    display_name: 特殊时段优惠
    description: "特殊时段的通行费优惠政策"
    properties:
      - name: toll_interval_id
        display_name: 收费单元编号
        data_type: string
      - name: start_date
        display_name: 开始日期
        data_type: string
      - name: end_date
        display_name: 结束日期
        data_type: string
      - name: start_hour
        display_name: 开始小时
        data_type: int
      - name: end_hour
        display_name: 结束小时
        data_type: int
      - name: vehicle_type
        display_name: 车型
        data_type: string
      - name: cpc_discount
        display_name: CPC优惠(千分比)
        data_type: int
        description: "千分比偏移量, 如150表示85折"
      - name: etc_discount
        display_name: ETC优惠(千分比)
        data_type: int
      - name: flag
        display_name: 标志
        data_type: int
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_SPECIAL_TIME_DISCOUNT
      id_column: ID
      field_mapping:
        toll_interval_id: TOLLINTERVALID
        start_date: STARTDATE
        end_date: ENDDATE
        start_hour: STARTHOUR
        end_hour: ENDHOUR
        vehicle_type: VEHILCETYPE
        cpc_discount: CPCDISCOUNT
        etc_discount: ETCDISCOUNT
        flag: FLAG
        lastver: LASTVER

  - name: NoContiguityRule
    display_name: 不可达规则
    description: "定义路网中不可达、强制可达或跨省强制边"
    properties:
      - name: en_road_node_id
        display_name: 入路节点ID
        data_type: string
      - name: en_road_node_type
        display_name: 入路节点类型
        data_type: int
      - name: ex_road_node_id
        display_name: 出路节点ID
        data_type: string
      - name: ex_road_node_type
        display_name: 出路节点类型
        data_type: int
      - name: contiguity_type
        display_name: 可达性类型
        data_type: int
        description: "1=不可达, 2=强制可达, 3=跨省强制边"
      - name: version
        display_name: 版本号
        data_type: string
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_NO_CONTIGUITY_RULE
      id_column: ID
      field_mapping:
        en_road_node_id: ENROADNODEID
        en_road_node_type: ENROADNODETYPE
        ex_road_node_id: EXROADNODEID
        ex_road_node_type: EXROADNODETYPE
        contiguity_type: CONTIGUITYTYPE
        version: VERSION
        lastver: LASTVER

  - name: Contiguity
    display_name: 路网有向边
    description: "E1-E6管道产出, 表示路网中节点间的有向连通关系"
    properties:
      - name: en_road_node_id
        display_name: 入路节点ID
        data_type: string
      - name: en_road_node_type
        display_name: 入路节点类型
        data_type: int
      - name: ex_road_node_id
        display_name: 出路节点ID
        data_type: string
      - name: ex_road_node_type
        display_name: 出路节点类型
        data_type: int
      - name: miles
        display_name: 实际里程(米)
        data_type: int
      - name: charge_miles
        display_name: 计费里程(米)
        data_type: int
      - name: invalid
        display_name: 是否无效
        data_type: boolean
      - name: rule_id
        display_name: 规则ID
        data_type: string
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_CONTIGUITY
      id_column: ID
      field_mapping:
        en_road_node_id: EN_ROAD_NODE_ID
        en_road_node_type: EN_ROAD_NODE_TYPE
        ex_road_node_id: EX_ROAD_NODE_ID
        ex_road_node_type: EX_ROAD_NODE_TYPE
        miles: MILES
        charge_miles: CHARGE_MILES
        invalid: INVALID
        rule_id: RULE_ID
        lastver: LASTVER

  - name: ProvinceRateParam
    display_name: 省级计费参数
    description: "R1-R3管道产出, 每个(收费单元,车型)的计费参数"
    properties:
      - name: toll_interval_id
        display_name: 收费单元编号
        data_type: string
      - name: vehicle_type
        display_name: 车型代码
        data_type: int
      - name: fee
        display_name: 基础费额(分)
        data_type: int
      - name: mfee
        display_name: MTC费额(分)
        data_type: int
      - name: efee
        display_name: ETC费额(分)
        data_type: int
      - name: rate_source
        display_name: 费率来源
        data_type: string
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_PROVINCE_RATE_PARAM
      id_column: ID
      field_mapping:
        toll_interval_id: TOLL_INTERVAL_ID
        vehicle_type: VEHICLE_TYPE
        fee: FEE
        mfee: MFEE
        efee: EFEE
        rate_source: RATE_SOURCE
        lastver: LASTVER

  - name: MinimumFeePath
    display_name: 最小费额路径
    description: "Dijkstra产出, 入口站到出口站的最小费额路径"
    properties:
      - name: en_station_id
        display_name: 入口站编号
        data_type: string
      - name: ex_station_id
        display_name: 出口站编号
        data_type: string
      - name: vehicle_type
        display_name: 车型代码
        data_type: int
      - name: toll_intervals_group
        display_name: 收费单元序列
        data_type: string
      - name: chargefee_group
        display_name: MTC费额序列
        data_type: string
      - name: chargefee95_group
        display_name: ETC费额序列
        data_type: string
      - name: total_fee
        display_name: MTC总费额(分)
        data_type: int
      - name: total_fee95
        display_name: ETC总费额(分)
        data_type: int
      - name: total_mileage
        display_name: 总里程(米)
        data_type: int
      - name: validation_failed
        display_name: 验证是否失败
        data_type: boolean
      - name: lastver
        display_name: 最新版本
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_MINIMUM_FEE_PATH
      id_column: ID
      field_mapping:
        en_station_id: EN_STATION_ID
        ex_station_id: EX_STATION_ID
        vehicle_type: VEHICLE_TYPE
        toll_intervals_group: TOLL_INTERVALS_GROUP
        chargefee_group: CHARGEFEE_GROUP
        chargefee95_group: CHARGEFEE95_GROUP
        total_fee: TOTAL_FEE
        total_fee95: TOTAL_FEE95
        total_mileage: TOTAL_MILEAGE
        validation_failed: VALIDATION_FAILED
        lastver: LASTVER

  - name: ValidationError
    display_name: 验证错误
    description: "V1-V5产出, 路径验证发现的错误"
    properties:
      - name: path_id
        display_name: 路径ID
        data_type: int
      - name: rule_id
        display_name: 规则ID
        data_type: string
      - name: message
        display_name: 错误信息
        data_type: string
    data_source:
      connection_id: local_h2
      table: FEE_VALIDATION_ERROR
      id_column: ID
      field_mapping:
        path_id: PATH_ID
        rule_id: RULE_ID
        message: MESSAGE

link_types:

  - name: unit_has_rate_params
    display_name: 收费单元的计费参数
    description: "收费单元关联其计费参数"
    source_type: TollUnit
    target_type: ProvinceRateParam
    cardinality: one-to-many
    direction: directed
    data_source:
      connection_id: local_h2
      table: FEE_PROVINCE_RATE_PARAM
      source_id_column: TOLL_INTERVAL_ID
      target_id_column: ID
      link_mode: foreign_key
      field_mapping: {}

  - name: unit_has_base_rate
    display_name: 收费单元关联基础费率
    description: "通过rateCode关联"
    source_type: TollUnit
    target_type: BaseRate
    cardinality: many-to-one
    direction: directed
    data_source:
      connection_id: local_h2
      table: FEE_TOLL_UNIT
      source_id_column: RATECODE
      target_id_column: RATECODE
      link_mode: foreign_key
      field_mapping: {}

  - name: unit_has_discounts
    display_name: 收费单元的优惠政策
    description: "收费单元关联特殊时段优惠"
    source_type: TollUnit
    target_type: SpecialTimeDiscount
    cardinality: one-to-many
    direction: directed
    data_source:
      connection_id: local_h2
      table: FEE_SPECIAL_TIME_DISCOUNT
      source_id_column: TOLLINTERVALID
      target_id_column: ID
      link_mode: foreign_key
      field_mapping: {}

  - name: path_has_errors
    display_name: 路径的验证错误
    description: "最小费额路径关联其验证错误"
    source_type: MinimumFeePath
    target_type: ValidationError
    cardinality: one-to-many
    direction: directed
    data_source:
      connection_id: local_h2
      table: FEE_VALIDATION_ERROR
      source_id_column: PATH_ID
      target_id_column: ID
      link_mode: foreign_key
      field_mapping: {}

functions:

  - name: build_graph
    display_name: 路网生成
    description: "执行E1-E6规则, 从收费站/收费单元/不可达规则生成路网有向边"
    implementation: builtin
    input:
      - name: version_id
        type: string
        description: "版本标识"
    output:
      type: object
      description: "包含edges_created和edges_invalidated"

  - name: compute_fees
    display_name: 计费参数生成
    description: "执行R1-R3规则, 为每个(收费单元,车型)计算fee/mfee/efee"
    implementation: builtin
    input:
      - name: vehicle_types
        type: string
        description: "车型列表(逗号分隔), 如: 1,2,3,4,11,12,13,14,15,16"
    output:
      type: object

  - name: find_path
    display_name: 最小费额路径
    description: "Dijkstra搜索入口站到出口站的最小费额路径"
    implementation: builtin
    input:
      - name: en_station_id
        type: string
        description: "入口站编号"
      - name: ex_station_id
        type: string
        description: "出口站编号"
      - name: vehicle_type
        type: integer
        description: "车型代码"
    output:
      type: object

  - name: validate_path
    display_name: 路径验证
    description: "V1-V5规则验证路径数据"
    implementation: builtin
    input:
      - name: path_id
        type: string
        description: "路径记录ID"
    output:
      type: object
