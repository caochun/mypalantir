- file: S1_交通运输综合应急预案等5项2026附件.md
  summary: 本预案是交通运输部的综合应急预案，旨在规范应对自然灾害、事故灾难等突发事件的预防预警、组织指挥、应急响应及后期处置工作。
  chunks: 304
- file: S3_无人驾驶航空器飞行管理暂行条例.md
  summary: 本条例是规范无人驾驶航空器飞行及相关活动的法规，涵盖了分类管理、适航许可、操控员资质、空域划设、飞行申请、行为规范及监督管理等核心内容。
  chunks: 8
- file: S4_民用无人驾驶航空器运行安全管理规则_CCAR-92.md
  summary: 本规程是关于民用无人驾驶航空器运行安全管理的法规，主要规定了运行分类、操控员执照与等级管理、飞行经历及检查等核心内容。
  chunks: 213
- file: 公路交通应急处置技术规范.md
  summary: 本行业标准规定了公路交通突发事件在应急侦测、指挥调度、抢通（路基路面、桥涵、隧道）、事故处理及应急保障等方面的工作要求与技术规范。
  chunks: 97
- file: 公路交通应急抢通技术规程.md
  summary: 本规程是公路交通行业技术规程，规定了公路交通突发事件后的应急检查、应急决策、基础设施（路基路面、桥涵、隧道）抢通及装备物资保障的具体要求与流程。
  chunks: 96
