objects:
- name: DefenseResponseLevel
  summary: 防御响应等级标准，定义一级至四级防御响应的启动条件（如台风中心风力、预警颜色等）
  source: S1_交通运输综合应急预案等5项2026附件.md > 9 附件
  reasoning: 条件3：Agent需要查询该表来判断当前预警应启动哪级防御响应，是查表才能得到的判断标准。
- name: EmergencyEventLevel
  summary: 突发事件分级标准，定义特别重大、重大、较大、一般四级事件的分级依据
  source: S1_交通运输综合应急预案等5项2026附件.md > 1.4 事件分级
  reasoning: 条件3：Agent需要查询该标准来判断事件等级，从而决定响应级别。
- name: RoadSegment
  summary: 公路路段，包含桩号、等级、管理单位等信息，是公路交通应急的基本单元
  source: 公路交通应急处置技术规范.md > 4.7 事故现场侦测
  reasoning: 条件1：有多条实例记录，Agent需按桩号、路段编号等条件查询。条件2：与桥梁、隧道、灾害事件等关联。
- name: Bridge
  summary: 桥梁设施，包含桥型、跨径、技术状况等信息
  source: 公路交通应急处置技术规范.md > 4.5 桥涵现场应急侦测
  reasoning: 条件1：有多条实例记录，Agent需按桥涵ID查询。条件2：与路段、灾害事件、抢通方案关联。
- name: Tunnel
  summary: 隧道设施，包含长度、结构类型、重要等级等信息
  source: 公路交通应急处置技术规范.md > 4.6 隧道现场应急侦测
  reasoning: 条件1：有多条实例记录，Agent需按隧道ID查询。条件2：与路段、灾害事件、抢通方案关联。
- name: DisasterEvent
  summary: 自然灾害事件，如台风、暴雨、地震、滑坡、泥石流等，包含类型、等级、影响范围等
  source: S1_交通运输综合应急预案等5项2026附件.md > 4.4 分类处置
  reasoning: 条件1：有多条实例记录，Agent需按类型、时间、区域查询。条件2：与防御响应、应急响应、设施检查等关联。
- name: AccidentEvent
  summary: 交通事故事件，包含事故类型、形态、严重程度、涉事车辆等信息
  source: 公路交通应急处置技术规范.md > 4.7 事故现场侦测
  reasoning: 条件1：有多条实例记录，Agent需按位置、类型查询。条件2：与路段、交通管制、清障资源关联。
- name: EmergencyDepot
  summary: 应急物资储备点，包含位置、储备物资清单、联系人等信息
  source: 公路交通应急处置技术规范.md > 10 应急保障
  reasoning: 条件1：有多条实例记录，Agent需按区域查询最近的储备点。条件2：与资源调度、抢通方案关联。
- name: RescueTeam
  summary: 应急救援队伍，包含队伍类型、人数、位置、专业能力等信息
  source: 公路交通应急处置技术规范.md > 5.5 资源调度
  reasoning: 条件1：有多条实例记录，Agent需按区域、专业查询。条件2：与应急调度、抢通方案关联。
- name: EquipmentStock
  summary: 应急装备库存，记录储备点内各类装备（如挖掘机、发电机）的数量、状态
  source: 公路交通应急处置技术规范.md > 10.2 装备保障
  reasoning: 条件1：有多条实例记录，Agent需按储备点、装备类型查询。条件2：与储备点关联，用于资源调度决策。
- name: MaterialStock
  summary: 应急物资库存，记录储备点内各类物资（如沙袋、融雪剂）的数量、状态
  source: 公路交通应急处置技术规范.md > 10.3 物资保障
  reasoning: 条件1：有多条实例记录，Agent需按储备点、物资类型查询。条件2：与储备点关联，用于资源调度决策。
- name: DamageGradeStandard
  summary: 损伤分级标准，定义路基路面、桥涵、隧道等设施的损伤等级（I/II/III级）及对应的通行建议
  source: 公路交通应急抢通技术规程.md > 6.2.4, 7.2.3, 8.2.4
  reasoning: 条件3：Agent需要查询该标准来评估设施损伤等级，并据此给出通行建议（观察/限制/禁止）。
- name: TrafficControlRule
  summary: 交通管制措施规则，根据损伤等级或事件类型确定管制措施（限速、限载、封闭等）
  source: 公路交通应急处置技术规范.md > 6.3 交通管制措施
  reasoning: 条件3：Agent需要查询该规则来制定具体的交通管制方案。
- name: ClearanceTechniqueRule
  summary: 抢通技术选用规则，根据设施类型、灾损类型、规模等推荐适用的抢通技术
  source: 公路交通应急抢通技术规程.md > 6.3, 7.3, 8.3
  reasoning: 条件3：Agent需要查询该规则来推荐具体的抢通技术方案（如回填、便桥、制式路面等）。
- name: Drone
  summary: 无人机，包含型号、性能参数、登记信息、所属单位等
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第二章
  reasoning: 条件1：有多条实例记录，Agent需按drone_id查询。条件2：与操控员、飞行任务、空域等关联。
- name: DroneOperator
  summary: 无人机操控员，包含执照信息、资质等级、培训记录等
  source: S4_民用无人驾驶航空器运行安全管理规则_CCAR-92.md > B章
  reasoning: 条件1：有多条实例记录，Agent需按operator_id查询。条件2：与无人机、飞行任务关联。
- name: AirspaceZone
  summary: 空域区划，包含管制空域、适飞空域的范围、使用时间、审批要求等
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第三章
  reasoning: 条件1：有多条实例记录，Agent需按位置查询空域类型。条件2：与飞行申请、无人机任务关联。
- name: FlightApproval
  summary: 飞行审批记录，包含申请单位、飞行时间、空域、审批结果等
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第三章
  reasoning: 条件1：有多条实例记录，Agent需按时间、单位查询。条件2：与无人机、空域、任务关联。
- name: WeatherWarning
  summary: 气象预警信息，包含预警类型、级别、影响区域、时间等
  source: S1_交通运输综合应急预案等5项2026附件.md > 3.1 预警接收
  reasoning: 条件1：有多条实例记录，Agent需按区域、时间查询。条件2：与防御响应、应急响应关联。
- name: EventReport
  summary: 灾情信息报告，包含首报、续报、终报，记录事件基本信息、处置进展等
  source: S1_交通运输综合应急预案等5项2026附件.md > 4.2 信息报告与处理
  reasoning: 条件1：有多条实例记录，Agent需按事件、时间查询。条件2：与事件、响应、资源调度关联。
maybe_attributes:
- name: DefenseResponseAction
  reason: 防御响应措施（如召开视频会议、调度频次等）是响应等级的具体行动，通常作为DefenseResponseLevel的属性或函数hint，不需要独立查询。
  suggested_parent: DefenseResponseLevel
- name: EmergencyResponseAction
  reason: 应急响应措施（如成立领导小组、调度会议等）是响应等级的具体行动，通常作为EmergencyEventLevel的属性或函数hint。
  suggested_parent: EmergencyEventLevel
- name: BridgeType
  reason: 桥梁类型（如梁桥、拱桥）是Bridge的一个字段，不需要独立对象。
  suggested_parent: Bridge
- name: TunnelImportanceLevel
  reason: 隧道重要等级是Tunnel的一个属性，由道路等级和交通量决定，但本身不需要独立查询。
  suggested_parent: Tunnel
- name: DroneClass
  reason: 无人机分类（微型、轻型等）是Drone的一个字段，分类标准可嵌入规则或作为枚举。
  suggested_parent: Drone
- name: OperatorLicenseType
  reason: 操控员执照类型（小型、中型等）是DroneOperator的一个字段，不需要独立对象。
  suggested_parent: DroneOperator
