objects:
- name: DroneCompany
  category: entity
  summary: 从事民用无人驾驶航空器飞行活动的单位，需持有运营合格证，具备安全运营所需的管理机构、人员、设施和制度。
  source: S3第11条；S4相关条款
  reasoning: A类实体，飞行活动的组织主体，有别于个人操控员，需独立存储和查询其资质、证件等信息。
- name: DefenseResponseRule
  category: rule
  summary: 防御响应启动条件规则，包括台风和其他极端天气，定义预警级别、风力/海况等参数与四级防御响应的对应关系。
  source: S1附件：部防御响应启动条件
  reasoning: B类规则，明确的‘条件→级别’映射表，Agent需根据预警信息查表决定防御响应等级，不应硬编码。
- name: DisposalResponsibilityRule
  category: rule
  summary: 分类处置职责规则，定义不同突发事件类型（如大震、涉外、公共卫生等）对应的部内牵头司局和配合单位。
  source: S1 4.4 分类处置
  reasoning: B类规则，事件类型到处置职责的映射，Agent在处理事件时需查询该表以确定责任主体。
- name: InsuranceRule
  category: rule
  summary: 无人机责任保险要求规则，明确使用小型/中型/大型无人机进行经营性飞行需投保责任保险。
  source: S3第12条
  reasoning: B类规则，基于无人机类别和飞行性质的投保条件，合规检查时需要查表，而非硬编码。
- name: AirworthinessRule
  category: rule
  summary: 适航许可要求规则，定义中型/大型无人机需要适航许可，微型/轻型/小型无需。
  source: S3第8条
  reasoning: B类规则，类别→适航要求的映射，后续适航管理流程的启动条件。
- name: OperationCertificateRule
  category: rule
  summary: 运营合格证要求规则，规定使用除微型外的无人机从事飞行活动的单位需取得运营合格证，及申请条件和豁免情形。
  source: S3第11条
  reasoning: B类规则，明确哪些情况需要运营合格证，Agent在审核或指导时需查询此规则。
- name: RealNameRegistrationRule
  category: rule
  summary: 实名登记规则，要求民用无人驾驶航空器所有者进行实名登记，并规定了登记信息和有效期。
  source: S3第10条；S4第92.201-92.214条
  reasoning: B类规则，登记工作的依据，Agent需依此判断登记是否合规。
- name: NationalityRegistrationRule
  category: rule
  summary: 国籍登记规则，规定从事境外飞行的无人机需完成国籍登记，并明确登记条件和程序。
  source: S4第92.201、92.215-92.233条
  reasoning: B类规则，境外飞行的必要条件，Agent处理跨境飞行任务时需验证。
- name: LicenseRenewalRule
  category: rule
  summary: 操控员执照更新规则，规定执照6年有效期，教员等级36月有效期，以及更新、过期重新办理的条件。
  source: S4第92.61-92.67条
  reasoning: B类规则，执照生命周期管理的规则，Agent需根据此规则提醒或处理执照更新。
- name: DroneRealNameRegistration
  category: process
  summary: 无人机实名登记记录，包含所有人、联系方式、无人机信息、用途等，由所有人在综合管理平台完成。
  source: S4第92.205-92.213条
  reasoning: C类过程，每一次实名登记都需独立记录，用于追溯和合规检查。
- name: DroneNationalityRegistration
  category: process
  summary: 无人机国籍登记记录，包括国籍标志、登记标志、有效期等，针对境外飞行无人机。
  source: S4第92.215-92.233条
  reasoning: C类过程，境外飞行必需的程序记录，具有独立生命周期。
- name: OperationCertificate
  category: process
  summary: 运营合格证，颁发给符合安全运营条件的无人机飞行单位，有效期由局方规定。
  source: S3第11条；S4相关条款
  reasoning: C类过程，单位从事飞行活动的许可证明，需要独立记录和管理其颁发、更新和吊销。
- name: PilotLicense
  category: process
  summary: 操控员执照，颁发给通过考核的小型/中型/大型无人机操控员，含类别、级别、型别、超视距等签注。
  source: S4 B章，第92.51-92.101条
  reasoning: C类过程，操控员资质的证明，有明确的有效期、更新和等级要求，需独立管理。
- name: FlightLog
  category: process
  summary: 飞行经历记录，操控员每次飞行的训练时间、航空经历等，用于执照申请、更新和检查。
  source: S4第92.69条
  reasoning: C类过程，操控员全生命周期的飞行数据，是执照管理的必要支撑。
- name: TypeCertificate
  category: process
  summary: 型号合格证，民用无人驾驶航空器系统的设计批准证件，证明设计符合适航标准。
  source: S4 D章第二节，第92.321-92.361条
  reasoning: C类过程，型号设计批准的法定记录，作为后续生产和适航批准的基础。
- name: ProductionCertificate
  category: process
  summary: 生产许可证，准许持证人按经批准的质量系统生产民用无人驾驶航空器系统。
  source: S4 D章第三节，第92.383-92.403条
  reasoning: C类过程，生产许可的正式记录，需独立管理。
- name: AirworthinessCertificate
  category: process
  summary: 适航证（标准/特殊/特许/出口），证明单架无人机符合适航要求，可安全飞行。
  source: S4 D章第四节，第92.453-92.481条
  reasoning: C类过程，每架无人机的运行凭证，类型不同限制条件各异，需独立查询和管理。
- name: FaultReport
  category: process
  summary: 故障、失效和缺陷报告，设计/生产证持有人向局方报告的无人机系统不安全状况。
  source: S4第92.311条
  reasoning: C类过程，持续适航管理的关键记录，Agent需收集和分析以支持安全决策。
- name: EmergencyDrill
  category: process
  summary: 应急演练记录，包括演练时间、内容、评估和改进，用于检验和提升应急能力。
  source: S1 7.2；S4第39条；公路水运预案6.2
  reasoning: C类过程，应急准备的重要组成部分，需记录演练情况，为预案修订提供依据。
maybe_attributes:
- name: 防御响应等级
  reason: 防御响应是应对预警所采取的措施状态，可作为DefenseResponse记录的属性，但启动条件需独立为规则对象。
  suggested_parent: DefenseResponse
- name: 无人机运营合格证
  reason: 运营合格证可作为DroneCompany实体的一个属性（证件号、有效期），但证件本身有独立颁发和管理流程，故建议独立为OperationCertificate过程对象。
  suggested_parent: DroneCompany
- name: 操控员执照等级签注
  reason: 各类等级签注可作为PilotLicense的属性，但签注的授予和更新需遵循规则，因此规则独立为LicenseRenewalRule等。
  suggested_parent: PilotLicense
- name: 无人机实名登记信息
  reason: 实名登记信息可作为Drone实体的属性，但登记行为本身有历史追溯需求，建议独立为DroneRealNameRegistration记录。
  suggested_parent: Drone
