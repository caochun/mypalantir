DefenseResponseLevel:
  summary: 防御响应等级标准，定义一级至四级防御响应的启动条件（如台风中心风力、预警颜色等）
  source: S1_交通运输综合应急预案等5项2026附件.md > 9 附件
  properties:
    level:
      type: int
      required: true
      description: 防御响应等级，1=一级, 2=二级, 3=三级, 4=四级
    trigger_condition:
      type: str
      required: false
      description: 启动条件描述，如热带气旋中心风力达到16级以上
    wind_speed_center:
      type: int
      required: false
      description: 热带气旋中心风力（级），如16
    forecast_hours:
      type: int
      required: false
      description: 预计影响时间（小时），如48
EmergencyEventLevel:
  summary: 突发事件分级标准，定义特别重大、重大、较大、一般四级事件的分级依据
  source: S1_交通运输综合应急预案等5项2026附件.md > 1.4 事件分级
  properties:
    level:
      type: int
      required: true
      description: 事件等级，1=特别重大, 2=重大, 3=较大, 4=一般
    description:
      type: str
      required: false
      description: 分级依据描述
    event_type:
      type: str
      required: false
      description: 事件类型，如公路交通突发事件
    road_impact_description:
      type: str
      required: false
      description: 对公路影响的描述，如国家干线公路交通毁坏、中断、阻塞等
    estimated_clearance_time:
      type: int
      required: false
      description: 预计抢修处置时间（小时）
RoadSegment:
  summary: 公路路段，包含桩号、等级、管理单位等信息，是公路交通应急的基本单元
  source: 公路交通应急处置技术规范.md > 4.7 事故现场侦测
  properties:
    road_name:
      type: str
      required: false
      description: 公路名称，如G1京哈高速
    stake_number:
      type: str
      required: false
      description: 桩号，如K100+200
    road_class:
      type: str
      required: false
      description: 公路等级，如高速公路、国道、省道等
    management_unit:
      type: str
      required: false
      description: 管理单位名称
    risk_level:
      type: str
      required: false
      description: 风险等级，如高风险、较高风险等
    is_cross_province:
      type: bool
      required: false
      description: 是否为跨省通道
    is_cross_river_sea:
      type: bool
      required: false
      description: 是否为跨江跨海通道
    road_number:
      type: str
      required: false
      description: 路段编号，如G1
    direction:
      type: str
      required: false
      description: 运行方向，如上行、下行
    road_tech_grade:
      type: str
      required: false
      description: 公路技术等级，枚举值：高速、一级、二级、三级、四级、其他
    lane_count:
      type: int
      required: false
      description: 车道数量
    traffic_direction:
      type: str
      required: false
      description: 通行方式，枚举值：单向、双向
    subgrade_type:
      type: str
      required: false
      description: 路基类型，枚举值：填方路基、挖方路基、半填半挖路基、其他
    pavement_type:
      type: str
      required: false
      description: 路面类型，枚举值：沥青路面、水泥混凝土路面、砂石路面、其他
    adverse_geology:
      type: str
      required: false
      description: 不良地质情况描述
    slope_type:
      type: str
      required: false
      description: 边坡类型，枚举值：路堤边坡、路堑边坡
    embankment_fill_type:
      type: str
      required: false
      description: 路堤边坡填料类型
    embankment_slope_height:
      type: float
      required: false
      description: 路堤边坡坡高（米）
    embankment_slope_ratio:
      type: str
      required: false
      description: 路堤边坡坡率
    cut_slope_geology_type:
      type: str
      required: false
      description: 路堑边坡地质类型，枚举值：岩质、土质、土石混合、其他
    cut_slope_height:
      type: float
      required: false
      description: 路堑边坡坡高（米）
    cut_slope_ratio:
      type: str
      required: false
      description: 路堑边坡坡率
    slope_protection_type:
      type: str
      required: false
      description: 路基防护类型-坡面防护，枚举值：植物防护、骨架防护、喷护、片石护坡、护面墙、其他
    river_protection_type:
      type: str
      required: false
      description: 路基防护类型-沿河防护，枚举值：植物防护、砌石或混凝土护坡、石笼防护、浸水挡墙、护坦、抛石、排桩、丁坝顺坝、其他
    retaining_structure_type:
      type: str
      required: false
      description: 支挡结构类型，枚举值：挡墙、抗滑桩、锚杆索、框架、其他
    drainage_facility_type:
      type: str
      required: false
      description: 排水设施类型，枚举值：边沟、截水沟、排水沟、跌水与急流槽、其他
Bridge:
  summary: 桥梁设施，包含桥型、跨径、技术状况等信息
  source: 公路交通应急处置技术规范.md > 4.5 桥涵现场应急侦测
  properties:
    bridge_name:
      type: str
      required: true
      description: 桥梁名称
    bridge_type:
      type: str
      required: false
      description: 桥型，如梁桥、拱桥、斜拉桥、悬索桥等
    span:
      type: int
      required: false
      description: 跨径（米）
    technical_condition:
      type: str
      required: false
      description: 技术状况等级，如1类、2类、3类、4类、5类
    damage_grade:
      type: str
      required: false
      description: 损伤等级，枚举值：I级（轻微损伤）、II级（中等损伤）、III级（严重损伤或坍塌）
    overall_stability_damage_grade:
      type: str
      required: false
      description: 与结构整体稳定性相关的损伤等级，枚举值：I级、II级、III级
    bearing_capacity_damage_grade:
      type: str
      required: false
      description: 与结构承载能力相关的损伤等级，枚举值：I级、II级、III级
    deck_passability_damage_grade:
      type: str
      required: false
      description: 与桥面通行能力相关的损伤等级，枚举值：I级、II级、III级
    passability_conclusion:
      type: str
      required: false
      description: 通行结论，枚举值：正常通行、限制通行、禁止通行
    bridge_total_length:
      type: int
      required: false
      description: 桥梁总长（米）
    bridge_type_category:
      type: str
      required: false
      description: 桥型类型，枚举值：公路、连续、拱、缆索、连续刚构、其他
    structural_system:
      type: str
      required: false
      description: 结构型式，枚举值：简支、连续、悬臂、桁架、其他
    span_combination:
      type: str
      required: false
      description: 桥跨组合描述
    superstructure_material:
      type: str
      required: false
      description: 上部结构材质，枚举值：混凝土、预应力混凝土、钢、钢-混组合、圬工、其他
    pier_material:
      type: str
      required: false
      description: 墩台材质，枚举值：混凝土、圬工、钢、其他
    abutment_material:
      type: str
      required: false
      description: 桥台材质，枚举值：混凝土、圬工、钢、其他
    bearing_type:
      type: str
      required: false
      description: 支座类型，枚举值：板式、盆式、球型、摆柱式、钢、其他
    road_segment_id:
      type: str
      required: false
      description: 所属路段标识
Tunnel:
  summary: 隧道设施，包含长度、结构类型、重要等级等信息
  source: 公路交通应急处置技术规范.md > 4.6 隧道现场应急侦测
  properties:
    tunnel_name:
      type: str
      required: true
      description: 隧道名称
    length:
      type: int
      required: false
      description: 隧道长度（米）
    structure_type:
      type: str
      required: false
      description: 结构类型，如土质、石质等
    importance_level:
      type: str
      required: false
      description: 重要等级，如重要、一般
    damage_grade:
      type: str
      required: false
      description: 隧道受损程度等级，枚举值：1级（无损伤或轻微损伤）、2级（损伤中等）、3级（损伤严重或坍塌）
    clearance_difficulty_level:
      type: str
      required: false
      description: 抢通难度等级，枚举值：高难度、中等难度、低难度
    clearance_target_level:
      type: str
      required: false
      description: 抢通目标等级，枚举值：I级（禁止通行并另行改道）、II级（限制性通行）、III级（保证基本抢险车辆通行）
    secondary_disaster_risk_level:
      type: str
      required: false
      description: 次生事故风险等级，枚举值：I级（风险极高）、II级、III级、IV级（风险可容忍）
    technical_condition_category:
      type: str
      required: false
      description: 技术状况评定类别，枚举值：1~3类（好至中等）、4类（严重破损）、5类（危险状态）
    structure_damage_grade:
      type: str
      required: false
      description: 结构的破损评定等级，枚举值：1~3类、4类、5类
    tunnel_type:
      type: str
      required: false
      description: 隧道类型，枚举值：山岭隧道、水下隧道、其他
    tunnel_width:
      type: float
      required: false
      description: 隧道宽度（米）
    tunnel_height:
      type: float
      required: false
      description: 隧道高度（米）
    tunnel_arrangement:
      type: str
      required: false
      description: 隧道布置，枚举值：单洞、双洞、其他
    tunnel_longitudinal_slope:
      type: str
      required: false
      description: 隧道纵坡类型，枚举值：人字坡、单向坡、折线坡、U形坡
    total_lane_count:
      type: int
      required: false
      description: 车道总数
    cross_passage_arrangement:
      type: str
      required: false
      description: 横通道布置描述
    stratum_lithology:
      type: str
      required: false
      description: 地层岩性，枚举值：砂岩、泥岩、页岩、灰岩、花岗岩、土层、其他
    special_geology:
      type: str
      required: false
      description: 特殊地质，枚举值：滑坡地层、岩溶地层、瓦斯地层、采空区、高地应力区、黄土地区、多年冻土、其他
    special_geology_length:
      type: int
      required: false
      description: 特殊地质段长度（米）
    portal_type:
      type: str
      required: false
      description: 洞门型式，枚举值：端墙式、翼墙式、削竹式、直切式、喇叭式
    portal_foundation_condition:
      type: str
      required: false
      description: 洞门地基条件，枚举值：基岩、土层、其他
    portal_foundation_treatment:
      type: str
      required: false
      description: 洞门地基处理方式
    lining_support_status:
      type: str
      required: false
      description: 洞身支护状态，枚举值：裸洞、喷锚支护、复合式衬砌、管片、管节、其他
    lining_support_parameters:
      type: str
      required: false
      description: 支护参数描述
    road_segment_id:
      type: str
      required: false
      description: 所属路段标识
DisasterEvent:
  summary: 自然灾害事件，如台风、暴雨、地震、滑坡、泥石流等，包含类型、等级、影响范围等
  source: S1_交通运输综合应急预案等5项2026附件.md > 4.4 分类处置
  properties:
    disaster_type:
      type: str
      required: true
      description: 灾害类型，如台风、暴雨、低温雨雪冰冻、大雾、地震、滑坡、泥石流、山洪、寒潮、海上大风、冬季大风、风暴潮、海冰、海啸、沙尘暴、霾等
    disaster_level:
      type: int
      required: false
      description: 灾害等级，1=特别重大, 2=重大, 3=较大, 4=一般
    wind_speed_center:
      type: int
      required: false
      description: 台风中心风力（级），如16
    magnitude:
      type: float
      required: false
      description: 地震震级，如8.0
    rainfall:
      type: int
      required: false
      description: 降雨量（毫米）
    snow_ice:
      type: str
      required: false
      description: 低温雨雪冰冻描述
    event_scale:
      type: str
      required: false
      description: 事件规模描述，如小型、中型、大型
    road_blockage_degree:
      type: str
      required: false
      description: 道路阻断程度描述
    estimated_clearance_time:
      type: int
      required: false
      description: 预计抢通时间（小时）
AccidentEvent:
  summary: 交通事故事件，包含事故类型、形态、严重程度、涉事车辆等信息
  source: 公路交通应急处置技术规范.md > 4.7 事故现场侦测
  properties:
    accident_type:
      type: str
      required: true
      description: 事故类型，如生产安全事故、道路运输事故、港口事故、航道事故等
    accident_level:
      type: int
      required: true
      description: 事故等级，1=特别重大, 2=重大, 3=较大, 4=一般
    casualties:
      type: str
      required: false
      description: 人员伤亡情况，如死亡X人，受伤Y人
    direct_economic_loss:
      type: float
      required: false
      description: 直接经济损失（万元）
    involved_vehicles:
      type: str
      required: false
      description: 涉事车辆信息
    hazardous_materials:
      type: str
      required: false
      description: 危险品种类及泄漏情况
    accident_form:
      type: str
      required: false
      description: 事故形态，枚举值：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
    vehicle_type:
      type: str
      required: false
      description: 涉事车辆类型，如客车、普通货车、危险品运输车等
    cargo_type:
      type: str
      required: false
      description: 货物类型，如爆炸性、易燃性、毒害性、放射性、腐蚀性、传染病病原体等
    hazardous_material_nature:
      type: str
      required: false
      description: 危险物品的化学性质
    road_blockage:
      type: str
      required: false
      description: 道路阻隔情况描述
    road_surface_condition:
      type: str
      required: false
      description: 路面状况描述
    weather_condition:
      type: str
      required: false
      description: 周边气象环境信息，包括温度、天气状况（雾、冰雪、霜、雨、恶劣天气等）
    traffic_congestion:
      type: str
      required: false
      description: 交通拥堵情况描述
    road_width:
      type: int
      required: false
      description: 道路宽度（米）
    road_condition:
      type: str
      required: false
      description: 道路条件描述，如路面情况、是否适合救援车辆通行
    involved_personnel_count:
      type: int
      required: false
      description: 涉事人员数量
    vehicle_loss:
      type: str
      required: false
      description: 车辆损失情况描述
    accident_scale:
      type: str
      required: false
      description: 事故规模等级，枚举值：I级（特大）、II级（重大）、III级（较大）、IV级（一般）
    processing_difficulty:
      type: str
      required: false
      description: 处理难度，枚举值：难度极大、难度较大、难度不大、容易
    response_level:
      type: str
      required: false
      description: 响应等级，枚举值：I级、II级、III级、IV级
    processing_time_limit:
      type: str
      required: false
      description: 应急处理时限，如>=12小时、6~12小时、3~6小时、<=3小时
    road_blockage_degree:
      type: str
      required: false
      description: 阻断程度描述
EmergencyDepot:
  summary: 应急物资储备点，包含位置、储备物资清单、联系人等信息
  source: 公路交通应急处置技术规范.md > 10 应急保障
  properties:
    depot_name:
      type: str
      required: true
      description: 储备点名称
    location:
      type: str
      required: true
      description: 地理位置描述
    contact_person:
      type: str
      required: false
      description: 联系人姓名
    contact_phone:
      type: str
      required: false
      description: 联系电话
    depot_type:
      type: str
      required: false
      description: 储备点类型，如国家区域性公路交通应急装备物资储备中心、省级储备点等
    depot_id:
      type: int
      required: false
      description: 储备点唯一标识
RescueTeam:
  summary: 应急救援队伍，包含队伍类型、人数、位置、专业能力等信息
  source: 公路交通应急处置技术规范.md > 5.5 资源调度
  properties:
    team_name:
      type: str
      required: true
      description: 队伍名称
    team_type:
      type: str
      required: false
      description: 队伍类型，如公路抢通、港口救援、航道抢通、应急运输保障等
    member_count:
      type: int
      required: false
      description: 人数
    location:
      type: str
      required: false
      description: 队伍所在地
    specialty:
      type: str
      required: false
      description: 专业能力描述
EquipmentStock:
  summary: 应急装备库存，记录储备点内各类装备（如挖掘机、发电机）的数量、状态
  source: 公路交通应急处置技术规范.md > 10.2 装备保障
  properties:
    equipment_name:
      type: str
      required: true
      description: 装备名称，如挖掘机、发电机、除冰除雪设备等
    quantity:
      type: int
      required: true
      description: 数量
    status:
      type: str
      required: false
      description: 状态，如良好、待修、报废等
    depot_id:
      type: int
      required: true
      description: 所属储备点ID
    equipment_type:
      type: str
      required: false
      description: 装备类型，枚举值：通用装备（土方装备、破碎装备、桩工装备、混凝土装备、起重吊装装备、运输装备、生存保障装备）、专用装备（应急侦测装备、路基路面抢通装备、桥涵抢通装备、隧道抢通装备、事故处置装备、冰雪沙泥水火灾害处置装备）
    weight_class:
      type: str
      required: false
      description: 重量等级，枚举值：微型（<1t）、轻型（1~12t）、中型（12~30t）、重型（>30t）
    deployment_mode:
      type: str
      required: false
      description: 运达方式，枚举值：人力携行、自行运输、陆地运输、空中运输
MaterialStock:
  summary: 应急物资库存，记录储备点内各类物资（如沙袋、融雪剂）的数量、状态
  source: 公路交通应急处置技术规范.md > 10.3 物资保障
  properties:
    material_name:
      type: str
      required: true
      description: 物资名称，如沙袋、融雪剂、防滑料、防汛沙袋、砂石料等
    quantity:
      type: int
      required: true
      description: 数量
    unit:
      type: str
      required: false
      description: 计量单位，如袋、吨、立方米等
    status:
      type: str
      required: false
      description: 状态，如充足、不足、过期等
    depot_id:
      type: int
