DisasterEvent:
  summary: 自然灾害事件，如地震、暴雨、泥石流等，需记录类型、时间、地点、影响范围等
  source: S1_交通运输综合应急预案等5项2026附件.md > 4 应急响应
  properties:
    event_level:
      type: str
      required: false
      description: 事件等级，枚举值：特别重大、重大、较大、一般
AccidentEvent:
  summary: 交通事故事件，不涉及设施损伤检查，需记录类型、时间、地点等
  source: S1_交通运输综合应急预案等5项2026附件.md > 4 应急响应
  properties:
    event_level:
      type: str
      required: false
      description: 事件等级，枚举值：特别重大、重大、较大、一般
RoadSegment:
  summary: 公路基本单元，按桩号搜索，用于定位灾损位置
  source: 公路交通应急处置技术规范.md > 4 应急侦测
  properties:
    subgrade_damage_grade:
      type: int
      required: false
      description: 路基本体受损等级，1=轻微破坏，2=中度破坏，3=严重破坏或毁坏
    slope_damage_grade:
      type: int
      required: false
      description: 边坡受损等级，1=轻微破坏，2=中度破坏，3=严重破坏或毁坏
    retaining_structure_damage_grade:
      type: int
      required: false
      description: 支挡结构受损等级，1=轻微破坏，2=中度破坏，3=严重破坏或毁坏
    overall_damage_grade:
      type: int
      required: false
      description: 受损路段整体评估损伤等级，由路基路面、路基防护、路基支挡结构的单项最大损伤等级确定，1=Ⅰ级，2=Ⅱ级，3=Ⅲ级
Bridge:
  summary: 桥梁设施，含桥涵，按bridge_id查询
  source: 公路交通应急处置技术规范.md > 7 桥涵抢通
  properties:
    overall_stability_grade:
      type: int
      required: false
      description: 整体稳定评估等级，1=Ⅰ级（无损伤或轻微损伤），2=Ⅱ级（中等损伤），3=Ⅲ级（严重损伤或坍塌）
    load_capacity_grade:
      type: int
      required: false
      description: 承载能力评估等级，1=Ⅰ级（无损伤或轻微损伤），2=Ⅱ级（中等损伤），3=Ⅲ级（严重损伤或坍塌）
    traffic_capacity_grade:
      type: int
      required: false
      description: 车辆通行能力评估等级，1=Ⅰ级（无损伤或轻微损伤），2=Ⅱ级（中等损伤），3=Ⅲ级（严重损伤或坍塌）
    overall_damage_grade:
      type: int
      required: false
      description: 桥涵整体损伤等级，由整体稳定、承载能力、通行能力的单项最大等级确定，1=Ⅰ级，2=Ⅱ级，3=Ⅲ级
Tunnel:
  summary: 隧道设施，按tunnel_id查询
  source: 公路交通应急处置技术规范.md > 8 隧道抢通
  properties:
    damage_grade:
      type: int
      required: false
      description: 隧道受损程度等级，1=无损伤或轻微损伤，2=损伤中等，3=损伤严重或坍塌
EmergencyDepot:
  summary: 应急物资储备点，按坐标搜索，存储装备和物资
  source: 公路交通应急处置技术规范.md > 10 应急保障
  properties:
    level:
      type: str
      required: false
      description: 储备点级别，枚举：国家区域性公路交通应急装备物资储备中心, 省级应急物资储备中心, 市级应急物资储备中心, 县级应急物资储备中心,
        公路养护队
    storage_mode:
      type: str
      required: false
      description: 储备方式，枚举：实物储备, 协议储备, 生产能力储备
RescueTeam:
  summary: 应急队伍，按坐标搜索，用于调度
  source: 公路交通应急处置技术规范.md > 5 指挥调度
  properties:
    team_type:
      type: str
      required: false
      description: 队伍类型，如'港口应急救援队伍','航道抢通保障队伍'等
EquipmentStock:
  summary: 装备库存，关联储备点，记录装备类型、数量
  source: 公路交通应急处置技术规范.md > 10 应急保障
  properties:
    equipment_name:
      type: str
      required: false
      description: 装备名称，如'轻型综合指挥车','卫星电话'等
    configuration_department:
      type: str
      required: false
      description: 配置部门，如'各级指挥中心救援队','救援队'
    communication_mode:
      type: str
      required: false
      description: 通信方式，枚举值用逗号分隔，如'公网通信,专网通信,卫星通信,短波通信'
    core_function:
      type: str
      required: false
      description: 核心功能，如'综合指挥','现场通信','指挥通信','信息安全'
MaterialStock:
  summary: 物资库存，关联储备点，记录物资类型、数量
  source: 公路交通应急处置技术规范.md > 10 应急保障
  properties:
    material_name:
      type: str
      required: false
      description: 物资名称，如'融雪剂','编制袋'等
    applicable_disasters:
      type: str
      required: false
      description: 适用灾害类型，枚举值用逗号分隔：交通事故,冰雪及其次生灾害,风沙灾害及其次生灾害,水灾及其次生灾害,火灾及其次生灾害,地震地质及其次生灾害
DamageGradeStandard:
  summary: 损伤分级标准，定义设施类型+等级对应的通行建议
  source: 公路交通应急抢通技术规程.md > 3.3 应急抢通
  properties:
    damage_level:
      type: int
      required: false
      description: 损伤等级，1=Ⅰ级（无损伤或轻微损伤），2=Ⅱ级（中等损伤），3=Ⅲ级（严重损伤或坍塌）
    damage_degree:
      type: str
      required: false
      description: 损伤程度描述，枚举值：无损伤或轻微损伤、中等损伤、严重损伤或坍塌
    clearance_suggestion:
      type: str
      required: false
      description: 受损公路基础设施抢通建议，枚举值：观察通行、限制通行并加强观测、禁止通行并实施抢通
EventLevelStandard:
  summary: 突发事件分级标准，定义I~IV级事件对应的响应要求
  source: S1_交通运输综合应急预案等5项2026附件.md > 4 应急响应
  properties:
    level_name:
      type: str
      required: false
      description: 事件等级名称，枚举值：特别重大、重大、较大、一般
    level_code:
      type: int
      required: false
      description: 事件等级代码，1=特别重大，2=重大，3=较大，4=一般
    description:
      type: str
      required: false
      description: 事件严重程度描述，如'I级：突发事件导致国家干线公路交通毁坏、中断、阻塞，通行能力影响周边省份，抢修、处置时间预计在24小时以上。其他需要由交通运输部提供应急保障的突发事件。'
ClearanceTechniqueRule:
  summary: 抢通技术选用规则，根据设施类型和灾损推荐技术
  source: 公路交通应急抢通技术规程.md > 5 应急决策
  properties: {}
TrafficControlRule:
  summary: 交通管制措施规则，根据损伤等级确定管制措施
  source: 公路交通应急抢通技术规程.md > 3.3 应急抢通
  properties: {}
TunnelImportanceLevel:
  summary: 隧道重要等级，根据道路等级和交通量确定
  source: 公路交通应急处置技术规范.md > 8 隧道抢通
  properties:
    road_class:
      type: str
      required: false
      description: 公路等级，枚举值：'高速及一级公路', '二级公路', '三级公路', '四级公路'
    annual_daily_traffic:
      type: str
      required: false
      description: 年日均交通量，单位为pcu/d/ln，枚举值：'≥10001', '5001~10000', '≤5000'
    importance_level:
      type: str
      required: false
      description: 隧道重要等级，枚举值：'一级', '二级', '三级'
TunnelDifficultyMatrix:
  summary: 隧道抢通难度矩阵，根据时长和风险确定难度
  source: 公路交通应急处置技术规范.md > 8 隧道抢通
  properties:
    duration_rating:
      type: str
      required: false
      description: 抢通时长评级，枚举值：'A'（抢通时间太长，不可接受）, 'B'（较长，勉强接受）, 'C'（基本满足要求）, 'D'（很短）
    risk_level:
      type: str
      required: false
      description: 次生事故风险等级，枚举值：'I级'（风险极高，难以控制）, 'II级'（可采取措施降低）, 'III级'（可容忍边缘）, 'IV级'（可容忍）
    difficulty_level:
      type: str
      required: false
      description: 隧道抢通难度等级，枚举值：'高难度', '中等难度', '低难度'
TunnelTargetMatrix:
  summary: 隧道抢通目标矩阵，根据难度和重要等级确定目标
  source: 公路交通应急处置技术规范.md > 8 隧道抢通
  properties:
    difficulty_level:
      type: str
      required: false
      description: 隧道抢通难度等级，枚举值：'高难度', '中等难度', '低难度'
    importance_level:
      type: str
      required: false
      description: 隧道重要等级，枚举值：'一级', '二级', '三级'
    target_level:
      type: str
      required: false
      description: 隧道抢通目标等级，枚举值：'I级'（禁止通行并改道），'II级'（限制性通行，允许人员/两轮摩托），'III级'（保证基本抢险车辆通行）
BridgeTypeSelection:
  summary: 便桥选型参考，根据场景和跨径推荐桥型
  source: 公路交通应急抢通技术规程.md > 7 桥涵抢通
  properties: {}
ResponseLevelRule:
  summary: 响应级别规则，根据事件级别确定响应要求
  source: S1_交通运输综合应急预案等5项2026附件.md > 4 应急响应
  properties:
    level:
      type: str
      required: true
      description: 应急响应等级，从高到低分为：一级、二级、三级、四级
FacilityInspection:
  summary: 设施现场检查记录，包括检查结果和评估
  source: 公路交通应急抢通技术规程.md > 4 应急检查
  properties:
    inspection_time:
      type: str
      required: false
      description: 检查时间，格式YYYY-MM-DD HH:MM
    inspection_team_id:
      type: str
      required: false
      description: 检查组编号
    highway_code:
      type: str
      required: false
      description: 公路编号/名称
    highway_technical_grade:
      type: str
      required: false
      description: 公路技术等级，枚举：高速、一级、二级、三级、四级、其他
    damage_level:
      type: str
      required: false
      description: 损伤等级，枚举：I（无损伤或轻微损伤）、II（中等损伤）、III（严重损伤或坍塌）
    clearance_suggestion:
      type: str
      required: false
      description: 抢通建议，枚举：观察通行、限制通行并加强观测、禁止通行并实施抢通
    inspection_type:
      type: str
      required: false
      description: 检查类型，枚举：路基路面、桥涵、隧道
ClearancePlan:
  summary: 抢通方案，包括候选、执行、完成状态
  source: 公路交通应急抢通技术规程.md > 5 应急决策
  properties:
    plan_type:
      type: str
      required: true
      description: 方案类型，枚举：灾害事件应急抢通总体方案、受损公路线路应急抢通方案、受损公路基础设施现场应急抢修技术方案、绕行方案
    scope:
      type: str
      required: false
      description: 路网抢通范围，包括影响范围边界等（仅总体方案）
    key_routes:
      type: str
      required: false
      description: 优先抢通重点线路和关键节点清单（仅总体方案）
    emergency_team_requirement:
      type: str
      required: false
      description: 应急队伍需求，包括数量、分布、组成结构（总体/线路方案）
    equipment_requirement:
      type: str
      required: false
      description: 应急装备物资需求，包括类型、数量、规格等（总体/线路方案）
    bypass_route_name:
      type: str
      required: false
      description: 绕行线路名称（仅绕行方案）
    bypass_route_start_end:
      type: str
      required: false
      description: 绕行线路起讫点（仅绕行方案）
    traffic_condition:
      type: str
      required: false
      description: 线路通行状况（仅绕行方案）
    route_name:
      type: str
      required: false
      description: 绕行线路名称
    start_point:
      type: str
      required: false
      description: 绕行线路起点
    end_point:
      type: str
      required: false
      description: 绕行线路终点
    traffic_status:
      type: str
      required: false
      description: 绕行线路通行状况，如正常通行、限制通行等
ResourceDispatch:
  summary: 资源调度单，记录队伍、装备、物资的调度
  source: 公路交通应急处置技术规范.md > 5 指挥调度
  properties: {}
TrafficControl:
  summary: 交通管制措施执行记录
  source: 公路交通应急抢通技术规程.md > 3.3 应急抢通
  properties:
    control_measure:
      type: str
      required: false
      description: 交通管制措施，枚举：限重、限速、限宽、限高、限流、车辆行驶位置限制
TrafficEvaluation:
  summary: 通行评估，抢通后评估通行条件
  source: 公路交通应急抢通技术规程.md > 6 路基路面抢通
  properties:
    assessment_conclusion:
      type: str
      required: false
      description: 应急通行评估结论，枚举值：正常通行/限制通行/禁止通行
    decision_result:
      type: str
      required: false
      description: 应急通行决策结果，如开放通行或禁止通行
    restriction_condition:
      type: str
      required: false
      description: 通行限制条件，如限速、限载等
    prompt_info:
      type: str
      required: false
      description: 提示信息，如警告标志内容
Drone:
  summary: 无人机单机，按drone_id查询
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第二章
  properties:
    drone_id:
      type: str
      required: true
      description: 唯一产品识别码，由生产者设置
    type:
      type: str
      required: true
      description: 无人驾驶航空器类型，枚举值：微型、轻型、小型、中型、大型
    empty_weight:
      type: float
      required: false
      description: 空机重量，单位kg
    max_takeoff_weight:
      type: float
      required: false
      description: 最大起飞重量，单位kg
    max_speed:
      type: float
      required: false
      description: 最大平飞速度，单位km/h
    max_altitude:
      type: float
      required: false
      description: 最大飞行真高，单位m
    has_airspace_keeping:
      type: bool
      required: false
      description: 是否具备空域保持能力
    has_reliable_monitoring:
      type: bool
      required: false
      description: 是否具备可靠被监视能力
    is_controllable_anytime:
      type: bool
      required: false
      description: 是否全程可随时人工介入操控
    registration_number:
      type: str
      required: false
      description: 实名登记号，8位阿拉伯数字、罗马体大写字母或二者的组合
    owner:
      type: str
      required: false
      description: 所有人名称或身份信息
    occupant:
      type: str
      required: false
      description: 占有人名称或身份信息
    producer:
      type: str
      required: false
      description: 生产者名称
    model:
      type: str
      required: false
      description: 民用无人驾驶航空器型号
    serial_number:
      type: str
      required: false
      description: 出厂序号
    purpose:
      type: str
      required: false
      description: 民用无人驾驶航空器使用用途
    nationality_mark:
      type: str
      required: false
      description: 国籍标志，固定为罗马体大写字母B
    registration_mark:
      type: str
      required: false
      description: 登记标志，格式为国籍标志加短横线加实名登记号，如B-XXXXXXX
    identification_plate_installed:
      type: bool
      required: false
      description: 是否装有载有国籍标志和登记标志的识别牌
    nationality_registration_date:
      type: str
      required: false
      description: 国籍登记日期
    nationality_registration_certificate_issuer:
      type: str
      required: false
      description: 国籍登记证书签发人姓名
    change_registration_date:
      type: str
      required: false
      description: 变更登记日期
    cancellation_date:
      type: str
      required: false
      description: 注销登记日期
    airworthiness_certificate_type:
      type: str
      required: false
      description: 适航证类型，枚举值：标准适航证、特殊适航证、特许飞行证、出口适航证
DroneOperator:
  summary: 无人机操控员，按operator_id查询
  source: S4_CCAR-92.md > B章
  properties:
    operator_id:
      type: str
      required: true
      description: 操控员ID或执照号
    license_type:
      type: str
      required: true
      description: 执照类型，枚举值：操控员执照、操作证书
    has_license:
      type: bool
      required: false
      description: 是否持有有效执照或操作证书
    training_completed:
      type: bool
      required: false
      description: 是否完成安全操控培训
    examination_passed:
      type: bool
      required: false
      description: 是否经考核合格
    no_criminal_record:
      type: bool
      required: false
      description: 近5年内无危害国家安全、公共安全等故意犯罪记录
    no_drug_record:
      type: bool
      required: false
      description: 无吸毒行为记录
DroneBase:
  summary: 无人机基地/起降点，按坐标搜索
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第三章
  properties: {}
AirspaceZone:
  summary: 空域区划，包括管制、适飞、禁飞区域
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第三章
  properties:
    zone_id:
      type: str
      required: true
      description: 空域区划唯一标识
    type:
      type: str
      required: true
      description: 空域类型，枚举值：管制空域、适飞空域
    horizontal_range:
      type: str
      required: false
      description: 水平范围描述
    vertical_range:
      type: str
      required: false
      description: 垂直范围描述，如真高120米以上
    use_time:
      type: str
      required: false
      description: 使用时间规范，如常时开放或特定时段
DroneClassRule:
  summary: 无人机分类标准，定义微型、轻型等
  source: S3_无人驾驶航空器飞行管理暂行条例.md > 第二条
  properties:
    class_name:
      type: str
      required: true
      description: 分类名称，枚举值：微型、轻型、小型、中型、大型
    empty_weight_max:
      type: float
      required: false
      description: 空机重量上限，单位kg（微型<0.25，轻型≤4，小型≤15）
