  description: 根据违规行为类型，确定适用的处罚条款和处罚力度。例如，未登记飞行、无执照飞行、违规进入管制空域等。返回处罚建议。
  depends_on: []
  params:
  - name: violation_type
    type: str
    description: 违规行为类型
    default: null
  - name: severity
    type: str
    description: 严重程度
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第五章
- name: initiate_emergency_response
  summary: 启动应急响应，调集人员装备并上报初步信息
  group: 应急响应
  description: 根据灾害事件信息启动应急响应，包括调集人员装备、设立警告标志、研判事态、上报初步信息、提出应急需求。
  depends_on: []
  params:
  - name: event_type
    type: str
    description: 事件类型，如自然灾害、事故灾难
    default: null
  - name: event_location
    type: str
    description: 事件地点
    default: null
  - name: event_scale
    type: str
    description: 事件规模描述
    default: null
  involves_objects:
  - EventReport
  - EmergencyContact
  source: 公路交通应急抢通技术规程 3.3.2
- name: conduct_road_network_damage_survey
  summary: 开展路网灾情调查，评估受灾区域路网通行状况
  group: 应急检查
  description: 通过卫星遥感、航空遥感、地面监测等手段，获取受灾区域路网或重点区域的受灾线路数量、受损基础设施分布及灾情影响范围，初步明确应急抢通需求。
  depends_on: []
  params:
  - name: affected_area
    type: str
    description: 受灾区域描述
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  source: 公路交通应急抢通技术规程 3.3.4, 4.2.2
- name: conduct_route_damage_survey
  summary: 开展线路灾损调查，评估单条线路基础设施损伤
  group: 应急检查
  description: 对受损公路线路上的基础设施（路基路面、桥涵、隧道）进行实地快速评估，获取损伤位置、类型、规模及通行状况，确定损伤等级和抢通建议。
  depends_on: []
  params:
  - name: road_name
    type: str
    description: 公路名称
    default: null
  - name: start_stake
    type: str
    description: 起始桩号
    default: null
  - name: end_stake
    type: str
    description: 终止桩号
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  - DamageGradeStandard
  source: 公路交通应急抢通技术规程 3.3.5, 4.2.3
- name: conduct_facility_on_site_inspection
  summary: 开展设施现场检查，获取结构物具体灾损形态
  group: 应急检查
  description: 对路基路面、桥涵、隧道等结构物进行现场检查，获取具体灾损形态、程度及通行能力评估，填写现场检查表。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型：路基路面、桥涵、隧道
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  - RoadSubgradeEmergencyAssessment
  - BridgeEmergencyAssessment
  - TunnelEmergencyInvestigation
  source: 公路交通应急抢通技术规程 3.3.6, 4.2.4, 6.2, 7.2, 8.2
- name: determine_damage_grade_for_road_subgrade
  summary: 确定路基路面损伤等级
  group: 应急评估
  description: 根据路基路面、路基防护、路基支挡结构的损伤状况，按单项最大损伤等级确定受损路段整体损伤等级（I/II/III级）。
  depends_on:
  - conduct_facility_on_site_inspection
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  involves_objects:
  - RoadSubgradeEmergencyAssessment
  - DamageGradeStandard
  source: 公路交通应急抢通技术规程 6.2.4, 6.2.5
- name: determine_damage_grade_for_bridge
  summary: 确定桥涵损伤等级
  group: 应急评估
  description: 根据桥涵整体稳定、承载能力、车辆通行能力的损伤状况，按单项最大损伤等级确定桥涵整体损伤等级（I/II/III级）。
  depends_on:
  - conduct_facility_on_site_inspection
  params:
  - name: bridge_name
    type: str
    description: 桥梁名称
    default: null
  involves_objects:
  - BridgeEmergencyAssessment
  - DamageGradeStandard
  source: 公路交通应急抢通技术规程 7.2.3, 7.2.4
- name: determine_damage_grade_for_tunnel
  summary: 确定隧道损伤等级
  group: 应急评估
  description: 根据隧道洞口边仰坡、洞门、衬砌、路面、吊顶预埋件等的损伤状况，按单项最大损伤等级确定隧道整体损伤等级（I/II/III级）。
  depends_on:
  - conduct_facility_on_site_inspection
  params:
  - name: tunnel_name
    type: str
    description: 隧道名称
    default: null
  involves_objects:
  - TunnelEmergencyAssessment
  - DamageGradeStandard
  source: 公路交通应急抢通技术规程 8.2.4, 8.2.5
- name: propose_clearance_plan_for_road_subgrade
  summary: 提出路基路面现场应急抢修技术方案建议
  group: 应急抢通
  description: 根据路基路面受损情况、线路应急抢通目标，按“一路段一方案”原则提出抢修技术方案，明确宽度、纵坡、曲线半径、轴载等关键技术指标。
  depends_on:
  - determine_damage_grade_for_road_subgrade
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: clearance_target
    type: str
    description: 抢通目标描述
    default: null
  involves_objects:
  - RoadSegment
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 6.3.1
- name: propose_clearance_plan_for_bridge
  summary: 提出桥涵现场应急抢修技术方案建议
  group: 应急抢通
  description: 根据桥涵受损情况、线路应急抢通目标，按“一桥涵一方案”原则提出抢修技术方案，明确车辆行驶位置、载重、车道、间距、速度等关键技术指标。
  depends_on:
  - determine_damage_grade_for_bridge
  params:
  - name: bridge_name
    type: str
    description: 桥梁名称
    default: null
  - name: clearance_target
    type: str
    description: 抢通目标描述
    default: null
  involves_objects:
  - Bridge
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 7.3.1
- name: propose_clearance_plan_for_tunnel
  summary: 提出隧道现场应急抢修技术方案建议
  group: 应急抢通
  description: 根据隧道受损情况、线路应急抢通目标，按“一隧道一方案”原则提出抢修技术方案，明确隧道通行高度、宽度等关键技术指标。
  depends_on:
  - determine_damage_grade_for_tunnel
  params:
  - name: tunnel_name
    type: str
    description: 隧道名称
    default: null
  - name: clearance_target
    type: str
    description: 抢通目标描述
    default: null
  involves_objects:
  - Tunnel
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 8.3.1
- name: propose_detour_plan
  summary: 制定绕行方案
  group: 应急决策
  description: 当受损设施短期内无法抢通时，制定绕行方案，包括绕行线路名称、起讫点、通行状况等。
  depends_on: []
  params:
  - name: blocked_road_segment
    type: str
    description: 阻断路段标识
    default: null
  - name: detour_route
    type: str
    description: 绕行线路描述
    default: null
  involves_objects:
  - RoadSegment
  source: 公路交通应急抢通技术规程 3.3.6, 5.2.5
- name: conduct_emergency_passability_assessment_for_road_subgrade
  summary: 开展路基路面应急通行评估
  group: 应急评估
  description: 路基路面应急抢通施工作业完成后，通过试通行等方法评估是否达到应急通行条件，无异常后开放应急通行。
  depends_on:
  - propose_clearance_plan_for_road_subgrade
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  involves_objects:
  - RoadSubgradeEmergencyAssessment
  source: 公路交通应急抢通技术规程 6.4
- name: conduct_emergency_passability_assessment_for_bridge
  summary: 开展桥涵应急通行评估
  group: 应急评估
  description: 桥涵应急抢通施工作业完成后，采用分级试加载、试通行等方法进行应急通行评估，加载检验安全且试通行无异常后开放应急通行。
  depends_on:
  - propose_clearance_plan_for_bridge
  params:
  - name: bridge_name
    type: str
    description: 桥梁名称
    default: null
  involves_objects:
  - BridgeEmergencyAssessment
  source: 公路交通应急抢通技术规程 7.4
- name: conduct_emergency_passability_assessment_for_tunnel
  summary: 开展隧道应急通行评估
  group: 应急评估
  description: 隧道应急抢通施工作业完成后，判定结构稳定、限界达标后，试通行无异常可开放应急通行。
  depends_on:
  - propose_clearance_plan_for_tunnel
  params:
  - name: tunnel_name
    type: str
    description: 隧道名称
    default: null
  involves_objects:
  - TunnelEmergencyAssessment
  source: 公路交通应急抢通技术规程 8.4
- name: select_clearance_technique_for_road_subgrade
  summary: 根据灾损类型选择路基路面抢通技术
  group: 应急抢通
  description: 根据路基路面灾损类型（沉陷开裂、坍塌、水毁、滑坡、崩塌落石、泥石流、沙害、低温雨雪冰冻等）和规模，选择适用的抢通技术措施。
  depends_on:
  - propose_clearance_plan_for_road_subgrade
  params:
  - name: damage_type
    type: str
    description: 灾损类型
    default: null
  - name: scale
    type: str
    description: 规模描述
    default: null
  involves_objects:
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 6.3.2-6.3.9
- name: select_clearance_technique_for_bridge
  summary: 根据灾损类型选择桥涵抢通技术
  group: 应急抢通
  description: 根据桥涵灾损类型和应急通行需求，选用便道便桥、应急修复、快速补强与纠偏等技术方案。
  depends_on:
  - propose_clearance_plan_for_bridge
  params:
  - name: damage_type
    type: str
    description: 灾损类型
    default: null
  - name: bridge_name
    type: str
    description: 桥梁名称
    default: null
  involves_objects:
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 7.3.2-7.3.14
- name: select_clearance_technique_for_tunnel
  summary: 根据灾损类型选择隧道抢通技术
  group: 应急抢通
  description: 根据隧道灾损类型（洞口掩埋、落石、泥石流倒灌、洪水淹没、衬砌受损、涌水突泥等）选择适用的抢通技术措施。
  depends_on:
  - propose_clearance_plan_for_tunnel
  params:
  - name: damage_type
    type: str
    description: 灾损类型
    default: null
  - name: tunnel_name
    type: str
    description: 隧道名称
    default: null
  involves_objects:
  - ClearanceTechniqueRule
  source: 公路交通应急抢通技术规程 8.3.2-8.3.10
- name: allocate_emergency_equipment_and_materials
  summary: 调配应急装备物资
  group: 应急保障
  description: 根据应急抢通方案和现场应急抢修技术方案，就近便捷调配通用和专用应急装备物资，满足功能适用、环境适应、安全可靠的要求。
  depends_on: []
  params:
  - name: clearance_plan
    type: str
    description: 抢通方案描述
    default: null
  - name: required_equipment
    type: str
    description: 所需装备清单
    default: null
  - name: required_materials
    type: str
    description: 所需物资清单
    default: null
  involves_objects:
  - EmergencyDepot
  - EquipmentStock
  - MaterialStock
  - EmergencyResourceDispatchRecord
  source: 公路交通应急抢通技术规程 9.1, 9.3
- name: deploy_emergency_communication_equipment
  summary: 调配应急通信装备
  group: 应急保障
  description: 根据应急抢通需求，调配卫星电话、北斗终端、短波电台、无线自组网电台、对讲机、应急通信车、应急通信方舱等通信装备。
  depends_on: []
  params:
  - name: communication_requirements
    type: str
    description: 通信需求描述
    default: null
  involves_objects:
  - EmergencyCommunicationLog
  source: 公路交通应急抢通技术规程 9.2.1
- name: deploy_information_acquisition_equipment
  summary: 调配信息获取装备
  group: 应急保障
  description: 根据灾情调查需求，调配遥感卫星、航空遥感装备、无人船/艇、爬行机器人、视频监控设备等信息获取装备。
  depends_on: []
  params:
  - name: survey_type
    type: str
    description: 调查类型：路网、线路、设施
    default: null
  involves_objects:
  - Drone
  source: 公路交通应急抢通技术规程 9.2.2
- name: conduct_technical_monitoring_during_clearance
  summary: 开展抢通现场技术监测
  group: 应急抢通
  description: 在隧道等抢通过程中开展技术监测，包括巡查、地表沉降、边仰坡变形、拱顶下沉、周边收敛、隧底隆起、裂缝发展、水压水量变化等。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  involves_objects:
  - MonitoringData
  source: 公路交通应急抢通技术规程 8.3.11
- name: generate_emergency_clearance_overall_plan
  summary: 生成灾害事件应急抢通总体方案
  group: 应急决策
  description: 根据路网灾情调查评估结果，确定路网抢通范围、优先抢通重点线路和关键节点清单、应急队伍调配、应急装备物资调配、收费站绿色通道开辟、应急支援等内容。
  depends_on:
  - conduct_road_network_damage_survey
  params:
  - name: survey_result
    type: str
    description: 路网灾情调查结果
    default: null
  involves_objects:
  - RoadSegment
  - EmergencyDepot
  - RescueTeam
  source: 公路交通应急抢通技术规程 5.2.2
- name: generate_route_clearance_plan
  summary: 生成受损公路线路应急抢通方案
  group: 应急决策
  description: 根据线路灾损调查评估结果，确定路基路面、桥涵、隧道的抢通量，应急装备物资种类、规格/型号、数量需求，应急队伍专业知识与技能、数量需求，抢通工作量测算等。
  depends_on:
  - conduct_route_damage_survey
  params:
  - name: route_survey_result
    type: str
    description: 线路灾损调查结果
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  source: 公路交通应急抢通技术规程 5.2.3
- name: generate_facility_clearance_technical_plan
  summary: 生成受损公路基础设施现场应急抢修技术方案
  group: 应急决策
  description: 根据设施现场检查评估结果，确定满足现场应急抢通目标的关键技术指标、工艺工法、应急装备物资、应急队伍等。
  depends_on:
  - conduct_facility_on_site_inspection
  params:
  - name: facility_type
    type: str
    description: 设施类型
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  source: 公路交通应急抢通技术规程 5.2.4
- name: make_emergency_passability_decision
  summary: 做出应急通行决策
  group: 应急决策
  description: 依据应急通行评估结果，做出应急通行决策，包括决策结果（限制通行或禁止通行）、通行限制条件和提示信息。
  depends_on:
  - conduct_emergency_passability_assessment_for_road_subgrade
  - conduct_emergency_passability_assessment_for_bridge
  - conduct_emergency_passability_assessment_for_tunnel
  params:
  - name: facility_type
    type: str
    description: 设施类型
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  - name: assessment_result
    type: str
    description: 评估结果
    default: null
  involves_objects:
  - TrafficControlImplementation
  source: 公路交通应急抢通技术规程 5.2.6
- name: generate_event_information_report
  summary: 生成灾情信息报告（首报/续报/终报）
  group: 信息报送
  description: 按照“首报要快、续报要准、终报要全”的原则，生成灾情信息报告，包括事件基本信息、处置进展、发展趋势等。
  depends_on: []
  params:
  - name: report_type
    type: str
    description: 报告类型：首报、续报、终报
    default: null
  - name: event_id
    type: str
    description: 事件标识
    default: null
  involves_objects:
  - EventReport
  source: 公路交通应急抢通技术规程 3.3.1
