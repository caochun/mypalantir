functions:
- name: assess_damage_grade
  summary: 根据设施检查结果评估损伤等级和抢通建议
  group: 应急评估
  description: 输入设施类型（路基路面、桥涵、隧道）和检查获取的损伤程度数据，对照损伤分级标准，输出损伤等级（I/II/III）和对应的抢通建议（观察通行/限制通行并加强观测/禁止通行并实施抢通）。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型，枚举值：road_segment, bridge, tunnel
    default: null
  - name: damage_degree
    type: str
    description: 损伤程度描述，如'无损伤或轻微损伤'、'中等损伤'、'严重损伤或坍塌'
    default: null
  involves_objects:
  - DamageGradeStandard
  - FacilityInspection
  source: 公路交通应急抢通技术规程 3.3.5
- name: determine_tunnel_target
  summary: 根据隧道重要等级和抢通难度确定抢通目标等级
  group: 隧道抢通
  description: 输入隧道的重要等级（一级/二级/三级）和抢通难度等级（高难度/中等难度/低难度），查询隧道目标矩阵，输出抢通目标等级（I级/II级/III级）。
  depends_on:
  - assess_tunnel_importance
  - assess_tunnel_difficulty
  params:
  - name: importance_level
    type: str
    description: 隧道重要等级，枚举值：一级、二级、三级
    default: null
  - name: difficulty_level
    type: str
    description: 隧道抢通难度等级，枚举值：高难度、中等难度、低难度
    default: null
  involves_objects:
  - TunnelImportanceLevel
  - TunnelDifficultyMatrix
  - TunnelTargetMatrix
  source: 公路交通应急处置技术规范 8.4
- name: assess_tunnel_difficulty
  summary: 根据抢通时长和次生事故风险确定隧道抢通难度
  group: 隧道抢通
  description: 输入抢通时长评级（A/B/C/D）和次生事故风险等级（I~IV级），查询隧道抢通难度矩阵，输出隧道抢通难度等级（高难度/中等难度/低难度）。
  depends_on: []
  params:
  - name: duration_rating
    type: str
    description: 抢通时长评级，枚举值：A（抢通时间太长）、B（较长）、C（基本满足）、D（很短）
    default: null
  - name: risk_level
    type: str
    description: 次生事故风险等级，枚举值：I级、II级、III级、IV级
    default: null
  involves_objects:
  - TunnelDifficultyMatrix
  source: 公路交通应急处置技术规范 8.3
- name: determine_response_level
  summary: 根据事件等级确定应急响应级别
  group: 应急指挥
  description: 输入事件等级名称（特别重大/重大/较大/一般），查询响应级别规则表，输出对应的应急响应等级（一级/二级/三级/四级）。
  depends_on: []
  params:
  - name: event_level
    type: str
    description: 事件等级名称，枚举值：特别重大、重大、较大、一般
    default: null
  involves_objects:
  - EventLevelStandard
  - ResponseLevelRule
  source: 交通运输综合应急预案 4 应急响应
- name: determine_defense_response_level
  summary: 根据气象预警确定防御响应等级
  group: 防御响应
  description: 输入预警类型（如台风、暴雨等）和预警级别（红色/橙色/黄色/蓝色），查询防御响应规则，输出防御响应等级（1/2/3/4）和启动条件描述。
  depends_on: []
  params:
  - name: disaster_type
    type: str
    description: 灾害类型，如台风、暴雨等
    default: null
  - name: warning_level
    type: str
    description: 预警级别颜色，枚举值：红色、橙色、黄色、蓝色
    default: null
  involves_objects:
  - WeatherWarning
  - DefenseResponse
  - EventLevelStandard
  source: 交通运输综合应急预案 附件 部防御响应启动条件
- name: classify_drone
  summary: 根据无人机性能参数确定分类
  group: 无人机管理
  description: 输入无人机的空机重量、最大起飞重量、最大速度、最大真高等参数，对照无人机分类标准，输出无人机类型（微型/轻型/小型/中型/大型）。
  depends_on: []
  params:
  - name: empty_weight
    type: float
    description: 空机重量，单位kg
    default: null
  - name: max_takeoff_weight
    type: float
    description: 最大起飞重量，单位kg
    default: null
  - name: max_speed
    type: float
    description: 最大平飞速度，单位km/h
    default: null
  - name: max_altitude
    type: float
    description: 最大飞行真高，单位m
    default: null
  involves_objects:
  - Drone
  - DroneClassRule
  source: 无人驾驶航空器飞行管理暂行条例 第二章
