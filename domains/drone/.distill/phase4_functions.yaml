functions:
- name: determine_defense_response_level
  summary: 根据气象预警和台风中心风力确定防御响应等级
  group: 防御响应
  description: 根据气象预警信息（如台风中心风力、预警颜色等）和防御响应启动条件，确定应启动的防御响应等级（一级至四级）。
  depends_on: []
  params:
  - name: warning_type
    type: str
    description: 预警类型，如台风、暴雨、低温雨雪冰冻等
    default: null
  - name: wind_speed_center
    type: int
    description: 台风中心风力（级）
    default: null
  - name: warning_level
    type: int
    description: 预警级别，1=红色,2=橙色,3=黄色,4=蓝色
    default: null
  - name: forecast_hours
    type: int
    description: 预计影响时间（小时）
    default: null
  involves_objects:
  - DefenseResponseLevel
  - WeatherWarning
  source: 交通运输综合应急预案 > 9 附件 > 1.1-1.4
- name: determine_emergency_response_level
  summary: 根据突发事件等级确定应急响应等级
  group: 应急响应
  description: 根据突发事件（自然灾害、事故灾难等）的等级（特别重大、重大、较大、一般），结合预案规定，确定应启动的应急响应等级（一级至四级）。
  depends_on: []
  params:
  - name: event_type
    type: str
    description: 事件类型，如自然灾害、事故灾难
    default: null
  - name: event_level
    type: int
    description: 事件等级，1=特别重大,2=重大,3=较大,4=一般
    default: null
  involves_objects:
  - EmergencyEventLevel
  - EmergencyResponseProcedure
  source: 交通运输综合应急预案 > 1.4 事件分级, 公路交通突发事件应急预案 > 4.1
- name: assess_bridge_damage
  summary: 评估桥梁损伤等级并给出通行结论
  group: 应急评估
  description: 根据桥梁的整体稳定性、承载能力、桥面通行能力等方面的损伤等级，综合评估桥梁的通行结论（正常通行、限制通行、禁止通行）。
  depends_on: []
  params:
  - name: bridge_name
    type: str
    description: 桥梁名称
    default: null
  - name: overall_stability_grade
    type: str
    description: 整体稳定性损伤等级，I级/II级/III级
    default: null
  - name: bearing_capacity_grade
    type: str
    description: 承载能力损伤等级，I级/II级/III级
    default: null
  - name: deck_passability_grade
    type: str
    description: 桥面通行能力损伤等级，I级/II级/III级
    default: null
  involves_objects:
  - Bridge
  - BridgeEmergencyAssessment
  - DamageGradeStandard
  source: 对象模型 BridgeEmergencyAssessment
- name: assess_tunnel_damage
  summary: 评估隧道损伤等级并确定抢通目标
  group: 应急评估
  description: 根据隧道受损程度、结构类型等，评估隧道的重要等级、抢通难度、次生事故风险等级和抢通目标等级。
  depends_on: []
  params:
  - name: tunnel_name
    type: str
    description: 隧道名称
    default: null
  - name: damage_grade
    type: str
    description: 隧道受损程度等级，1级/2级/3级
    default: null
  - name: structure_type
    type: str
    description: 结构类型，如土质、石质
    default: null
  involves_objects:
  - Tunnel
  - TunnelEmergencyAssessment
  - DamageGradeStandard
  source: 对象模型 TunnelEmergencyAssessment
- name: assess_road_subgrade_damage
  summary: 评估路基路面损伤等级并给出通行建议
  group: 应急评估
  description: 根据路基本体、边坡、支挡结构的受损程度等级，综合评估路基路面的通行建议（正常通行、限制通行、禁止通行）。
  depends_on: []
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: subgrade_damage_grade
    type: str
    description: 路基本体受损程度等级，I级/II级/III级
    default: null
  - name: slope_damage_grade
    type: str
    description: 边坡受损程度等级，I级/II级/III级
    default: null
  - name: retaining_structure_damage_grade
    type: str
    description: 支挡结构受损程度等级，I级/II级/III级
    default: null
  involves_objects:
  - RoadSegment
  - RoadSubgradeEmergencyAssessment
  - DamageGradeStandard
  source: 对象模型 RoadSubgradeEmergencyAssessment
- name: recommend_traffic_control_measure
  summary: 根据损伤等级或事件类型推荐交通管制措施
  group: 交通管控
  description: 根据设施损伤等级或事件类型，从交通管制规则中匹配适用的管制措施（如限速、限载、封闭等）。
  depends_on: []
  params:
  - name: damage_grade
    type: str
    description: 损伤等级，I级/II级/III级
    default: null
  - name: event_type
    type: str
    description: 事件类型，如台风、暴雨
    default: null
  involves_objects:
  - TrafficControlRule
  - DamageGradeStandard
  source: 对象模型 TrafficControlRule
- name: recommend_clearance_technique
  summary: 根据设施类型和灾损类型推荐抢通技术
  group: 抢通恢复
  description: 根据设施类型（路基路面、桥涵、隧道等）和灾损类型（滑坡、泥石流、塌方等），从抢通技术规则中匹配推荐的抢通技术。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型，如路基路面、桥涵、隧道
    default: null
  - name: damage_type
    type: str
    description: 灾损类型，如滑坡、泥石流、塌方
    default: null
  - name: scale
    type: str
    description: 规模描述，如小型、中型、大型
    default: null
  involves_objects:
  - ClearanceTechniqueRule
  - DamageGradeStandard
  source: 对象模型 ClearanceTechniqueRule
- name: dispatch_emergency_resources
  summary: 调度应急资源（装备、物资、队伍）
  group: 资源调度
  description: 根据事件类型和需求，从应急储备点调度装备、物资或救援队伍到指定地点，并记录调度信息。
  depends_on: []
  params:
  - name: event_id
    type: str
    description: 关联事件ID
    default: null
  - name: resource_type
    type: str
    description: 资源类型，如装备、物资、队伍
    default: null
  - name: resource_name
    type: str
    description: 资源名称
    default: null
  - name: quantity
    type: int
    description: 数量
    default: null
  - name: source_location
    type: str
    description: 来源地点
    default: null
  - name: destination_location
    type: str
    description: 目的地
    default: null
  involves_objects:
  - EmergencyDepot
  - EquipmentStock
  - MaterialStock
  - RescueTeam
  - EmergencyResourceDispatchRecord
  source: 对象模型 EmergencyResourceDispatchRecord
- name: check_flight_approval_eligibility
  summary: 检查无人机飞行审批条件是否满足
  group: 无人机管理
  description: 根据飞行计划、无人机登记信息、操控员资质、空域限制等，检查飞行审批条件是否满足，返回审批建议。
  depends_on: []
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - UASFlightPlan
  - Drone
  - DroneOperator
  - AirspaceZone
  - FlightApproval
  source: 对象模型 FlightApproval, UASFlightPlan
- name: calculate_emergency_response_duration
  summary: 计算应急响应持续时间
  group: 应急响应
  description: 根据应急响应开始时间和结束时间，计算响应持续时间（小时）。
  depends_on: []
  params:
  - name: start_time
    type: str
    description: 开始时间，格式YYYY-MM-DD HH:MM
    default: null
  - name: end_time
    type: str
    description: 结束时间，格式YYYY-MM-DD HH:MM
    default: null
  involves_objects: []
  source: 通用计算
- name: generate_event_report_summary
  summary: 生成灾情信息报告摘要
  group: 信息报告
  description: 根据事件报告的关键字段（事件类型、时间、地点、伤亡、损失等），生成简洁的灾情摘要。
  depends_on: []
  params:
  - name: event_report_id
    type: str
    description: 事件报告ID
    default: null
  involves_objects:
  - EventReport
  source: 对象模型 EventReport
- name: find_nearby_emergency_depots
  summary: 查找事件地点附近的应急储备点
  group: 资源调度
  description: 根据事件地点坐标或描述，查找距离最近的应急储备点列表，按距离排序。
  depends_on: []
  params:
  - name: location
    type: str
    description: 事件地点描述
    default: null
  - name: radius_km
    type: int
    description: 搜索半径（公里）
    default: 50
  involves_objects:
  - EmergencyDepot
  source: 对象模型 EmergencyDepot
- name: check_equipment_availability
  summary: 检查应急装备库存是否满足需求
  group: 资源调度
  description: 根据装备名称和所需数量，检查指定储备点或全局库存是否满足需求，返回可用数量和状态。
  depends_on: []
  params:
  - name: equipment_name
    type: str
    description: 装备名称
    default: null
  - name: required_quantity
    type: int
    description: 所需数量
    default: null
  - name: depot_id
    type: int
    description: 储备点ID，可选
    default: null
  involves_objects:
  - EquipmentStock
  source: 对象模型 EquipmentStock
- name: check_material_availability
  summary: 检查应急物资库存是否满足需求
  group: 资源调度
  description: 根据物资名称和所需数量，检查指定储备点或全局库存是否满足需求，返回可用数量和状态。
  depends_on: []
  params:
  - name: material_name
    type: str
    description: 物资名称
    default: null
  - name: required_quantity
    type: int
    description: 所需数量
    default: null
  - name: depot_id
    type: int
    description: 储备点ID，可选
    default: null
  involves_objects:
  - MaterialStock
  source: 对象模型 MaterialStock
- name: calculate_road_blockage_impact
  summary: 计算道路阻断影响范围
  group: 应急评估
  description: 根据阻断路段、阻断程度，估算受影响的路段长度、绕行距离、影响车辆数等。
  depends_on: []
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: blockage_degree
    type: str
    description: 阻断程度描述
    default: null
  involves_objects:
  - RoadSegment
  - DisasterEvent
  - AccidentEvent
  source: 对象模型 RoadSegment
- name: generate_patrol_task
  summary: 生成巡查任务
  group: 预防预警
  description: 根据预警信息和风险路段，生成巡查任务，包括巡查范围、内容、频次等。
  depends_on: []
  params:
  - name: warning_type
    type: str
    description: 预警类型
    default: null
  - name: affected_area
    type: str
    description: 影响区域
    default: null
  - name: risk_level
    type: str
    description: 风险等级
    default: null
  involves_objects:
  - PatrolRecord
  - RoadSegment
  - WeatherWarning
  source: 公路交通突发事件应急预案 > 3.2.1
- name: evaluate_emergency_capability
  summary: 评估单位应急能力
  group: 应急管理
  description: 根据组织、队伍、物资、预案、演练、培训等方面的评分或等级，综合评估单位的应急能力等级。
  depends_on: []
  params:
  - name: unit_name
    type: str
    description: 被评估单位名称
    default: null
  involves_objects:
  - EmergencyCapabilityAssessment
  source: 对象模型 EmergencyCapabilityAssessment
- name: identify_hazard
  summary: 辨识风险并记录
  group: 预防预警
  description: 对指定路段进行风险辨识，记录风险类型、等级、管控措施等。
  depends_on: []
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: hazard_type
    type: str
    description: 风险类型
    default: null
  - name: hazard_level
    type: str
    description: 风险等级
    default: null
  - name: description
    type: str
    description: 风险描述
    default: null
  involves_objects:
  - HazardIdentificationRecord
  - RoadSegment
  source: 对象模型 HazardIdentificationRecord
- name: inspect_hidden_danger
  summary: 排查事故隐患并记录
  group: 预防预警
  description: 对指定路段进行隐患排查，记录隐患类型、整改措施、状态等。
  depends_on: []
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: hidden_danger_type
    type: str
    description: 隐患类型
    default: null
  - name: description
    type: str
    description: 隐患描述
    default: null
  involves_objects:
  - HiddenDangerInspectionRecord
  - RoadSegment
  source: 对象模型 HiddenDangerInspectionRecord
- name: record_emergency_communication
  summary: 记录应急通讯日志
  group: 信息报告
  description: 记录应急通讯的时间、发送方、接收方、方式、内容等。
  depends_on: []
  params:
  - name: communication_time
    type: str
    description: 通讯时间，格式YYYY-MM-DD HH:MM
    default: null
  - name: sender
    type: str
    description: 发送方
    default: null
  - name: receiver
    type: str
    description: 接收方
    default: null
  - name: communication_method
    type: str
    description: 通讯方式
    default: null
  - name: content
    type: str
    description: 通讯内容摘要
    default: null
  involves_objects:
  - EmergencyCommunicationLog
  source: 对象模型 EmergencyCommunicationLog
- name: generate_post_event_summary
  summary: 生成灾后总结评估报告
  group: 后期处置
  description: 根据事件处置情况，生成灾后总结评估报告，包括基础设施损毁、应急成效、问题改进等。
  depends_on: []
  params:
  - name: event_id
    type: str
    description: 关联事件ID
    default: null
  involves_objects:
  - PostEventSummary
  - DisasterEvent
  - AccidentEvent
  source: 对象模型 PostEventSummary
- name: check_drone_airworthiness
  summary: 检查无人机适航状态
  group: 无人机管理
  description: 根据无人机登记号，检查其适航证、维修记录、飞行日志等，判断是否适航。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 无人机实名登记号
    default: null
  involves_objects:
  - Drone
  - UASAirworthinessCertificate
  - UASMaintenanceRecord
  - UASFlightLog
  source: 对象模型 Drone, UASAirworthinessCertificate
- name: check_operator_qualification
  summary: 检查无人机操控员资质
  group: 无人机管理
  description: 根据操控员执照信息，检查其执照有效期、等级、体检合格证等，判断是否具备操控资格。
  depends_on: []
  params:
  - name: license_info
    type: str
    description: 操控员执照信息
    default: null
  involves_objects:
  - DroneOperator
  source: 对象模型 DroneOperator
- name: check_airspace_availability
  summary: 检查空域可用性
  group: 无人机管理
  description: 根据空域区划和飞行计划，检查指定空域在指定时间是否可用，以及审批要求。
  depends_on: []
  params:
  - name: airspace_zone
    type: str
    description: 空域描述
    default: null
  - name: flight_time
    type: str
    description: 飞行时间
    default: null
  involves_objects:
  - AirspaceZone
  source: 对象模型 AirspaceZone
- name: record_uas_flight_log
  summary: 记录无人机飞行日志
  group: 无人机管理
  description: 记录无人机飞行活动的详细信息，包括起飞降落时间、航线、高度、速度等。
  depends_on: []
  params:
  - name: drone_id
    type: str
    description: 无人机标识
    default: null
  - name: operator_id
    type: str
    description: 操控人员标识
    default: null
  - name: start_time
    type: str
    description: 起飞时间
    default: null
  - name: end_time
    type: str
    description: 降落时间
    default: null
  - name: flight_route
    type: str
    description: 飞行航线描述
    default: null
  - name: max_altitude
    type: int
    description: 最大飞行高度（米）
    default: null
  - name: max_speed
    type: int
    description: 最大飞行速度（千米/小时）
    default: null
  involves_objects:
  - UASFlightLog
  - Drone
  - DroneOperator
  source: 对象模型 UASFlightLog
- name: record_uas_accident
  summary: 记录无人机事故报告
  group: 无人机管理
  description: 记录无人机事故信息，包括时间、地点、描述、伤亡、损失、原因等。
  depends_on: []
  params:
  - name: uas_registration_number
    type: str
    description: 无人机实名登记号
    default: null
  - name: accident_time
    type: str
    description: 事故发生时间
    default: null
  - name: accident_location
    type: str
    description: 事故发生地点
    default: null
  - name: accident_description
    type: str
    description: 事故描述
    default: null
  involves_objects:
  - UASAccidentReport
  - Drone
  source: 对象模型 UASAccidentReport
- name: record_uas_maintenance
  summary: 记录无人机维修记录
  group: 无人机管理
  description: 记录无人机维修工作内容、人员、时间、结果等。
  depends_on: []
  params:
  - name: uas_registration_number
    type: str
    description: 无人机实名登记号
    default: null
  - name: maintenance_date
    type: str
    description: 维修日期
    default: null
  - name: maintenance_type
    type: str
    description: 维修类型
    default: null
  - name: maintenance_description
    type: str
    description: 维修内容描述
    default: null
  - name: maintenance_personnel
    type: str
    description: 维修人员
    default: null
  involves_objects:
  - UASMaintenanceRecord
  - Drone
  source: 对象模型 UASMaintenanceRecord
- name: record_traffic_control_implementation
  summary: 记录交通管制实施情况
  group: 交通管控
  description: 记录对某路段实施的交通管制措施、时间、原因等。
  depends_on: []
  params:
  - name: road_segment_id
    type: str
    description: 路段标识
    default: null
  - name: control_measure
    type: str
    description: 管制措施
    default: null
  - name: start_time
    type: str
    description: 开始时间
    default: null
  - name: end_time
    type: str
    description: 结束时间
    default: null
  - name: reason
    type: str
    description: 管制原因
    default: null
  involves_objects:
  - TrafficControlImplementation
  - RoadSegment
  source: 对象模型 TrafficControlImplementation
- name: record_accident_processing
  summary: 记录事故处理过程
  group: 应急处置
  description: 记录事故处理的方法、使用装备、安全措施、结果等。
  depends_on: []
  params:
  - name: accident_event_id
    type: str
    description: 事故事件ID
    default: null
  - name: processing_start_time
    type: str
    description: 处理开始时间
    default: null
  - name: processing_method
    type: str
    description: 处理方法
    default: null
  - name: equipment_used
    type: str
    description: 使用的装备清单
    default: null
  - name: safety_measures
    type: str
    description: 安全措施
    default: null
  involves_objects:
  - AccidentProcessingRecord
  - AccidentEvent
  source: 对象模型 AccidentProcessingRecord
- name: record_monitoring_data
  summary: 记录监测数据
  group: 监测预警
  description: 记录隧道、边坡等设施的监测数据，包括监测项目、数值、时间、状态等。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  - name: monitoring_item
    type: str
    description: 监测项目
    default: null
  - name: monitoring_value
    type: float
    description: 监测数值（毫米）
    default: null
  - name: monitoring_time
    type: str
    description: 监测时间
    default: null
  involves_objects:
  - MonitoringData
  - Tunnel
  - Bridge
  source: 对象模型 MonitoringData
- name: check_monitoring_alert
  summary: 检查监测数据是否触发预警
  group: 监测预警
  description: 根据监测数值和预警阈值，判断是否触发预警或报警，并返回状态。
  depends_on: []
  params:
  - name: monitoring_value
    type: float
    description: 监测数值
    default: null
  - name: warning_threshold
    type: float
    description: 预警阈值
    default: null
  involves_objects:
  - MonitoringData
  source: 对象模型 MonitoringData
- name: record_emergency_drill
  summary: 记录应急演练情况
  group: 应急管理
  description: 记录应急演练的类型、日期、参与单位、内容、评估结果等。
  depends_on: []
  params:
  - name: drill_type
    type: str
    description: 演练类型
    default: null
  - name: drill_date
    type: str
    description: 演练日期
    default: null
  - name: participating_units
    type: str
    description: 参与单位
    default: null
  - name: drill_content
    type: str
    description: 演练内容
    default: null
  - name: evaluation_result
    type: str
    description: 评估结果
    default: null
  involves_objects:
  - EmergencyDrillRecord
  source: 对象模型 EmergencyDrillRecord
- name: find_emergency_contact
  summary: 查找应急通讯联络信息
  group: 信息报告
  description: 根据单位名称或部门，查找对应的24小时值班电话、传真、联系人等。
  depends_on: []
  params:
  - name: unit_name
    type: str
    description: 单位或部门名称
    default: null
  involves_objects:
  - EmergencyContact
  source: 对象模型 EmergencyContact
- name: check_uas_registration
  summary: 检查民用无人驾驶航空器是否完成实名登记
  group: 无人机管理
  description: 根据无人机实名登记号查询登记信息，确认是否已完成实名登记。若未登记，返回未登记状态。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 实名登记号，8位阿拉伯数字、罗马体大写字母或组合
    default: null
  involves_objects:
  - UASRegistration
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十条
- name: check_uas_nationality_registration
  summary: 检查民用无人驾驶航空器是否完成国籍登记
  group: 无人机管理
  description: 根据无人机实名登记号查询国籍登记信息，确认是否已完成国籍登记。涉及境外飞行的无人机必须进行国籍登记。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 实名登记号
    default: null
  involves_objects:
  - UASNationalityRegistration
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十条
- name: check_uas_airworthiness
  summary: 检查民用无人驾驶航空器适航状态
  group: 无人机管理
  description: 根据无人机实名登记号查询适航证件，确认适航证类型、有效期及使用限制。中型、大型无人机需取得适航许可；微型、轻型、小型无需适航许可但需符合强制性标准。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 实名登记号
    default: null
  involves_objects:
  - UASAirworthinessCertificate
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第八条
- name: check_operator_license
  summary: 检查无人机操控员是否持有有效执照
  group: 无人机管理
  description: 根据操控员执照编号查询执照信息，确认执照类型、有效期、等级等。操控小型、中型、大型无人机需取得操控员执照；微型、轻型无需执照但需培训。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_operator_qualification_for_uas
  summary: 检查操控员是否具备操控特定类别无人机的资质
  group: 无人机管理
  description: 根据无人机类别（微型、轻型、小型、中型、大型）和操控员执照等级，判断操控员是否有资质操控该无人机。例如，小型无人机需持有小型及以上执照。
  depends_on:
  - check_operator_license
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  - name: uas_category
    type: str
    description: 无人机类别：微型、轻型、小型、中型、大型
    default: null
  involves_objects:
  - DroneOperator
  - Drone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条、第十七条
- name: check_uas_operating_certificate
  summary: 检查运营单位是否持有有效的运营合格证
  group: 无人机管理
  description: 根据运营单位名称查询运营合格证，确认证书有效期、许可范围等。使用除微型以外的无人机从事飞行活动的单位需取得运营合格证。
  depends_on: []
  params:
  - name: operator_unit
    type: str
    description: 运营单位名称
    default: null
  involves_objects:
  - UASOperatingCertificate
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十一条
- name: check_uas_insurance
  summary: 检查无人机是否已投保责任保险
  group: 无人机管理
  description: 根据无人机实名登记号查询保险信息，确认是否已投保责任保险。从事经营性飞行活动以及使用小型、中型、大型无人机从事非经营性飞行活动必须投保。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 实名登记号
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十二条
- name: check_uas_unique_product_id
  summary: 检查无人机是否设置唯一产品识别码
  group: 无人机管理
  description: 根据无人机型号或序列号查询产品识别码设置情况。生产者应为其生产的无人机设置唯一产品识别码。
  depends_on: []
  params:
  - name: drone_model
    type: str
    description: 无人机型号
    default: null
  - name: serial_number
    type: str
    description: 出厂序号
    default: null
  involves_objects:
  - Drone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第九条
- name: check_airspace_classification
  summary: 检查空域类型（管制空域或适飞空域）
  group: 空域管理
  description: 根据位置坐标或区域描述，查询空域区划信息，判断该空域是管制空域还是适飞空域。管制空域需经批准方可飞行。
  depends_on: []
  params:
  - name: location
    type: str
    description: 位置描述或坐标
    default: null
  involves_objects:
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第十九条
- name: check_flight_approval_required
  summary: 判断飞行活动是否需要申请飞行批准
  group: 飞行管理
  description: 根据飞行空域、无人机类型、飞行目的等判断是否需要向空中交通管理机构提出飞行活动申请。例如，在管制空域内飞行需申请；微型、轻型在适飞空域内飞行无需申请。
  depends_on:
  - check_airspace_classification
  params:
  - name: uas_category
    type: str
    description: 无人机类别
    default: null
  - name: airspace_type
    type: str
    description: 空域类型：管制空域或适飞空域
    default: null
  - name: flight_purpose
    type: str
    description: 飞行目的，如作业、训练、应急等
    default: null
  involves_objects:
  - AirspaceZone
  - FlightApproval
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十六条、第三十一条
- name: submit_flight_plan
  summary: 提交无人驾驶航空器飞行计划
  group: 飞行管理
  description: 根据飞行活动申请要求，提交飞行计划，包括飞行时间、空域、航线、高度、速度、通信方式、应急处置程序等信息。返回计划ID。
  depends_on: []
  params:
  - name: applicant_unit
    type: str
    description: 申请单位或个人
    default: null
  - name: flight_date
    type: str
    description: 飞行日期，格式YYYY-MM-DD
    default: null
  - name: flight_time
    type: str
    description: 飞行时间，如08:00-12:00
    default: null
  - name: airspace
    type: str
    description: 飞行空域描述
    default: null
  - name: route
    type: str
    description: 航线描述
    default: null
  - name: altitude
    type: int
    description: 飞行高度（米）
    default: null
  - name: speed
    type: int
    description: 飞行速度（千米/小时）
    default: null
  - name: emergency_procedure
    type: str
    description: 应急处置程序
    default: null
  - name: communication_method
    type: str
    description: 通信联络方法
    default: null
  - name: radio_frequency
    type: str
    description: 指挥控制链路无线电频率及占用带宽
    default: null
  involves_objects:
  - UASFlightPlan
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十七条
- name: approve_flight_plan
  summary: 审批飞行计划
  group: 飞行管理
  description: 根据飞行计划内容、空域状况、安全评估等，作出批准或不批准的决定。返回审批结果。
  depends_on:
  - submit_flight_plan
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - FlightApproval
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十八条
- name: check_flight_approval_status
  summary: 查询飞行审批状态
  group: 飞行管理
  description: 根据飞行计划ID查询审批状态，包括待审批、已批准、已拒绝。
  depends_on: []
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - FlightApproval
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十八条
- name: report_flight_readiness
  summary: 报告飞行准备情况并请求起飞确认
  group: 飞行管理
  description: 在计划起飞前1小时向空中交通管理机构报告预计起飞时刻和准备情况，经确认后方可起飞。返回确认结果。
  depends_on:
  - check_flight_approval_status
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  - name: estimated_departure_time
    type: str
    description: 预计起飞时刻，格式YYYY-MM-DD HH:MM
    default: null
  - name: readiness_status
    type: str
    description: 准备情况描述
    default: null
  involves_objects:
  - UASFlightPlan
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十条
- name: check_flight_behavior_compliance
  summary: 检查飞行行为是否符合规范
  group: 飞行管理
  description: 根据飞行日志和实时数据，检查是否遵守飞行行为规范，如随身携带证件、检查无人机状态、保持通信联络、保持安全间隔、视距内飞行等。返回违规列表。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十二条
- name: check_flight_avoidance_rules
  summary: 检查飞行避让规则遵守情况
  group: 飞行管理
  description: 根据飞行轨迹和周围航空器、交通工具信息，检查是否遵守避让规则：避让有人驾驶航空器、单架避让集群、微型避让其他无人机等。返回违规列表。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十三条
- name: check_prohibited_actions
  summary: 检查是否涉及禁止行为
  group: 飞行管理
  description: 根据飞行任务描述或飞行日志，检查是否涉及违法拍摄、扰乱秩序、投放违禁品、侵犯隐私等禁止行为。返回违规列表。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十四条
- name: report_flight_anomaly
  summary: 报告飞行异常情况
  group: 应急处置
  description: 当无人机飞行发生异常情况时，组织飞行活动的单位或个人应及时处置，并在降落后24小时内向空中交通管理机构报告。返回报告记录。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  - name: anomaly_description
    type: str
    description: 异常情况描述
    default: null
  - name: handling_measures
    type: str
    description: 处置措施
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第四十条
- name: handle_illegal_flight
  summary: 处理违规飞行事件
  group: 应急处置
  description: 对违规飞行的无人机，公安机关可采取先期处置、现场处置等措施，包括技术防控、扣押、责令停止飞行、查封等。返回处置记录。
  depends_on: []
  params:
  - name: uas_registration_number
    type: str
    description: 无人机实名登记号
    default: null
  - name: violation_description
    type: str
    description: 违规行为描述
    default: null
  - name: disposal_measures
    type: str
    description: 处置措施
    default: null
  involves_objects:
  - UASRegistration
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第四十一条、第四十二条
- name: check_countermeasure_equipment_legality
  summary: 检查无人机反制设备使用的合法性
  group: 无人机管理
  description: 根据反制设备配备单位、使用场景等，检查是否依法配备和使用反制设备。军队、警察及授权的高风险反恐重点目标管理单位可配备，其他单位或个人不得非法拥有、使用。
  depends_on: []
  params:
  - name: unit_name
    type: str
    description: 配备单位名称
    default: null
  - name: device_type
    type: str
    description: 反制设备类型
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第四十三条
- name: check_uas_category_by_performance
  summary: 根据性能参数确定无人机类别
  group: 无人机管理
  description: 根据空机重量、最大起飞重量、最大飞行真高、最大平飞速度、空域保持能力、被监视能力、人工介入能力等参数，确定无人机属于微型、轻型、小型、中型还是大型。
  depends_on: []
  params:
  - name: empty_weight
    type: float
    description: 空机重量（千克）
    default: null
  - name: max_takeoff_weight
    type: int
    description: 最大起飞重量（千克）
    default: null
  - name: max_flight_height
    type: int
    description: 最大飞行真高（米）
    default: null
  - name: max_speed
    type: int
    description: 最大平飞速度（千米/小时）
    default: null
  - name: airspace_keeping_capability
    type: bool
    description: 是否具备空域保持能力
    default: null
  - name: reliable_monitored_capability
    type: bool
    description: 是否具备可靠被监视能力
    default: null
  - name: manual_intervention_capability
    type: bool
    description: 是否全程可随时人工介入操控
    default: null
  involves_objects:
  - Drone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第六章第六十二条
- name: check_agricultural_uas_exemption
  summary: 检查农用无人机是否满足豁免条件
  group: 无人机管理
  description: 根据无人机参数和作业区域，判断是否属于常规农用无人驾驶航空器作业飞行活动，从而豁免运营合格证、操控员执照等要求。条件：最大飞行真高不超过30米，最大平飞速度不超过50千米/小时，最大飞行半径不超过2000米，具备空域保持能力和可靠被监视能力，专门用于农林牧渔作业，全程可人工介入。
  depends_on:
  - check_uas_category_by_performance
  params:
  - name: max_flight_height
    type: int
    description: 最大飞行真高（米）
    default: null
  - name: max_speed
    type: int
    description: 最大平飞速度（千米/小时）
    default: null
  - name: max_flight_radius
    type: int
    description: 最大飞行半径（米）
    default: null
  - name: airspace_keeping_capability
    type: bool
    description: 是否具备空域保持能力
    default: null
  - name: reliable_monitored_capability
    type: bool
    description: 是否具备可靠被监视能力
    default: null
  - name: manual_intervention_capability
    type: bool
    description: 是否全程可随时人工介入操控
    default: null
  - name: purpose
    type: str
    description: 用途，如植保、播种、投饵等
    default: null
  involves_objects:
  - Drone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十一条、第十六条、第六章第六十二条
- name: check_emergency_flight_approval
  summary: 处理应急飞行任务审批
  group: 飞行管理
  description: 对于反恐维稳、抢险救灾、医疗救护等紧急任务，可在计划起飞30分钟前提出飞行活动申请，空中交通管理机构应在起飞10分钟前作出决定。特别紧急任务可随时申请。返回审批结果。
  depends_on: []
  params:
  - name: applicant_unit
    type: str
    description: 申请单位
    default: null
  - name: flight_plan
    type: str
    description: 飞行计划内容
    default: null
  - name: emergency_type
    type: str
    description: 紧急任务类型，如抢险救灾
    default: null
  - name: proposed_departure_time
    type: str
    description: 计划起飞时间，格式YYYY-MM-DD HH:MM
    default: null
  involves_objects:
  - FlightApproval
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十九条
- name: check_temporary_controlled_airspace
  summary: 查询临时增加的管制空域
  group: 空域管理
  description: 根据时间、位置查询是否有临时增加的管制空域。遇有特殊情况（如重大活动、军事任务、抢险救灾）可临时增加管制空域。返回临时空域信息。
  depends_on: []
  params:
  - name: time
    type: str
    description: 查询时间，格式YYYY-MM-DD HH:MM
    default: null
  - name: location
    type: str
    description: 位置描述
    default: null
  involves_objects:
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十条
- name: check_fusion_flight_conditions
  summary: 检查是否满足融合飞行条件
  group: 飞行管理
  description: 根据无人机类型、高度、任务性质等，判断是否允许与有人驾驶航空器融合飞行。例如，警察、海关、应急部门的无人机可经批准融合飞行；微型、轻型在适飞空域内无需批准。返回是否允许及所需批准。
  depends_on:
  - check_uas_category_by_performance
  params:
  - name: uas_category
    type: str
    description: 无人机类别
    default: null
  - name: flight_height
    type: int
    description: 飞行高度（米）
    default: null
  - name: mission_type
    type: str
    description: 任务类型，如警察、海关、应急等
    default: null
  - name: airspace_type
    type: str
    description: 空域类型：适飞空域或管制空域
    default: null
  involves_objects:
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十二条
- name: check_uas_identification_transmission
  summary: 检查无人机是否按规定报送识别信息
  group: 无人机管理
  description: 根据无人机类别和飞行状态，检查是否向无人驾驶航空器一体化综合监管服务平台报送识别信息。除微型外，其他无人机应报送；微型、轻型、小型还应广播式自动发送。
  depends_on: []
  params:
  - name: uas_category
    type: str
    description: 无人机类别
    default: null
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十四条
- name: check_model_aircraft_flight_area
  summary: 检查模型航空器是否在指定空域飞行
  group: 空域管理
  description: 根据模型航空器飞行位置，判断是否在空中交通管理机构为航空飞行营地划定的空域内飞行。模型航空器应在划定空域内飞行。
  depends_on: []
  params:
  - name: location
    type: str
    description: 飞行位置描述
    default: null
  involves_objects:
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十六条
- name: check_foreign_uas_restrictions
  summary: 检查外国无人机或外国人员操控无人机的限制
  group: 无人机管理
  description: 外国无人驾驶航空器或由外国人员操控的无人机不得在我国境内实施测绘、电波参数测试等飞行活动。返回是否允许。
  depends_on: []
  params:
  - name: uas_origin
    type: str
    description: 无人机来源：国内或国外
    default: null
  - name: operator_nationality
    type: str
    description: 操控员国籍
    default: null
  - name: flight_purpose
    type: str
    description: 飞行目的
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第三十五条
- name: check_uas_modification_compliance
  summary: 检查无人机改装是否符合规定
  group: 无人机管理
  description: 对微型、轻型、小型无人机进行改装，需符合强制性国家标准；改变空域保持能力、被监视能力、速度或高度等性能参数，需及时更新信息。中型、大型重大设计更改需重新申请适航许可。返回合规性检查结果。
  depends_on: []
  params:
  - name: registration_number
    type: str
    description: 实名登记号
    default: null
  - name: modification_description
    type: str
    description: 改装描述
    default: null
  involves_objects:
  - UASRegistration
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十四条
- name: check_radio_frequency_compliance
  summary: 检查无人机无线电频率使用合规性
  group: 无人机管理
  description: 检查无人机使用的无线电频率是否属于国家无线电管理机构确定的特定频率，且发射设备是否取得型号核准。若满足，则无需取得频率使用许可和电台执照。
  depends_on: []
  params:
  - name: frequency
    type: str
    description: 无线电频率
    default: null
  - name: equipment_model
    type: str
    description: 无线电发射设备型号
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十五条
- name: check_operator_medical_certificate
  summary: 检查操控员是否持有有效体检合格证
  group: 无人机管理
  description: 对于国际IFR运行或局方确定的情况，操控员需持有有效体检合格证。返回体检合格证状态。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_operator_recent_experience
  summary: 检查操控员近期飞行经历是否满足要求
  group: 无人机管理
  description: 检查操控员最近24个日历月内是否满足定期检查或飞行经历要求，以及最近12个日历月内是否通过熟练检查（适用于大型或国际IFR运行）。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_operator_language_proficiency
  summary: 检查操控员语言能力等级
  group: 无人机管理
  description: 根据局方规定，检查操控员语言能力等级是否满足要求。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_operator_radio_qualification
  summary: 检查操控员是否具备无线电通信资格
  group: 无人机管理
  description: 检查操控员是否具备无线电通信资格。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_uas_production_license
  summary: 检查无人机生产许可证
  group: 无人机管理
  description: 根据生产者名称查询生产许可证，确认许可证编号、许可生产项目、有效期等。
  depends_on: []
  params:
  - name: manufacturer_name
    type: str
    description: 生产者名称
    default: null
  involves_objects:
  - UASProductionLicense
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第九条
- name: check_uas_recall
  summary: 检查无人机是否存在缺陷召回
  group: 无人机管理
  description: 根据无人机型号查询是否有缺陷召回记录。微型、轻型、小型无人机投放市场后发现缺陷的，生产者应召回。
  depends_on: []
  params:
  - name: drone_model
    type: str
    description: 无人机型号
    default: null
  involves_objects: []
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十三条
- name: check_emergency_response_plan_for_uas
  summary: 检查无人机相关应急预案制定情况
  group: 应急处置
  description: 检查空中交通管理机构、民用航空管理部门、县级以上公安机关是否制定无人机飞行安全管理应急预案，以及使用无人机的单位或个人是否制定飞行紧急情况处置预案。
  depends_on: []
  params:
  - name: unit_name
    type: str
    description: 单位名称
    default: null
  involves_objects:
  - EmergencyPlan
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第三十九条
- name: check_uas_emergency_function
  summary: 检查无人机是否具备应急处置功能
  group: 无人机管理
  description: 检查无人机设计者、生产者是否确保无人机具备紧急避让、降落等应急处置功能。
  depends_on: []
  params:
  - name: drone_model
    type: str
    description: 无人机型号
    default: null
  involves_objects:
  - Drone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第三十九条
- name: check_uas_airworthiness_certificate_type
  summary: 检查适航证类型及使用限制
  group: 无人机管理
  description: 根据适航证编号查询适航证类型（标准、特殊、特许、出口）及使用限制，如特殊适航证不得载人、不得融合飞行等。
  depends_on: []
  params:
  - name: certificate_number
    type: str
    description: 适航证编号
    default: null
  involves_objects:
  - UASAirworthinessCertificate
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第八条
- name: check_uas_operator_criminal_record
  summary: 检查操控员是否有犯罪记录
  group: 无人机管理
  description: 检查操控员近5年内是否有因危害国家安全、公共安全等故意犯罪受到刑事处罚的记录。有记录者不得申请操控员执照。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_uas_operator_drug_history
  summary: 检查操控员是否有吸毒行为记录
  group: 无人机管理
  description: 检查操控员是否有吸毒行为记录。有记录者不得申请操控员执照。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_uas_operator_medical_history
  summary: 检查操控员是否有影响操控的疾病病史
  group: 无人机管理
  description: 检查操控员是否有可能影响无人驾驶航空器操控行为的疾病病史。有者不得申请操控员执照。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条
- name: check_uas_operator_training
  summary: 检查操控员是否完成安全操控培训
  group: 无人机管理
  description: 检查操控员是否接受安全操控培训并经考核合格。对于小型、中型、大型无人机操控员，需取得执照；对于轻型无人机在管制空域内飞行，需培训合格。
  depends_on: []
  params:
  - name: license_number
    type: str
    description: 操控员执照编号或身份信息
    default: null
  - name: uas_category
    type: str
    description: 无人机类别
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十六条、第十七条
- name: check_uas_operator_age_capacity
  summary: 检查操控员民事行为能力与年龄限制
  group: 无人机管理
  description: 检查操控员是否具备完全民事行为能力。无民事行为能力人只能操控微型无人机，限制民事行为能力人只能操控微型、轻型无人机，且需完全民事行为能力人现场指导。
  depends_on: []
  params:
  - name: operator_id
    type: str
    description: 操控员身份信息
    default: null
  - name: uas_category
    type: str
    description: 无人机类别
    default: null
  involves_objects:
  - DroneOperator
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第二章第十七条
- name: check_uas_flight_plan_content
  summary: 检查飞行计划内容是否完整
  group: 飞行管理
  description: 根据飞行计划ID，检查计划内容是否包含所有必要信息：组织单位、操控人员、无人机信息、飞行任务、起降场地、通信联络、时间、航线、高度、速度、空域、无线电频率、监视能力、应急处置程序等。返回缺失项列表。
  depends_on: []
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - UASFlightPlan
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十七条
- name: check_uas_flight_plan_approval_authority
  summary: 确定飞行计划审批权限
  group: 飞行管理
  description: 根据飞行空域范围，确定应由哪一级空中交通管理机构审批：飞行管制分区内由分区机构批准，跨分区由管制区机构批准，跨管制区由国家授权的机构批准。
  depends_on: []
  params:
  - name: airspace_scope
    type: str
    description: 飞行空域范围描述
    default: null
  involves_objects:
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十八条
- name: check_uas_flight_plan_approval_deadline
  summary: 检查飞行计划审批时限
  group: 飞行管理
  description: 根据飞行计划提交时间和类型，检查是否满足审批时限要求。常规飞行：拟飞行前1日12时前申请，21时前批准；紧急任务：起飞30分钟前申请，10分钟前批准。返回是否超时。
  depends_on: []
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  - name: submission_time
    type: str
    description: 提交时间，格式YYYY-MM-DD HH:MM
    default: null
  - name: is_emergency
    type: bool
    description: 是否为紧急任务
    default: false
  involves_objects:
  - UASFlightPlan
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十六条、第二十九条
- name: check_uas_flight_plan_approval_result
  summary: 获取飞行计划审批结果
  group: 飞行管理
  description: 根据飞行计划ID查询审批结果，返回批准或不批准及原因。
  depends_on: []
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - FlightApproval
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十八条
- name: check_uas_flight_plan_approval_conditions
  summary: 检查飞行计划批准条件是否满足
  group: 飞行管理
  description: 综合检查无人机登记、适航、操控员资质、空域、保险、无线电频率等条件，判断飞行计划是否具备批准条件。返回条件满足情况列表。
  depends_on:
  - check_uas_registration
  - check_uas_airworthiness
  - check_operator_license
  - check_airspace_classification
  - check_uas_insurance
  - check_radio_frequency_compliance
  params:
  - name: plan_id
    type: str
    description: 飞行计划ID
    default: null
  involves_objects:
  - UASFlightPlan
  - UASRegistration
  - UASAirworthinessCertificate
  - DroneOperator
  - AirspaceZone
  source: S3_无人驾驶航空器飞行管理暂行条例.md 相关章节
- name: check_uas_flight_log_identification
  summary: 检查飞行日志中识别信息报送情况
  group: 无人机管理
  description: 根据飞行日志ID，检查无人机是否按规定向一体化综合监管服务平台报送识别信息，以及微型、轻型、小型无人机是否广播式自动发送识别信息。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十四条
- name: check_uas_flight_log_emergency_report
  summary: 检查飞行异常报告是否及时提交
  group: 应急处置
  description: 根据飞行日志ID，检查是否在降落后24小时内向空中交通管理机构报告异常情况。返回是否及时报告。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第四章第四十条
- name: check_uas_flight_log_emergency_plan
  summary: 检查飞行日志中是否包含应急处置预案
  group: 飞行管理
  description: 根据飞行日志ID，检查飞行计划或日志中是否包含应急处置程序。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
  source: S3_无人驾驶航空器飞行管理暂行条例.md 第三章第二十七条
- name: check_uas_flight_log_communication
  summary: 检查飞行日志中通信联络情况
  group: 飞行管理
  description: 根据飞行日志ID，检查飞行过程中是否与空中交通管理机构保持通信联络畅通。
  depends_on: []
  params:
  - name: flight_log_id
    type: str
    description: 飞行日志ID
    default: null
  involves_objects:
  - UASFlightLog
