functions:
- name: assess_damage_grade
  summary: 根据设施类型和损伤程度评估损伤等级（I/II/III）和抢通建议（观察通行/限制通行并加强观测/禁止通行并实施抢通）。
  group: 应急评估
  description: 输入设施类型（road_segment、bridge、tunnel）和损伤程度（无损伤或轻微损伤、中等损伤、严重损伤或坍塌），对照损伤分级标准（DamageGradeStandard）输出损伤等级（I/II/III）和对应的抢通建议。设施类型映射：road_segment→路基路面，bridge→桥涵，tunnel→隧道。若无匹配记录则返回空值。
  depends_on: []
  params:
  - name: facility_type
    type: str
    description: 设施类型，枚举值：road_segment, bridge, tunnel
    default: null
  - name: damage_degree
    type: str
    description: 损伤程度描述，如'无损伤或轻微损伤'、'中等损伤'、'严重损伤或坍塌'
    default: null
  involves_objects:
  - DamageGradeStandard
  - FacilityInspection
  source: 公路交通应急抢通技术规程 3.3.5
  hint: 'R1: 将输入参数 facility_type 转换为 DamageGradeStandard 中的设施类型：road_segment→路基路面，bridge→桥涵，tunnel→隧道。

    R2: 根据转换后的设施类型和 damage_degree，在 DamageGradeStandard 中查找匹配记录，返回对应的 damage_level（1=I级，2=II级，3=III级）和
    clearance_suggestion。

    注意: damage_degree 值必须是 ''无损伤或轻微损伤''、''中等损伤''、''严重损伤或坍塌'' 之一；若未找到匹配记录，返回空值。'
- name: determine_tunnel_target
  summary: 根据隧道重要等级和抢通难度，查询目标矩阵，输出抢通目标等级。
  group: 隧道抢通
  description: 输入隧道重要等级 importance_level（一级/二级/三级）和抢通难度等级 difficulty_level（高难度/中等难度/低难度），通过查询
    TunnelTargetMatrix 对象（该对象由 difficulty_level 和 importance_level 映射到 target_level），返回对应的抢通目标等级（I级：禁止通行并改道；II级：限制性通行，允许人员/两轮摩托；III级：保证基本抢险车辆通行）。若未找到匹配，返回错误。
  depends_on:
  - assess_tunnel_importance
  - assess_tunnel_difficulty
  params:
  - name: importance_level
    type: str
    description: 隧道重要等级，枚举值：一级、二级、三级
    default: null
  - name: difficulty_level
    type: str
    description: 隧道抢通难度等级，枚举值：高难度、中等难度、低难度
    default: null
  involves_objects:
  - TunnelImportanceLevel
  - TunnelDifficultyMatrix
  - TunnelTargetMatrix
  source: 公路交通应急处置技术规范 8.4
  hint: 'R1: 输入 importance_level（一级/二级/三级）和 difficulty_level（高难度/中等难度/低难度），查询 TunnelTargetMatrix
    中匹配的记录，输出对应的 target_level（I级/II级/III级）。

    R2: 若未找到匹配记录，则返回错误。

    注意：输入必须在枚举值范围内。'
- name: assess_tunnel_difficulty
  summary: 根据抢通时长评级和次生事故风险等级，通过查表确定隧道抢通难度等级。
  group: 隧道抢通
  description: 输入抢通时长评级（duration_rating）和次生事故风险等级（risk_level），查询隧道抢通难度矩阵（TunnelDifficultyMatrix），输出对应的抢通难度等级（difficulty_level），枚举值为'高难度'、'中等难度'、'低难度'。
  depends_on: []
  params:
  - name: duration_rating
    type: str
    description: 抢通时长评级，枚举值：A（抢通时间太长）、B（较长）、C（基本满足）、D（很短）
    default: null
  - name: risk_level
    type: str
    description: 次生事故风险等级，枚举值：I级、II级、III级、IV级
    default: null
  involves_objects:
  - TunnelDifficultyMatrix
  source: 公路交通应急处置技术规范 8.3
  hint: 'R1: duration_rating 必须是枚举值之一：A、B、C、D。

    R2: risk_level 必须是枚举值之一：I级、II级、III级、IV级。

    R3: 根据 duration_rating 和 risk_level 查询 TunnelDifficultyMatrix，返回对应的 difficulty_level（高难度、中等难度、低难度）。

    注意：若组合不存在，则返回错误。'
- name: determine_response_level
  summary: 根据事件等级名称映射应急响应等级（一级~四级）
  group: 应急指挥
  description: 输入事件等级名称（特别重大/重大/较大/一般），查询响应级别规则表，输出对应的应急响应等级（一级/二级/三级/四级）。映射规则：特别重大→一级，重大→二级，较大→三级，一般→四级。
  depends_on: []
  params:
  - name: event_level
    type: str
    description: 事件等级名称，枚举值：特别重大、重大、较大、一般
    default: null
  involves_objects:
  - EventLevelStandard
  - ResponseLevelRule
  source: 交通运输综合应急预案 4 应急响应
  hint: 'R1: event_level为''特别重大'' → 应急响应等级为''一级''。

    R2: event_level为''重大'' → 应急响应等级为''二级''。

    R3: event_level为''较大'' → 应急响应等级为''三级''。

    R4: event_level为''一般'' → 应急响应等级为''四级''。

    注意: 事件等级名称必须为枚举值之一，输入其他值无效。'
- name: determine_defense_response_level
  summary: 根据气象预警确定防御响应等级和启动条件
  group: 防御响应
  description: 输入灾害类型和预警级别颜色，查询防御响应启动条件，输出防御响应等级（1~4）和启动条件描述。
  depends_on: []
  params:
  - name: disaster_type
    type: str
    description: 灾害类型，如台风、暴雨等
    default: null
  - name: warning_level
    type: str
    description: 预警级别颜色，枚举值：红色、橙色、黄色、蓝色
    default: null
  involves_objects:
  - WeatherWarning
  - DefenseResponse
  - EventLevelStandard
  source: 交通运输综合应急预案 附件 部防御响应启动条件
  hint: 'R1: 根据disaster_type和warning_level，从DefenseResponse对象中获取对应的response_level和trigger_condition。注意：如果预警级别无效，返回错误。'
- name: classify_drone
  summary: 根据无人机的空机重量、最大起飞重量、最大速度、最大真高，参照分类标准确定其类型（微型/轻型/小型/中型/大型）。
  group: 无人机管理
  description: 输入空机重量（kg）、最大起飞重量（kg）、最大平飞速度（km/h）、最大飞行真高（m），对照《无人驾驶航空器飞行管理暂行条例》第二章的分类标准，输出无人机类型。规则按顺序判断：首先判断是否满足微型条件（空机重量<0.25kg且速度≤40km/h且高度≤50m），否则判断轻型（空机重量≤4kg且最大起飞重量≤7kg且速度≤100km/h），否则判断小型（空机重量≤15kg且最大起飞重量≤25kg），否则判断中型（最大起飞重量≤150kg），否则为大型。注意：分类规则基于
    DroneClassRule 对象中的阈值，且只考虑数值参数，忽略空域保持等布尔条件。
  depends_on: []
  params:
  - name: empty_weight
    type: float
    description: 空机重量，单位kg
    default: null
  - name: max_takeoff_weight
    type: float
    description: 最大起飞重量，单位kg
    default: null
  - name: max_speed
    type: float
    description: 最大平飞速度，单位km/h
    default: null
  - name: max_altitude
    type: float
    description: 最大飞行真高，单位m
    default: null
  involves_objects:
  - Drone
  - DroneClassRule
  source: 无人驾驶航空器飞行管理暂行条例 第二章
  hint: 'R1: 如果 empty_weight < 0.25 (kg) 且 max_speed ≤ 40 (km/h) 且 max_altitude ≤
    50 (m)，则类型为"微型"。

    R2: 否则，如果 empty_weight ≤ 4 (kg) 且 max_takeoff_weight ≤ 7 (kg) 且 max_speed ≤ 100
    (km/h)，则类型为"轻型"。

    R3: 否则，如果 empty_weight ≤ 15 (kg) 且 max_takeoff_weight ≤ 25 (kg)，则类型为"小型"。

    R4: 否则，如果 max_takeoff_weight ≤ 150 (kg)，则类型为"中型"。

    R5: 否则，类型为"大型"。

    注意: 规则按顺序判断，满足条件即确定类型，不继续检查后续规则。所有阈值基于 DroneClassRule 对象中的对应字段。'
