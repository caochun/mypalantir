- name: make_emergency_passability_decision
  summary: 依据应急通行评估结果，做出应急通行决策，包括决策结果（限制通行或禁止通行）、通行限制条件和提示信息。
  group: 应急决策
  description: 根据设施类型（road_subgrade/bridge/tunnel）调用对应的应急通行评估函数获取评估结果，然后基于评估结果做出决策：若评估结果为'passable'则决策为限制通行并设置具体限制条件；若为'impassable'则决策为禁止通行。最终将决策信息记录到TrafficControlImplementation对象中。
  depends_on:
  - conduct_emergency_passability_assessment_for_road_subgrade
  - conduct_emergency_passability_assessment_for_bridge
  - conduct_emergency_passability_assessment_for_tunnel
  params:
  - name: facility_type
    type: str
    description: 设施类型
    default: null
  - name: facility_name
    type: str
    description: 设施名称
    default: null
  - name: assessment_result
    type: str
    description: 评估结果
    default: null
  involves_objects:
  - TrafficControlImplementation
  source: 公路交通应急抢通技术规程 5.2.6
  hint: 'R1: 如果 facility_type 为 ''road_subgrade''，则调用 conduct_emergency_passability_assessment_for_road_subgrade
    获取评估结果。

    R2: 如果 facility_type 为 ''bridge''，则调用 conduct_emergency_passability_assessment_for_bridge
    获取评估结果。

    R3: 如果 facility_type 为 ''tunnel''，则调用 conduct_emergency_passability_assessment_for_tunnel
    获取评估结果。

    R4: 根据 assessment_result 做出决策：若评估结果为 ''passable''，则决策结果为 ''限制通行''，并设置通行限制条件（如限速、限载等）；若评估结果为
    ''impassable''，则决策结果为 ''禁止通行''。

    R5: 决策结果、通行限制条件和提示信息应记录到 TrafficControlImplementation 对象中。

    注意: 评估结果 assessment_result 由对应的评估函数返回，本函数不直接计算。'
- name: generate_event_information_report
  summary: 按照首报要快、续报要准、终报要全的原则，生成灾情信息报告（首报/续报/终报），包含事件基本信息、处置进展、发展趋势等。
  group: 信息报送
  description: 根据报告类型（首报、续报、终报）生成灾情信息报告。首报需快速报送事件基本信息（事件类型、时间、地点、来源、性质、影响范围、损害程度、伤亡、趋势、措施、报送单位、联系人、电话）；续报需准确补充事件起因、性质详情、基本过程、下一步计划；终报需全面汇总所有信息。所有报告必须关联事件标识（event_id）。
  depends_on: []
  params:
  - name: report_type
    type: str
    description: 报告类型：首报、续报、终报
    default: null
  - name: event_id
    type: str
    description: 事件标识
    default: null
  involves_objects:
  - EventReport
  source: 公路交通应急抢通技术规程 3.3.1
  hint: 'R1: 报告类型为“首报”时，应遵循“首报要快”原则，优先报送事件基本信息，包括事件类型、事件时间、事件地点、信息来源、事件性质、影响范围、损害程度、人员伤亡和失踪情况、发展趋势、已采取的措施、信息报送单位、联系人、联系电话。

    R2: 报告类型为“续报”时，应遵循“续报要准”原则，在首报基础上补充事件起因、事件性质详细描述、基本过程、下一步工作计划。

    R3: 报告类型为“终报”时，应遵循“终报要全”原则，在续报基础上汇总所有信息，确保完整。

    注意: 所有报告类型均需包含事件标识（event_id）以关联事件。'
