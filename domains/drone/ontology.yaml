  network_damage_survey_has_damage_grade_standard:
    source: NetworkDamageSurvey
    target: DamageGradeStandard
    join:
      source_key: damage_level
      target_key: damage_level
    description: 路网灾情调查汇总表的损伤等级引用损伤分级标准中的等级，用于确定抢通建议。
