functions:
  determine_defense_response_level:
    summary: 根据气象预警信息（台风中心风力、预警颜色等）和防御响应启动条件，确定应启动的防御响应等级（一级至四级）。
    group: 防御响应
    description: 根据气象预警信息（如台风中心风力、预警颜色等）和防御响应启动条件，确定应启动的防御响应等级（一级至四级）。仅支持台风类型的预警，其他预警类型返回
      null。规则依据《交通运输综合应急预案》附件1.1-1.4。
    depends_on: []
    hint: "R1: 如果 warning_type 为 '台风'，则根据 wind_speed_center 和 forecast_hours 确定防御响应等级：\n\
      \    - 若 forecast_hours <= 48 且 wind_speed_center >= 16，则 level = 1（一级）。\n \
      \   - 若 forecast_hours <= 48 且 wind_speed_center >= 14，则 level = 2（二级）。\n  \
      \  - 若 forecast_hours <= 48 且 wind_speed_center >= 12，则 level = 3（三级）。\n   \
      \ - 若 forecast_hours <= 96 且 wind_speed_center >= 8，则 level = 4（四级）。\nR2: 如果\
      \ warning_type 为 '台风'，且已经达到下一级响应标准但仍可能持续发展或影响其他地区，则启动当前级响应（即升级）。\nR3: 对于其他 warning_type（如冬季大风、寒潮、风暴潮、海冰、海啸等），参考附件中对应的启动条件，但本函数仅处理台风，其他类型返回\
      \ null。\n注意: 防御响应等级从高到低为一级（1）、二级（2）、三级（3）、四级（4）。wind_speed_center 单位为级，forecast_hours\
      \ 单位为小时。"
    params:
      warning_type:
        type: str
        description: 预警类型，如台风、暴雨、低温雨雪冰冻等
      wind_speed_center:
        type: int
        description: 台风中心风力（级）
      warning_level:
        type: int
        description: 预警级别，1=红色,2=橙色,3=黄色,4=蓝色
      forecast_hours:
        type: int
        description: 预计影响时间（小时）
  determine_emergency_response_level:
    summary: 根据突发事件类型和等级确定应急响应等级（一级至四级）
    group: 应急响应
    description: 根据突发事件（自然灾害、事故灾难等）的等级（特别重大、重大、较大、一般），结合预案规定，确定应启动的应急响应等级（一级至四级）。事件等级与响应等级的对应关系依据《交通运输综合应急预案》1.4节和4.1节：特别重大对应一级，重大对应二级，较大对应三级，一般对应四级。当突发事件涉及多个领域时，事件等级依照受影响最严重、定级最高的领域确定。
    depends_on: []
    hint: 'R1: 如果 event_type 为自然灾害或事故灾难，则根据 event_level 确定应急响应等级：event_level=1（特别重大）对应一级响应，event_level=2（重大）对应二级响应，event_level=3（较大）对应三级响应，event_level=4（一般）对应四级响应。

      R2: 如果 event_type 为公路交通突发事件，则根据事件等级确定应急响应等级：特别重大对应一级响应，重大对应二级响应，较大对应三级响应，一般对应四级响应。

      R3: 如果 event_type 为水路交通突发事件，则特别重大对应一级响应，重大及以下对应二级响应（需地方请求或部研判）。

      R4: 如果 event_type 为道路运输突发事件，则特别重大对应一级响应，重大对应二级响应。

      R5: 如果 event_type 为公路水运工程生产安全事故，则特别重大（或30人以上失踪/失联）对应一级响应，其他等级对应二级响应。

      注意: 事件等级与响应等级的对应关系依据《交通运输综合应急预案》1.4节和4.1节；当突发事件涉及多个领域时，事件等级依照受影响最严重、定级最高的领域确定。'
    params:
      event_type:
        type: str
        description: 事件类型，如自然灾害、事故灾难
      event_level:
        type: int
        description: 事件等级，1=特别重大,2=重大,3=较大,4=一般
  assess_bridge_damage:
    summary: 根据桥梁的整体稳定性、承载能力、桥面通行能力损伤等级，综合评估通行结论（正常通行、限制通行、禁止通行）。
    group: 应急评估
    description: 根据桥梁的整体稳定性损伤等级（overall_stability_grade）、承载能力损伤等级（bearing_capacity_grade）和桥面通行能力损伤等级（deck_passability_grade），综合评估桥梁的通行结论（passability_conclusion）。规则：任一损伤等级为III级则禁止通行；全部为I级则正常通行；全部为II级则限制通行；等级不一致时取最高等级。
    depends_on: []
    hint: 'R1: 如果 overall_stability_grade 为 III 级，则 passability_conclusion = 禁止通行。

      R2: 如果 bearing_capacity_grade 为 III 级，则 passability_conclusion = 禁止通行。

      R3: 如果 deck_passability_grade 为 III 级，则 passability_conclusion = 禁止通行。

      R4: 如果 overall_stability_grade 为 II 级且 bearing_capacity_grade 为 II 级且 deck_passability_grade
      为 II 级，则 passability_conclusion = 限制通行。

      R5: 如果 overall_stability_grade 为 I 级且 bearing_capacity_grade 为 I 级且 deck_passability_grade
      为 I 级，则 passability_conclusion = 正常通行。

      注意: 当三个损伤等级不一致时，取最高等级作为最终结论。'
    params:
      bridge_name:
        type: str
        description: 桥梁名称
      overall_stability_grade:
        type: str
        description: 整体稳定性损伤等级，I级/II级/III级
      bearing_capacity_grade:
        type: str
        description: 承载能力损伤等级，I级/II级/III级
      deck_passability_grade:
        type: str
        description: 桥面通行能力损伤等级，I级/II级/III级
  assess_tunnel_damage:
    summary: 评估隧道损伤等级并确定抢通目标
    group: 应急评估
    description: 根据隧道受损程度等级（1级/2级/3级）评估隧道的重要等级、抢通难度、次生事故风险等级和抢通目标等级。规则：1级→三级/低难度/IV级/III级；2级→二级/中等难度/III级/II级；3级→一级/高难度/I级/I级。
    depends_on: []
    hint: 'R1: 如果 damage_grade 为 ''1级''，则 importance_level 为 ''三级''，clearance_difficulty_level
      为 ''低难度''，secondary_disaster_risk_level 为 ''IV级''，clearance_target_level 为 ''III级''。

      R2: 如果 damage_grade 为 ''2级''，则 importance_level 为 ''二级''，clearance_difficulty_level
      为 ''中等难度''，secondary_disaster_risk_level 为 ''III级''，clearance_target_level 为
      ''II级''。

      R3: 如果 damage_grade 为 ''3级''，则 importance_level 为 ''一级''，clearance_difficulty_level
      为 ''高难度''，secondary_disaster_risk_level 为 ''I级''，clearance_target_level 为 ''I级''。

      注意: 规则基于 damage_grade 直接映射，未考虑其他因素。'
    params:
      tunnel_name:
        type: str
        description: 隧道名称
      damage_grade:
        type: str
        description: 隧道受损程度等级，1级/2级/3级
      structure_type:
        type: str
        description: 结构类型，如土质、石质
  assess_road_subgrade_damage:
    summary: 评估路基路面损伤等级并给出通行建议（正常通行、限制通行、禁止通行）
    group: 应急评估
    description: 根据路基本体、边坡、支挡结构的受损程度等级（I级/II级/III级），综合评估路基路面的通行建议。规则：全部I级则正常通行；任一III级则禁止通行；其余情况限制通行。
    depends_on: []
    hint: 'R1: 如果 subgrade_damage_grade、slope_damage_grade、retaining_structure_damage_grade
      均为 I 级 → 通行建议为正常通行。

      R2: 如果 subgrade_damage_grade、slope_damage_grade、retaining_structure_damage_grade
      中任一为 III 级 → 通行建议为禁止通行。

      R3: 其他情况 → 通行建议为限制通行。

      注意: 受损程度等级仅允许 I 级、II 级、III 级，输入其他值视为无效。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      subgrade_damage_grade:
        type: str
        description: 路基本体受损程度等级，I级/II级/III级
      slope_damage_grade:
        type: str
        description: 边坡受损程度等级，I级/II级/III级
      retaining_structure_damage_grade:
        type: str
        description: 支挡结构受损程度等级，I级/II级/III级
  recommend_traffic_control_measure:
    summary: 根据损伤等级或事件类型推荐交通管制措施
    group: 交通管控
    description: 根据设施损伤等级（I/II/III级）或事件类型（如台风、暴雨），从 TrafficControlRule 对象中匹配适用的管制措施（如限速、限载、封闭等），返回匹配的规则列表。
    depends_on: []
    hint: 'R1: 如果提供了 damage_grade，则根据 damage_grade 匹配 TrafficControlRule 中 damage_grade
      相同的规则，返回对应的 control_measure 和 control_measure_detail。

      R2: 如果提供了 event_type，则根据 event_type 匹配 TrafficControlRule 中 event_type 相同的规则，返回对应的
      control_measure 和 control_measure_detail。

      R3: 如果同时提供了 damage_grade 和 event_type，则优先匹配同时满足两者的规则；若无完全匹配，则分别匹配后取并集。

      注意: 若未提供任何参数，返回空列表。'
    params:
      damage_grade:
        type: str
        description: 损伤等级，I级/II级/III级
      event_type:
        type: str
        description: 事件类型，如台风、暴雨
  recommend_clearance_technique:
    summary: 根据设施类型、灾损类型和规模，从抢通技术规则中推荐抢通技术。
    group: 抢通恢复
    description: 根据设施类型（如路基路面、桥涵、隧道）、灾损类型（如滑坡、泥石流、塌方）和规模（如小型、中型、大型），从 ClearanceTechniqueRule
      对象中匹配推荐的抢通技术。返回匹配的 recommended_technique 列表；若未匹配则返回空列表。
    depends_on: []
    hint: 'R1: 如果 facility_type、damage_type、scale 均非空，则从 ClearanceTechniqueRule 中匹配
      facility_type、damage_type、scale 完全一致的记录，返回 recommended_technique。

      R2: 如果匹配到多条记录，返回所有匹配的 recommended_technique 列表。

      R3: 如果未匹配到任何记录，返回空列表。

      注意: 参数 facility_type、damage_type、scale 均为可选，但至少提供 facility_type 和 damage_type
      才能有效匹配；scale 为空时匹配所有规模。'
    params:
      facility_type:
        type: str
        description: 设施类型，如路基路面、桥涵、隧道
      damage_type:
        type: str
        description: 灾损类型，如滑坡、泥石流、塌方
      scale:
        type: str
        description: 规模描述，如小型、中型、大型
  dispatch_emergency_resources:
    summary: 根据事件类型和需求，从应急储备点调度装备、物资或救援队伍到指定地点，并记录调度信息。
    group: 资源调度
    description: 根据事件ID和资源类型（装备、物资、队伍），从指定来源地点调度指定名称和数量的资源到目的地。调度前需验证库存或队伍人数是否充足，调度成功后创建调度记录，包含运输方式和时间信息。
    depends_on: []
    hint: 'R1: 如果 resource_type 为 ''装备''，则必须从 EquipmentStock 中查询 equipment_name 等于
      resource_name 且 depot_id 对应 source_location 的储备点，且 quantity 大于等于请求数量。

      R2: 如果 resource_type 为 ''物资''，则必须从 MaterialStock 中查询 material_name 等于 resource_name
      且 depot_id 对应 source_location 的储备点，且 quantity 大于等于请求数量。

      R3: 如果 resource_type 为 ''队伍''，则必须从 RescueTeam 中查询 team_name 等于 resource_name
      且 location 等于 source_location 的队伍，且 member_count 大于等于请求数量。

      R4: 调度成功后，必须创建 EmergencyResourceDispatchRecord 记录，包含 event_id、resource_type、resource_name、quantity、source_location、destination_location、transport_mode（根据资源类型和重量等级确定）、dispatch_time（当前时间）、arrival_time（根据运输方式和距离估算）。

      注意: 如果库存不足或队伍人数不足，应返回错误信息，不创建调度记录。'
    params:
      event_id:
        type: str
        description: 关联事件ID
      resource_type:
        type: str
        description: 资源类型，如装备、物资、队伍
      resource_name:
        type: str
        description: 资源名称
      quantity:
        type: int
        description: 数量
      source_location:
        type: str
        description: 来源地点
      destination_location:
        type: str
        description: 目的地
  check_flight_approval_eligibility:
    summary: 检查无人机飞行审批条件是否满足，返回批准或不批准建议。
    group: 无人机管理
    description: 根据飞行计划、无人机登记信息、操控员资质、空域限制等，检查飞行审批条件是否满足，返回审批建议。
    depends_on: []
    hint: 'R1: 飞行计划 approval_status 为“已批准” → 直接返回“批准”。

      R2: 飞行计划 approval_status 为“已拒绝” → 直接返回“不批准”。

      R3: 飞行计划 approval_status 为“待审批” → 检查以下条件：

      R4: 无人机 drone_category 为“微型” → 无需审批，返回“批准”。

      R5: 无人机 drone_category 为“轻型”且 max_takeoff_weight ≤ 7 千克 → 在适飞空域内飞行无需审批，返回“批准”。

      R6: 无人机 drone_category 为“轻型”且 max_takeoff_weight > 7 千克 → 需审批。

      R7: 无人机 drone_category 为“小型”、“中型”或“大型” → 需审批。

      R8: 需审批时，检查操控员资质：操控员 license_type 为“操控员执照”且 license_valid_from 和 license_expiry_date
      覆盖飞行日期，且 full_civil_capacity 为 true，且 training_qualified 为 true，且 criminal_record_5y
      为 false → 操控员资质合格；否则不合格。

      R9: 需审批时，检查无人机登记：registration_number 不为空且 nationality_mark 为“B” → 登记合格；否则不合格。

      R10: 需审批时，检查空域限制：飞行计划中的空域与 AirspaceZone 匹配，若 zone_type 为“管制空域”则需审批，若为“适飞空域”且无人机符合适飞条件则无需审批。

      R11: 若所有检查通过 → 返回“批准”；否则返回“不批准”。

      注意: 适飞空域内，微型无人机和轻型无人机（max_takeoff_weight ≤ 7 千克）无需审批；其他情况需审批。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  calculate_emergency_response_duration:
    summary: 计算应急响应持续时间（小时）
    group: 应急响应
    description: 根据应急响应开始时间和结束时间，计算响应持续时间（小时）。开始时间和结束时间格式为 YYYY-MM-DD HH:MM。如果结束时间早于开始时间，返回
      0。
    depends_on: []
    hint: 'R1: 响应持续时间 = end_time - start_time，结果以小时为单位。

      R2: 如果 end_time 早于 start_time，则返回 0。

      注意: 时间格式为 YYYY-MM-DD HH:MM，精确到分钟。'
    params:
      start_time:
        type: str
        description: 开始时间，格式YYYY-MM-DD HH:MM
      end_time:
        type: str
        description: 结束时间，格式YYYY-MM-DD HH:MM
  generate_event_report_summary:
    summary: 生成灾情信息报告摘要
    group: 信息报告
    description: 根据事件报告的关键字段（事件类型、时间、地点、伤亡、损失等），生成简洁的灾情摘要。
    depends_on: []
    hint: 'R1: 根据事件报告的关键字段（事件类型、时间、地点、伤亡、损失等），生成简洁的灾情摘要。

      注意: 摘要应包含事件类型、时间、地点、伤亡和损失等核心信息，语言简洁明了。'
    params:
      event_report_id:
        type: str
        description: 事件报告ID
  find_nearby_emergency_depots:
    summary: 查找事件地点附近的应急储备点，按距离排序。
    group: 资源调度
    description: 根据事件地点坐标或描述，查找距离最近的应急储备点列表，按距离升序排序。可指定搜索半径（公里），默认50公里。返回 EmergencyDepot
      对象列表。
    depends_on: []
    hint: 'R1: 如果 location 不为空，则优先使用 location 描述进行地理编码，否则使用事件地点坐标。

      R2: 搜索半径 radius_km 默认为 50 公里。

      R3: 返回距离事件地点最近的应急储备点列表，按距离升序排序。

      注意: 如果找不到任何储备点，返回空列表。'
    params:
      location:
        type: str
        description: 事件地点描述
      radius_km:
        type: int
        description: 搜索半径（公里）
        default: 50
  check_equipment_availability:
    summary: 检查指定储备点或全局库存中某装备的可用数量（仅良好状态）是否满足需求
    group: 资源调度
    description: 根据装备名称和所需数量，检查指定储备点（depot_id）或全局库存中该装备的可用数量（仅统计 status 为“良好”的记录），返回可用数量和状态（满足/不足）。
    depends_on: []
    hint: 'R1: 如果 depot_id 不为空，则仅检查指定储备点（depot_id）中 equipment_name 匹配且 status 为“良好”的库存记录，汇总
      quantity 作为可用数量。

      R2: 如果 depot_id 为空，则检查所有储备点中 equipment_name 匹配且 status 为“良好”的库存记录，汇总 quantity
      作为可用数量。

      R3: 如果汇总的可用数量 >= required_quantity，则返回可用数量（汇总值）和状态“满足”；否则返回可用数量和状态“不足”。

      注意: 仅考虑 status 为“良好”的库存；其他状态（待修、报废等）不计入可用数量。'
    params:
      equipment_name:
        type: str
        description: 装备名称
      required_quantity:
        type: int
        description: 所需数量
      depot_id:
        type: int
        description: 储备点ID，可选
  check_material_availability:
    summary: 检查指定储备点或全局库存中某物资的可用数量是否满足需求，返回可用数量和状态。
    group: 资源调度
    description: 根据物资名称和所需数量，检查指定储备点（depot_id）或全局库存中该物资的可用数量是否满足需求。如果 depot_id 不为空，则只检查该储备点的库存；否则检查所有储备点的库存总和。返回可用数量和状态（充足/不足）。
    depends_on: []
    hint: 'R1: 如果 depot_id 不为空，则只检查该储备点的库存；否则检查所有储备点的库存总和。

      R2: 如果库存数量 >= required_quantity，则状态为“充足”；否则状态为“不足”。

      注意: 库存数量为 MaterialStock 对象的 quantity 字段，单位为 unit 字段。'
    params:
      material_name:
        type: str
        description: 物资名称
      required_quantity:
        type: int
        description: 所需数量
      depot_id:
        type: int
        description: 储备点ID，可选
  calculate_road_blockage_impact:
    summary: 计算道路阻断影响范围，包括受影响路段长度、绕行距离、影响车辆数等。
    group: 应急评估
    description: 根据阻断路段标识和阻断程度，估算受影响的路段长度、绕行距离、影响车辆数等指标。阻断程度可参考自然灾害事件或交通事故事件中的阻断程度描述。
    depends_on: []
    hint: 'R1: 根据阻断路段 road_segment_id 和阻断程度 blockage_degree，估算受影响的路段长度、绕行距离、影响车辆数等。

      R2: 阻断程度 blockage_degree 可参考 DisasterEvent.road_blockage_degree 或 AccidentEvent.road_blockage_degree。

      注意: 若无相关事件对象，则根据输入参数直接估算。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      blockage_degree:
        type: str
        description: 阻断程度描述
  generate_patrol_task:
    summary: 根据预警信息和风险路段，生成巡查任务，包括巡查范围、内容、频次等。
    group: 预防预警
    description: 根据预警类型（warning_type）和风险等级（risk_level），生成巡查任务（PatrolRecord），包括巡查范围（patrol_area）、巡查内容（patrol_content）、巡查频次（patrol_frequency）等。预警类型包括台风、暴雨、低温雨雪冰冻、大雾、寒潮、海上大风、冬季大风、风暴潮、海冰、海啸、沙尘暴、霾；风险等级包括高风险、较高风险。
    depends_on: []
    hint: 'R1: warning_type 为台风、暴雨、低温雨雪冰冻、大雾、寒潮、海上大风、冬季大风、风暴潮、海冰、海啸、沙尘暴、霾之一。

      R2: risk_level 为高风险、较高风险之一。

      R3: 根据预警类型和风险等级，确定巡查范围、内容、频次。

      注意: 具体规则需参考应急预案，但文档未提供详细映射。'
    params:
      warning_type:
        type: str
        description: 预警类型
      affected_area:
        type: str
        description: 影响区域
      risk_level:
        type: str
        description: 风险等级
  evaluate_emergency_capability:
    summary: 评估单位应急能力等级
    group: 应急管理
    description: 根据组织、队伍、物资、预案、演练、培训等方面的评分或等级，综合评估单位的应急能力等级。
    depends_on: []
    hint: 'R1: 根据组织、队伍、物资、预案、演练、培训等方面的评分或等级，综合评估单位的应急能力等级。

      注意: 具体评估算法未在文档中明确，需根据实际评分或等级进行综合判断。'
    params:
      unit_name:
        type: str
        description: 被评估单位名称
  identify_hazard:
    summary: 对指定路段进行风险辨识，记录风险类型、等级、描述等信息。
    group: 预防预警
    description: 根据路段标识 road_segment_id 查找对应路段，验证风险类型和等级的有效性，然后创建风险辨识记录，包含风险类型、等级、描述等字段，并自动生成记录ID和辨识日期。
    depends_on: []
    hint: 'R1: 如果 road_segment_id 对应的 RoadSegment 不存在，则返回错误。

      R2: 风险等级 hazard_level 必须为 ''高''、''中''、''低'' 之一。

      R3: 风险类型 hazard_type 必须为预定义类型，如 ''地质灾害''、''气象灾害'' 等。

      R4: 创建 HazardIdentificationRecord 时，hazard_id 自动生成，identification_date 默认为当前日期（YYYY-MM-DD）。

      注意: 管控措施 control_measures 字段在创建时可选，后续可通过其他函数补充。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      hazard_type:
        type: str
        description: 风险类型
      hazard_level:
        type: str
        description: 风险等级
      description:
        type: str
        description: 风险描述
  inspect_hidden_danger:
    summary: 对指定路段进行隐患排查，记录隐患类型、描述、整改措施及状态。
    group: 预防预警
    description: 排查指定路段的事故隐患，创建一条 HiddenDangerInspectionRecord 记录，需提供路段ID、隐患类型、隐患描述，可选整改措施和状态。排查日期默认为当天，整改状态默认为未整改。
    depends_on: []
    hint: 'R1: 排查记录必须关联到已存在的路段（road_segment_id 必须对应 RoadSegment 对象）。

      R2: 隐患类型（hidden_danger_type）必须填写，且为预定义类型之一。

      R3: 隐患描述（description）必须填写，长度不超过500字。

      R4: 排查日期（inspection_date）默认为当前日期，格式为YYYY-MM-DD。

      R5: 整改状态（rectification_status）默认为“未整改”。

      注意: 如果路段不存在，则创建失败并返回错误。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      hidden_danger_type:
        type: str
        description: 隐患类型
      description:
        type: str
        description: 隐患描述
  record_emergency_communication:
    summary: 记录应急通讯日志，包含时间、发送方、接收方、方式、内容。
    group: 信息报告
    description: 记录应急通讯的时间、发送方、接收方、方式、内容等，并关联事件ID。
    depends_on: []
    hint: 'R1: 通讯时间格式必须为YYYY-MM-DD HH:MM。

      R2: 通讯方式必须为电话、书面、电子邮件等。

      注意: 无。'
    params:
      communication_time:
        type: str
        description: 通讯时间，格式YYYY-MM-DD HH:MM
      sender:
        type: str
        description: 发送方
      receiver:
        type: str
        description: 接收方
      communication_method:
        type: str
        description: 通讯方式
      content:
        type: str
        description: 通讯内容摘要
  generate_post_event_summary:
    summary: 生成灾后总结评估报告，包含基础设施损毁、应急成效、问题改进等。
    group: 后期处置
    description: 根据事件处置情况，生成灾后总结评估报告，包括基础设施损毁、应急成效、问题改进等。关联事件类型为 DisasterEvent 或 AccidentEvent。
    depends_on: []
    hint: 'R1: 如果关联事件是 DisasterEvent，则 infrastructure_damage 应包含灾害类型、等级、影响范围等信息。

      R2: 如果关联事件是 AccidentEvent，则 infrastructure_damage 应包含事故类型、等级、道路阻断等信息。

      R3: response_effectiveness 应描述应急处置工作成效。

      R4: existing_problems 应描述存在的问题。

      R5: improvement_measures 应描述改进措施。

      R6: summary_date 格式为 YYYY-MM-DD。

      注意: 报告内容应基于事件处置情况生成。'
    params:
      event_id:
        type: str
        description: 关联事件ID
  check_drone_airworthiness:
    summary: 检查无人机适航状态，基于适航证、维修记录和飞行日志。
    group: 无人机管理
    description: 根据无人机登记号，检查其适航证（类型和有效期）、维修记录（最近一次维修日期、结果和放行证明）、飞行日志（最近一次飞行状态和C2链路状态），综合判断是否适航。
    depends_on: []
    hint: 'R1: 如果无人机类别为微型，则无需适航证，直接适航。

      R2: 如果无人机类别为轻型，则需检查是否具备有效标准适航证或特殊适航证；若适航证类型为标准适航证或特殊适航证，且有效期未过（标准/特殊适航证长期有效），则适航；否则不适航。

      R3: 如果无人机类别为小型、中型或大型，则需检查是否具备有效标准适航证；若适航证类型为标准适航证且有效期未过（长期有效），则适航；否则不适航。

      R4: 检查维修记录：最近一次维修日期距今不超过12个月（365天），且维修结果为合格，且具有维修放行证明，则维修记录合格；否则不合格。

      R5: 检查飞行日志：最近一次飞行状态为正常，且C2链路状态为正常，则飞行日志合格；否则不合格。

      R6: 适航证、维修记录、飞行日志均合格，则无人机适航；否则不适航。

      注意: 适航证有效期：标准适航证和特殊适航证长期有效；特许飞行证有效期由局方规定，需检查valid_until字段。'
    params:
      registration_number:
        type: str
        description: 无人机实名登记号
  check_operator_qualification:
    summary: 检查无人机操控员是否具备操控资格，基于执照有效期、等级、体检合格证等条件。
    group: 无人机管理
    description: 根据操控员执照信息，检查其执照有效期、等级、体检合格证等，判断是否具备操控资格。具体规则包括：执照有效期检查、民事行为能力、培训合格、无犯罪记录、类别/级别/型别等级、超视距等级、教员等级、体检合格证、语言能力、无线电通信资格、近期飞行经历、熟练检查等。
    depends_on: []
    hint: 'R1: 如果 license_type 为 ''操控员执照''，则检查 license_valid_from 和 license_expiry_date，确保当前日期在有效期内（有效期6年）。

      R2: 如果 license_type 为 ''操作证书''，则检查 license_valid_from 和 license_expiry_date，确保当前日期在有效期内。

      R3: 检查 full_civil_capacity 是否为 true，否则不具备操控资格。

      R4: 检查 training_qualified 是否为 true，否则不具备操控资格。

      R5: 检查 criminal_record_5y 是否为 false，否则不具备操控资格。

      R6: 如果 license_type 为 ''操控员执照''，则检查 category_rating、class_rating、type_rating
      是否满足运行要求。

      R7: 如果运行需要超视距能力，则检查 beyond_visual_line_of_sight_rating 是否为 true。

      R8: 如果运行需要教员等级，则检查 instructor_rating 是否为 true。

      R9: 如果运行涉及国际IFR或局方确定的情况，则检查 medical_certificate_valid 是否为 true。

      R10: 检查 language_proficiency 是否满足局方规定的最低等级。

      R11: 检查 radio_communication_qualified 是否为 true。

      R12: 检查 recent_flight_experience_24m 是否为 true。

      R13: 如果运行涉及大型航空器或国际IFR，则检查 proficiency_check_12m 是否为 true。

      注意: 规则R6-R13的具体要求需根据运行场景确定。'
    params:
      license_info:
        type: str
        description: 操控员执照信息
  check_airspace_availability:
    summary: 检查指定空域在指定时间是否可用，并返回审批要求。
    group: 无人机管理
    description: 根据空域区划和飞行计划，检查指定空域在指定时间是否可用，以及审批要求。空域类型包括管制空域和适飞空域，需分别检查使用时间、真高限制和审批要求。
    depends_on: []
    hint: 'R1: 如果空域类型为“管制空域”，则需检查飞行时间是否在空域使用时间内，且需满足审批要求。

      R2: 如果空域类型为“适飞空域”，则需检查飞行时间是否在空域使用时间内，且真高不超过最大真高限制。

      注意: 空域容量限制可能影响可用性，但具体规则未明确。'
    params:
      airspace_zone:
        type: str
        description: 空域描述
      flight_time:
        type: str
        description: 飞行时间
  record_uas_flight_log:
    summary: 记录无人机飞行日志，包含无人机标识、操控人员、起降时间、航线、高度、速度。
    group: 无人机管理
    description: 记录无人机飞行活动的详细信息，包括起飞降落时间、航线、高度、速度等。需要验证无人机和操控人员存在，时间格式正确且结束时间晚于开始时间，高度和速度非负。
    depends_on: []
    hint: 'R1: 如果 drone_id 对应的 Drone 对象不存在，则返回错误。

      R2: 如果 operator_id 对应的 DroneOperator 对象不存在，则返回错误。

      R3: start_time 和 end_time 必须符合格式 YYYY-MM-DD HH:MM。

      R4: end_time 必须晚于 start_time。

      R5: max_altitude 必须为非负整数。

      R6: max_speed 必须为非负整数。

      注意: 所有字段均为必填，不允许为空。'
    params:
      drone_id:
        type: str
        description: 无人机标识
      operator_id:
        type: str
        description: 操控人员标识
      start_time:
        type: str
        description: 起飞时间
      end_time:
        type: str
        description: 降落时间
      flight_route:
        type: str
        description: 飞行航线描述
      max_altitude:
        type: int
        description: 最大飞行高度（米）
      max_speed:
        type: int
        description: 最大飞行速度（千米/小时）
  record_uas_accident:
    summary: 记录无人机事故报告，包括时间、地点、描述、伤亡、损失、原因等。
    group: 无人机管理
    description: 记录无人机事故信息，创建UASAccidentReport对象，包含无人机实名登记号、事故时间、地点、描述、伤亡、损失、原因等字段。
    depends_on: []
    hint: 'R1: 如果无人机实名登记号(uas_registration_number)存在，则必须对应一个已注册的Drone对象。

      R2: 事故时间(accident_time)格式必须为YYYY-MM-DD HH:MM。

      R3: 报告日期(report_date)格式必须为YYYY-MM-DD。

      注意: 事故描述(accident_description)不能为空。'
    params:
      uas_registration_number:
        type: str
        description: 无人机实名登记号
      accident_time:
        type: str
        description: 事故发生时间
      accident_location:
        type: str
        description: 事故发生地点
      accident_description:
        type: str
        description: 事故描述
  record_uas_maintenance:
    summary: 记录无人机维修记录，包括维修类型、日期、人员、内容等。
    group: 无人机管理
    description: 记录无人机维修工作内容、人员、时间、结果等。参数包括无人机实名登记号、维修日期（YYYY-MM-DD）、维修类型（检查/测试/修理/排故/换件/翻修）、维修内容描述、维修人员。
    depends_on: []
    hint: 'R1: 维修类型必须是以下之一：检查、测试、修理、排故、换件、翻修。

      R2: 维修日期格式必须为YYYY-MM-DD。

      注意: 维修结果和维修放行证明不在本函数参数中，但记录创建后应默认设置为待定状态。'
    params:
      uas_registration_number:
        type: str
        description: 无人机实名登记号
      maintenance_date:
        type: str
        description: 维修日期
      maintenance_type:
        type: str
        description: 维修类型
      maintenance_description:
        type: str
        description: 维修内容描述
      maintenance_personnel:
        type: str
        description: 维修人员
  record_traffic_control_implementation:
    summary: 记录对某路段实施的交通管制措施、时间、原因等。
    group: 交通管控
    description: 记录对某路段实施的交通管制措施、时间、原因等。参数包括路段标识(road_segment_id)、管制措施(control_measure)、开始时间(start_time)、结束时间(end_time)、管制原因(reason)。管制措施必须为枚举值：半幅通行、单车道居中通行、限速、限载、分时控制、封闭。时间格式为YYYY-MM-DD
      HH:MM，且结束时间必须晚于开始时间。
    depends_on: []
    hint: 'R1: 管制措施(control_measure)必须为枚举值：半幅通行、单车道居中通行、限速、限载、分时控制、封闭。

      R2: 开始时间(start_time)和结束时间(end_time)格式必须为YYYY-MM-DD HH:MM。

      R3: 结束时间(end_time)必须晚于开始时间(start_time)。

      注意: 管制原因(reason)和负责单位(responsible_unit)由系统自动生成，无需传入。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      control_measure:
        type: str
        description: 管制措施
      start_time:
        type: str
        description: 开始时间
      end_time:
        type: str
        description: 结束时间
      reason:
        type: str
        description: 管制原因
  record_accident_processing:
    summary: 记录事故处理过程，包括处理方法、装备、安全措施等。
    group: 应急处置
    description: 记录事故处理的方法、使用装备、安全措施、结果等。需要提供事故事件ID、处理开始时间、处理方法、使用的装备清单和安全措施。处理开始时间格式为YYYY-MM-DD
      HH:MM。处理方法需为枚举值。
    depends_on: []
    hint: 'R1: 如果 accident_event_id 对应的 AccidentEvent 不存在，则返回错误。

      R2: processing_start_time 格式必须为 YYYY-MM-DD HH:MM。

      R3: processing_method 必须为枚举值之一：牵拉、起吊、扶正、拖运等。

      注意: 本函数仅记录处理开始，不记录结束时间。'
    params:
      accident_event_id:
        type: str
        description: 事故事件ID
      processing_start_time:
        type: str
        description: 处理开始时间
      processing_method:
        type: str
        description: 处理方法
      equipment_used:
        type: str
        description: 使用的装备清单
      safety_measures:
        type: str
        description: 安全措施
  record_monitoring_data:
    summary: 记录隧道、边坡等设施的监测数据，包括监测项目、数值、时间、状态等。
    group: 监测预警
    description: 记录隧道、边坡等设施的监测数据，包括监测项目、数值、时间、状态等。监测项目如拱顶下沉、周边收敛、隧底隆起、边坡水平位移、边坡竖向位移等，数值单位为毫米，时间格式为YYYY-MM-DD
      HH:MM。
    depends_on: []
    hint: 'R1: 如果监测项目为“拱顶下沉”、“周边收敛”、“隧底隆起”、“边坡水平位移”或“边坡竖向位移”，则监测数值单位必须为毫米（mm）。

      R2: 监测时间格式必须为“YYYY-MM-DD HH:MM”。

      注意: 监测数值不能为负数。'
    params:
      facility_type:
        type: str
        description: 设施类型
      facility_name:
        type: str
        description: 设施名称
      monitoring_item:
        type: str
        description: 监测项目
      monitoring_value:
        type: float
        description: 监测数值（毫米）
      monitoring_time:
        type: str
        description: 监测时间
  check_monitoring_alert:
    summary: 根据监测数值与预警阈值比较，返回报警或正常状态。
    group: 监测预警
    description: 根据监测数值和预警阈值，判断是否触发报警：若监测数值大于预警阈值，则状态为'报警'；否则为'正常'。
    depends_on: []
    hint: 'R1: 如果 monitoring_value > warning_threshold，则 status 为 ''报警''。

      R2: 如果 monitoring_value <= warning_threshold，则 status 为 ''正常''。

      注意: 无预警状态，仅判断是否超过阈值。'
    params:
      monitoring_value:
        type: float
        description: 监测数值
      warning_threshold:
        type: float
        description: 预警阈值
  record_emergency_drill:
    summary: 记录应急演练的类型、日期、参与单位、内容、评估结果等。
    group: 应急管理
    description: 记录应急演练情况，包括演练类型、日期、参与单位、内容、评估结果等字段。
    depends_on: []
    hint: 'R1: drill_type 必须是有效的演练类型，如桌面推演、实战演练等。

      R2: drill_date 格式必须为 YYYY-MM-DD。

      R3: participating_units 应列出所有参与单位，多个单位用逗号分隔。

      R4: drill_content 应描述演练的具体内容。

      R5: evaluation_result 应填写评估结果。

      注意: 所有字段均为必填，不能为空。'
    params:
      drill_type:
        type: str
        description: 演练类型
      drill_date:
        type: str
        description: 演练日期
      participating_units:
        type: str
        description: 参与单位
      drill_content:
        type: str
        description: 演练内容
      evaluation_result:
        type: str
        description: 评估结果
  find_emergency_contact:
    summary: 根据单位或部门名称查找应急通讯联络信息（值班电话、传真、联系人等）
    group: 信息报告
    description: 根据单位或部门名称，查找对应的 EmergencyContact 记录，返回包含24小时值班电话、传真、联系人姓名、职务、座机、移动电话等信息。输入参数
      unit_name 为字符串，匹配对象中的 unit_name 或 department 字段。
    depends_on: []
    hint: 'R1: 输入 unit_name 必须与 EmergencyContact 对象的 unit_name 或 department 属性匹配。

      R2: 返回匹配记录中的 duty_phone（24小时值班电话）、duty_fax（24小时值班传真）、contact_name（联系人姓名）、contact_position（联系人职务）、contact_landline（联系人座机）、contact_mobile（联系人移动电话）。

      注意: 如果未找到匹配记录，返回空列表。'
    params:
      unit_name:
        type: str
        description: 单位或部门名称
  check_uas_registration:
    summary: 根据实名登记号查询无人机登记信息，确认是否完成实名登记。
    group: 无人机管理
    description: 根据提供的实名登记号（8位阿拉伯数字、罗马体大写字母或组合）查询民用无人驾驶航空器的实名登记信息。如果登记存在且有效，返回登记详情；否则返回未登记状态。
    depends_on: []
    hint: 'R1: 如果 registration_number 符合8位阿拉伯数字、罗马体大写字母或组合的格式，则查询登记信息。

      R2: 如果查询到登记信息且状态有效，则返回登记信息；否则返回未登记状态。

      注意: 登记信息包括所有人、联系信息、航空器信息、使用用途、登记日期和有效期。'
    params:
      registration_number:
        type: str
        description: 实名登记号，8位阿拉伯数字、罗马体大写字母或组合
  check_uas_nationality_registration:
    summary: 根据实名登记号查询无人机国籍登记信息，确认是否已完成国籍登记。
    group: 无人机管理
    description: 根据无人机实名登记号查询国籍登记信息，确认是否已完成国籍登记。涉及境外飞行的无人机必须进行国籍登记。查询时，若存在对应的UASNationalityRegistration记录且cancellation_date为空，则视为已登记；否则未登记。
    depends_on: []
    hint: 'R1: 如果无人机涉及境外飞行，则必须完成国籍登记。

      R2: 根据实名登记号（registration_number）查询UASNationalityRegistration对象，若存在且cancellation_date为空，则视为已登记；否则未登记。

      注意: 实名登记号即登记标志（registration_mark）。'
    params:
      registration_number:
        type: str
        description: 实名登记号
  check_uas_airworthiness:
    summary: 根据实名登记号查询适航证件，确认适航证类型、有效期及使用限制。
    group: 无人机管理
    description: 根据无人机实名登记号查询适航证件，确认适航证类型、有效期及使用限制。中型、大型无人机需取得适航许可；微型、轻型、小型无需适航许可但需符合强制性标准。
    depends_on: []
    hint: 'R1: 如果无人机类型为中型或大型 → 必须取得适航许可。

      R2: 如果无人机类型为微型、轻型或小型 → 无需适航许可，但需符合强制性标准。

      注意: 适航证类型包括标准适航证、特殊适航证、特许飞行证、出口适航证；标准/特殊适航证长期有效，特许飞行证有效期由局方规定。'
    params:
      registration_number:
        type: str
        description: 实名登记号
  check_operator_license:
    summary: 根据操控员执照编号查询执照信息，确认执照类型、有效期、等级等，并验证相关资质条件。
    group: 无人机管理
    description: 根据操控员执照编号查询执照信息，确认执照类型（操控员执照或操作证书）、有效期（6年）、类别等级、级别等级、型别等级、超视距等级、教员等级等。对于操控员执照，需验证完全民事行为能力、无犯罪记录、培训合格、有效期、体检合格证（大型或IFR）、熟练检查（大型或IFR）、近期飞行经历等条件。对于操作证书，仅需验证培训合格。微型、轻型无人机无需执照但需培训，此函数不处理培训记录。
    depends_on: []
    hint: 'R1: 如果操控员执照编号为空或格式无效，则返回错误。

      R2: 如果执照类型为''操控员执照''，则检查操控员是否具备完全民事行为能力（full_civil_capacity=true）、近5年内无危害国家安全等故意犯罪记录（criminal_record_5y=false）、经安全操控培训并考核合格（training_qualified=true）。

      R3: 如果执照类型为''操作证书''，则检查操控员是否经安全操控培训并考核合格（training_qualified=true）。

      R4: 如果执照类型为''操控员执照''，则检查执照有效期：当前日期在license_valid_from和license_expiry_date之间，且license_expiry_date
      - license_valid_from = 6年。

      R5: 如果执照类型为''操控员执照''且涉及大型无人机或国际IFR运行，则检查是否持有有效体检合格证（medical_certificate_valid=true）。

      R6: 如果执照类型为''操控员执照''且涉及大型无人机或国际IFR运行，则检查最近12个日历月内是否通过熟练检查（proficiency_check_12m=true）。

      R7: 如果执照类型为''操控员执照''，则检查最近24个日历月内是否满足定期检查或飞行经历要求（recent_flight_experience_24m=true）。

      注意: 微型、轻型无人机无需执照但需培训，此函数仅用于查询执照信息，不处理培训记录。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_operator_qualification_for_uas:
    summary: 根据无人机类别和操控员执照等级，判断操控员是否有资质操控该无人机。
    group: 无人机管理
    description: 检查操控员是否具备操控特定类别无人机的资质。根据无人机类别（微型、轻型、小型、中型、大型）和操控员执照等级（小型、中型、大型）进行判断。微型无人机无需执照；轻型无人机需操作证书或相应类别等级的执照；小型及以上需持有对应或更高级别的执照，且类别等级匹配。
    depends_on:
    - check_operator_license
    hint: 'R1: 如果无人机类别为微型，则操控员无需持有执照，直接返回有资质。

      R2: 如果无人机类别为轻型，则操控员需持有操作证书或操控员执照，且类别等级为旋翼飞行器或飞机（根据无人机类型），否则无资质。

      R3: 如果无人机类别为小型，则操控员需持有小型及以上操控员执照，且类别等级与无人机类型匹配。

      R4: 如果无人机类别为中型，则操控员需持有中型及以上操控员执照，且类别等级与无人机类型匹配。

      R5: 如果无人机类别为大型，则操控员需持有大型操控员执照，且类别等级与无人机类型匹配。

      注意: 执照等级从低到高为：小型、中型、大型；微型和轻型无需执照或仅需操作证书。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
      uas_category:
        type: str
        description: 无人机类别：微型、轻型、小型、中型、大型
  check_uas_operating_certificate:
    summary: 根据运营单位名称查询运营合格证，确认证书有效期、许可范围等。
    group: 无人机管理
    description: 根据运营单位名称查询运营合格证，确认证书有效期、许可范围等。使用除微型以外的无人机从事飞行活动的单位需取得运营合格证。
    depends_on: []
    hint: 'R1: 运营单位名称与运营合格证中的 operator_unit 字段匹配。

      R2: 当前日期在 valid_from 和 valid_until 之间，且 valid_until 减去 valid_from 不超过24个日历月。

      R3: 许可范围 permitted_scope 应覆盖所申请的飞行活动。

      注意: 微型无人机除外，无需运营合格证。'
    params:
      operator_unit:
        type: str
        description: 运营单位名称
  check_uas_insurance:
    summary: 根据无人机实名登记号查询保险信息，确认是否已投保责任保险（经营性飞行或小型/中型/大型无人机非经营性飞行必须投保）。
    group: 无人机管理
    description: 根据无人机实名登记号查询保险信息，确认是否已投保责任保险。从事经营性飞行活动以及使用小型、中型、大型无人机从事非经营性飞行活动必须投保。
    depends_on: []
    hint: 'R1: 如果无人机从事经营性飞行活动，或者使用小型、中型、大型无人机从事非经营性飞行活动 → 必须投保责任保险。

      R2: 根据实名登记号查询保险信息，确认是否已投保责任保险。

      注意: 仅对上述情形强制要求投保，其他情形不强制。'
    params:
      registration_number:
        type: str
        description: 实名登记号
  check_uas_unique_product_id:
    summary: 检查无人机是否设置唯一产品识别码
    group: 无人机管理
    description: 根据无人机型号或出厂序号查询无人机对象，检查其唯一产品识别码字段是否已设置。生产者应为其生产的无人机设置唯一产品识别码。
    depends_on: []
    hint: 'R1: 如果提供了无人机型号(drone_model)或出厂序号(serial_number)，则查询对应无人机的唯一产品识别码(unique_product_id)是否已设置。

      R2: 如果唯一产品识别码(unique_product_id)为空或null，则表示未设置。

      注意: 至少需要提供一个查询参数（无人机型号或出厂序号），否则无法查询。'
    params:
      drone_model:
        type: str
        description: 无人机型号
      serial_number:
        type: str
        description: 出厂序号
  check_airspace_classification:
    summary: 检查空域类型（管制空域或适飞空域）
    group: 空域管理
    description: 根据位置坐标或区域描述，查询空域区划信息，判断该空域是管制空域还是适飞空域。管制空域需经批准方可飞行。
    depends_on: []
    hint: 'R1: 如果 location 是坐标或位置描述，则查询空域区划信息，判断该空域是管制空域还是适飞空域。

      R2: 如果空域类型为管制空域，则需经批准方可飞行。

      注意: 无。'
    params:
      location:
        type: str
        description: 位置描述或坐标
  check_flight_approval_required:
    summary: 根据空域类型和无人机类别判断飞行活动是否需要申请飞行批准。
    group: 飞行管理
    description: 根据飞行空域（管制空域或适飞空域）和无人机类别（微型、轻型等）判断是否需要向空中交通管理机构提出飞行活动申请。例如，在管制空域内飞行需申请；微型、轻型在适飞空域内飞行无需申请。
    depends_on:
    - check_airspace_classification
    hint: 'R1: 如果 airspace_type 为 ''管制空域''，则必须向空中交通管理机构提出飞行活动申请。

      R2: 如果 uas_category 为 ''微型'' 或 ''轻型''，且 airspace_type 为 ''适飞空域''，则无需申请飞行批准。

      注意: 其他情况（如飞行目的为作业、训练、应急等）需结合具体规定判断，但本函数仅基于空域类型和无人机类别判断。'
    params:
      uas_category:
        type: str
        description: 无人机类别
      airspace_type:
        type: str
        description: 空域类型：管制空域或适飞空域
      flight_purpose:
        type: str
        description: 飞行目的，如作业、训练、应急等
  submit_flight_plan:
    summary: 提交无人驾驶航空器飞行计划，返回计划ID。
    group: 飞行管理
    description: 根据飞行活动申请要求，提交飞行计划，包括飞行时间、空域、航线、高度、速度、通信方式、应急处置程序等信息。返回计划ID。参数：applicant_unit（申请单位或个人）、flight_date（飞行日期，格式YYYY-MM-DD）、flight_time（飞行时间，如08:00-12:00）、airspace（飞行空域描述）、route（航线描述）、altitude（飞行高度，单位米）、speed（飞行速度，单位千米/小时）、emergency_procedure（应急处置程序）、communication_method（通信联络方法）、radio_frequency（指挥控制链路无线电频率及占用带宽）。
    depends_on: []
    hint: 'R1: 飞行日期（flight_date）格式必须为YYYY-MM-DD。

      R2: 飞行时间（flight_time）格式必须为HH:MM-HH:MM。

      R3: 飞行高度（altitude）单位为米（m）。

      R4: 飞行速度（speed）单位为千米/小时（km/h）。

      注意: 所有字段均为必填，不可为空。'
    params:
      applicant_unit:
        type: str
        description: 申请单位或个人
      flight_date:
        type: str
        description: 飞行日期，格式YYYY-MM-DD
      flight_time:
        type: str
        description: 飞行时间，如08:00-12:00
      airspace:
        type: str
        description: 飞行空域描述
      route:
        type: str
        description: 航线描述
      altitude:
        type: int
        description: 飞行高度（米）
      speed:
        type: int
        description: 飞行速度（千米/小时）
      emergency_procedure:
        type: str
        description: 应急处置程序
      communication_method:
        type: str
        description: 通信联络方法
      radio_frequency:
        type: str
        description: 指挥控制链路无线电频率及占用带宽
  approve_flight_plan:
    summary: 审批飞行计划，返回批准或不批准结果。
    group: 飞行管理
    description: 根据飞行计划内容、空域状况、安全评估等，作出批准或不批准的决定。返回审批结果。
    depends_on:
    - submit_flight_plan
    hint: 'R1: 如果飞行计划内容、空域状况、安全评估等均符合要求，则批准；否则不批准。

      注意: 审批结果只能是“批准”或“不批准”。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_flight_approval_status:
    summary: 根据飞行计划ID查询审批状态
    group: 飞行管理
    description: 根据飞行计划ID查询审批状态，返回待审批、已批准、已拒绝或未找到审批记录。
    depends_on: []
    hint: 'R1: 如果飞行计划ID对应的审批记录存在，则返回审批状态（待审批、已批准、已拒绝）。

      R2: 如果飞行计划ID对应的审批记录不存在，则返回“未找到审批记录”。

      注意: 审批状态由FlightApproval对象的approval_result字段决定，若为空则视为待审批。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  report_flight_readiness:
    summary: 在计划起飞前1小时向空中交通管理机构报告预计起飞时刻和准备情况，经确认后方可起飞。
    group: 飞行管理
    description: 在计划起飞前1小时向空中交通管理机构报告预计起飞时刻和准备情况，经确认后方可起飞。返回确认结果。
    depends_on:
    - check_flight_approval_status
    hint: 'R1: 如果当前时间距离计划起飞时间不足1小时，则必须调用 check_flight_approval_status 确认审批状态。

      R2: 报告预计起飞时刻和准备情况后，需等待空中交通管理机构确认，确认后方可起飞。

      注意: 预计起飞时刻格式为YYYY-MM-DD HH:MM。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
      estimated_departure_time:
        type: str
        description: 预计起飞时刻，格式YYYY-MM-DD HH:MM
      readiness_status:
        type: str
        description: 准备情况描述
  check_flight_behavior_compliance:
    summary: 根据飞行日志检查飞行行为是否合规，返回违规列表。
    group: 飞行管理
    description: 根据飞行日志中的字段（如 c2_link_status、flight_status、max_altitude 等）检查是否遵守飞行行为规范，包括保持通信联络、检查无人机状态、保持安全间隔、视距内飞行等。返回违规列表。
    depends_on: []
    hint: 'R1: 如果 flight_log_id 对应的飞行日志中 c2_link_status 为“故障”，则视为违反“保持通信联络”规范。

      R2: 如果 flight_log_id 对应的飞行日志中 flight_status 为“异常”，则视为违反“检查无人机状态”规范。

      R3: 如果 flight_log_id 对应的飞行日志中 max_altitude 超过 120 米，则视为违反“视距内飞行”规范（除非飞行获得特殊批准）。

      注意: 本函数仅基于飞行日志中的字段进行判断，不涉及实时数据。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_flight_avoidance_rules:
    summary: 检查飞行避让规则遵守情况，返回违规列表。
    group: 飞行管理
    description: 根据飞行轨迹和周围航空器、交通工具信息，检查是否遵守避让规则：避让有人驾驶航空器、单架避让集群、微型避让其他无人机等。返回违规列表。
    depends_on: []
    hint: 'R1: 如果飞行日志中的无人机类型为有人驾驶航空器，则无需检查避让规则。

      R2: 如果飞行日志中的无人机为微型无人机，则需避让其他所有类型的无人机。

      R3: 如果飞行日志中的无人机为轻型无人机，则需避让有人驾驶航空器。

      R4: 如果飞行日志中的无人机为小型及以上无人机，则需避让有人驾驶航空器，且单架无人机需避让集群无人机。

      注意: 本规则基于《无人驾驶航空器飞行管理暂行条例》第三章第三十三条，具体避让规则需结合实际情况判断。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_prohibited_actions:
    summary: 检查飞行日志是否涉及违法拍摄、扰乱秩序、投放违禁品、侵犯隐私等禁止行为，返回违规列表。
    group: 飞行管理
    description: 根据飞行任务描述或飞行日志，检查是否涉及违法拍摄、扰乱秩序、投放违禁品、侵犯隐私等禁止行为。返回违规列表。依据《无人驾驶航空器飞行管理暂行条例》第三章第三十四条。
    depends_on: []
    hint: 'R1: 如果飞行日志中存在飞行目的、飞行航线、飞行高度、飞行速度、气象条件、紧急预案、链路状态、燃油或电池水平等异常或违规迹象，则判定为涉及禁止行为。

      R2: 如果飞行日志中记录的飞行活动涉及违法拍摄、扰乱秩序、投放违禁品、侵犯隐私等行为，则判定为涉及禁止行为。

      注意: 具体禁止行为类型需根据飞行日志内容判断，本函数仅返回违规列表。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  report_flight_anomaly:
    summary: 报告飞行异常情况，需在降落后24小时内向空中交通管理机构报告。
    group: 应急处置
    description: 当无人机飞行发生异常情况时，组织飞行活动的单位或个人应及时处置，并在降落后24小时内向空中交通管理机构报告。返回报告记录。
    depends_on: []
    hint: 'R1: 当无人机飞行发生异常情况时，组织飞行活动的单位或个人应及时处置。

      R2: 在降落后24小时内向空中交通管理机构报告。

      注意: 报告记录应包含异常情况描述和处置措施。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
      anomaly_description:
        type: str
        description: 异常情况描述
      handling_measures:
        type: str
        description: 处置措施
  handle_illegal_flight:
    summary: 处理违规飞行事件，记录公安机关对违规无人机采取的处置措施。
    group: 应急处置
    description: 对违规飞行的无人机，公安机关可采取先期处置、现场处置等措施，包括技术防控、扣押、责令停止飞行、查封等。返回处置记录。参数包括无人机实名登记号、违规行为描述和处置措施。
    depends_on: []
    hint: 'R1: 公安机关对违规飞行的无人机可采取先期处置、现场处置等措施，包括技术防控、扣押、责令停止飞行、查封等。

      注意: 处置措施应记录在 disposal_measures 参数中。'
    params:
      uas_registration_number:
        type: str
        description: 无人机实名登记号
      violation_description:
        type: str
        description: 违规行为描述
      disposal_measures:
        type: str
        description: 处置措施
  check_countermeasure_equipment_legality:
    summary: 检查无人机反制设备使用的合法性
    group: 无人机管理
    description: 根据反制设备配备单位、使用场景等，检查是否依法配备和使用反制设备。军队、警察及授权的高风险反恐重点目标管理单位可配备，其他单位或个人不得非法拥有、使用。
    depends_on: []
    hint: 'R1: 配备单位是军队、警察或授权的高风险反恐重点目标管理单位 → 可以依法配备反制设备。

      R2: 配备单位是其他单位或个人 → 不得非法拥有、使用反制设备。

      注意: 反制设备类型包括但不限于干扰器、诱骗设备等，但规则不区分具体类型。'
    params:
      unit_name:
        type: str
        description: 配备单位名称
      device_type:
        type: str
        description: 反制设备类型
  check_uas_category_by_performance:
    summary: 根据空机重量、最大起飞重量、最大飞行真高、最大平飞速度、空域保持能力、被监视能力、人工介入能力确定无人机类别（微型/轻型/小型/中型/大型）。
    group: 无人机管理
    description: 根据空机重量（千克）、最大起飞重量（千克）、最大飞行真高（米）、最大平飞速度（千米/小时）、空域保持能力（布尔）、可靠被监视能力（布尔）、全程可随时人工介入操控能力（布尔）等参数，按照微型、轻型、小型、中型、大型的顺序依次检查，确定无人机所属类别。
    depends_on: []
    hint: 'R1: 如果空机重量 ≤ 0.25 千克，最大起飞重量 ≤ 0.25 千克，最大飞行真高 ≤ 50 米，最大平飞速度 ≤ 40 千米/小时，且具备空域保持能力、可靠被监视能力、全程可随时人工介入操控，则类别为微型。

      R2: 如果空机重量 ≤ 4 千克且最大起飞重量 ≤ 7 千克，最大平飞速度 ≤ 100 千米/小时，且具备空域保持能力、可靠被监视能力、全程可随时人工介入操控，则类别为轻型。

      R3: 如果最大起飞重量 ≤ 25 千克，且不具备空域保持能力、可靠被监视能力、全程可随时人工介入操控中的任意一项，则类别为小型。

      R4: 如果最大起飞重量 ≤ 150 千克，且不具备空域保持能力、可靠被监视能力、全程可随时人工介入操控中的任意一项，则类别为中型。

      R5: 如果最大起飞重量 > 150 千克，则类别为大型。

      注意: 类别判定按微型、轻型、小型、中型、大型顺序依次检查，满足即停止。'
    params:
      empty_weight:
        type: float
        description: 空机重量（千克）
      max_takeoff_weight:
        type: int
        description: 最大起飞重量（千克）
      max_flight_height:
        type: int
        description: 最大飞行真高（米）
      max_speed:
        type: int
        description: 最大平飞速度（千米/小时）
      airspace_keeping_capability:
        type: bool
        description: 是否具备空域保持能力
      reliable_monitored_capability:
        type: bool
        description: 是否具备可靠被监视能力
      manual_intervention_capability:
        type: bool
        description: 是否全程可随时人工介入操控
  check_agricultural_uas_exemption:
    summary: 检查农用无人机是否满足常规农用作业飞行活动豁免条件（真高≤30m、速度≤50km/h、半径≤2000m、具备空域保持和可靠被监视能力、全程可人工介入、用于农林牧渔作业）。
    group: 无人机管理
    description: 根据无人机参数和作业区域，判断是否属于常规农用无人驾驶航空器作业飞行活动，从而豁免运营合格证、操控员执照等要求。条件：最大飞行真高不超过30米，最大平飞速度不超过50千米/小时，最大飞行半径不超过2000米，具备空域保持能力和可靠被监视能力，专门用于农林牧渔作业，全程可人工介入。
    depends_on:
    - check_uas_category_by_performance
    hint: 'R1: 如果 max_flight_height > 30，则不满足豁免条件。

      R2: 如果 max_speed > 50，则不满足豁免条件。

      R3: 如果 max_flight_radius > 2000，则不满足豁免条件。

      R4: 如果 airspace_keeping_capability 为 false，则不满足豁免条件。

      R5: 如果 reliable_monitored_capability 为 false，则不满足豁免条件。

      R6: 如果 manual_intervention_capability 为 false，则不满足豁免条件。

      R7: 如果 purpose 不是农林牧渔作业用途（如植保、播种、投饵等），则不满足豁免条件。

      注意: 所有条件必须同时满足才可豁免；任何一项不满足则不能豁免。'
    params:
      max_flight_height:
        type: int
        description: 最大飞行真高（米）
      max_speed:
        type: int
        description: 最大平飞速度（千米/小时）
      max_flight_radius:
        type: int
        description: 最大飞行半径（米）
      airspace_keeping_capability:
        type: bool
        description: 是否具备空域保持能力
      reliable_monitored_capability:
        type: bool
        description: 是否具备可靠被监视能力
      manual_intervention_capability:
        type: bool
        description: 是否全程可随时人工介入操控
      purpose:
        type: str
        description: 用途，如植保、播种、投饵等
  check_emergency_flight_approval:
    summary: 处理应急飞行任务审批，支持紧急和特别紧急任务申请。
    group: 飞行管理
    description: 对于反恐维稳、抢险救灾、医疗救护等紧急任务，可在计划起飞30分钟前提出飞行活动申请，空中交通管理机构应在起飞10分钟前作出决定。特别紧急任务可随时申请。返回审批结果。
    depends_on: []
    hint: 'R1: 紧急任务类型为反恐维稳、抢险救灾、医疗救护等 → 可在计划起飞30分钟前提出飞行活动申请。

      R2: 紧急任务类型为反恐维稳、抢险救灾、医疗救护等 → 空中交通管理机构应在起飞10分钟前作出决定。

      R3: 特别紧急任务 → 可随时申请。

      注意: 返回审批结果。'
    params:
      applicant_unit:
        type: str
        description: 申请单位
      flight_plan:
        type: str
        description: 飞行计划内容
      emergency_type:
        type: str
        description: 紧急任务类型，如抢险救灾
      proposed_departure_time:
        type: str
        description: 计划起飞时间，格式YYYY-MM-DD HH:MM
  check_temporary_controlled_airspace:
    summary: 根据时间和位置查询临时增加的管制空域信息。
    group: 空域管理
    description: 根据给定的时间（格式YYYY-MM-DD HH:MM）和位置描述，查询是否有临时增加的管制空域。返回临时空域信息，包括空域类型、范围、使用时间、审批要求、真高限制、空域类别、有效时间、容量等。临时空域可能因重大活动、军事任务、抢险救灾等特殊情况临时增加。
    depends_on: []
    hint: 'R1: 查询时间格式为YYYY-MM-DD HH:MM。

      R2: 查询位置为位置描述字符串。

      R3: 返回临时增加的管制空域信息，包括空域类型、范围、使用时间、审批要求、真高限制、空域类别、有效时间、容量等。

      注意: 临时空域可能因重大活动、军事任务、抢险救灾等特殊情况临时增加。'
    params:
      time:
        type: str
        description: 查询时间，格式YYYY-MM-DD HH:MM
      location:
        type: str
        description: 位置描述
  check_fusion_flight_conditions:
    summary: 根据无人机类型、高度、任务性质及空域类型，判断是否允许与有人驾驶航空器融合飞行，并返回所需批准。
    group: 飞行管理
    description: 检查是否满足融合飞行条件。规则：微型、轻型无人机在适飞空域内无需批准即可融合飞行；警察、海关、应急部门的无人机经批准后可融合飞行；其他情况不允许。
    depends_on:
    - check_uas_category_by_performance
    hint: 'R1: uas_category 为“微型”或“轻型”且 airspace_type 为“适飞空域” → 允许融合飞行，无需批准。

      R2: mission_type 为“警察”、“海关”或“应急” → 经批准后允许融合飞行。

      R3: 其他情况 → 不允许融合飞行。

      注意: 融合飞行条件需同时参考 check_uas_category_by_performance 的结果。'
    params:
      uas_category:
        type: str
        description: 无人机类别
      flight_height:
        type: int
        description: 飞行高度（米）
      mission_type:
        type: str
        description: 任务类型，如警察、海关、应急等
      airspace_type:
        type: str
        description: 空域类型：适飞空域或管制空域
  check_uas_identification_transmission:
    summary: 根据无人机类别和飞行状态，检查是否向无人驾驶航空器一体化综合监管服务平台报送识别信息，并判断是否需要广播式自动发送。
    group: 无人机管理
    description: 根据无人机类别（微型、轻型、小型、中型、大型）和飞行状态，检查是否向无人驾驶航空器一体化综合监管服务平台报送识别信息。除微型外，其他无人机应报送；微型、轻型、小型还应广播式自动发送。
    depends_on: []
    hint: 'R1: 如果无人机类别为微型，则无需报送识别信息。

      R2: 如果无人机类别为微型、轻型或小型，则应当广播式自动发送识别信息。

      R3: 如果无人机类别不是微型，则应当向无人驾驶航空器一体化综合监管服务平台报送识别信息。

      注意: 微型无人机无需报送，但微型、轻型、小型无人机需广播式自动发送。'
    params:
      uas_category:
        type: str
        description: 无人机类别
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_model_aircraft_flight_area:
    summary: 检查模型航空器是否在航空飞行营地划定的空域内飞行。
    group: 空域管理
    description: 根据模型航空器飞行位置，判断是否在空中交通管理机构为航空飞行营地划定的空域内飞行。模型航空器应在划定空域内飞行。
    depends_on: []
    hint: 'R1: 如果飞行位置在航空飞行营地划定的空域内，则允许飞行。

      R2: 如果飞行位置不在航空飞行营地划定的空域内，则不允许飞行。

      注意: 模型航空器应在划定空域内飞行。'
    params:
      location:
        type: str
        description: 飞行位置描述
  check_foreign_uas_restrictions:
    summary: 检查外国无人驾驶航空器或外国人员操控的无人机是否被禁止在我国境内实施测绘、电波参数测试等飞行活动。
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第三章第三十五条，外国无人驾驶航空器或由外国人员操控的无人机不得在我国境内实施测绘、电波参数测试等飞行活动。该函数根据无人机来源（国内/国外）、操控员国籍（中国/外国）和飞行目的（测绘/电波参数测试/其他）判断是否允许飞行。
    depends_on: []
    hint: 'R1: uas_origin 为 "国外" 或 operator_nationality 为 "外国" → 不得在我国境内实施测绘、电波参数测试等飞行活动。

      R2: flight_purpose 为 "测绘" 或 "电波参数测试" → 适用上述限制。

      注意: 若 uas_origin 为 "国内" 且 operator_nationality 为 "中国"，则不受此限制。'
    params:
      uas_origin:
        type: str
        description: 无人机来源：国内或国外
      operator_nationality:
        type: str
        description: 操控员国籍
      flight_purpose:
        type: str
        description: 飞行目的
  check_uas_modification_compliance:
    summary: 检查无人机改装是否符合规定，包括微型/轻型/小型无人机的改装合规及信息更新，以及中型/大型无人机的重大设计更改需重新申请适航许可。
    group: 无人机管理
    description: 对微型、轻型、小型无人机进行改装，需符合强制性国家标准；改变空域保持能力、被监视能力、速度或高度等性能参数，需及时更新信息。中型、大型重大设计更改需重新申请适航许可。返回合规性检查结果。
    depends_on: []
    hint: 'R1: 如果无人机属于微型、轻型、小型，则改装需符合强制性国家标准；改变空域保持能力、被监视能力、速度或高度等性能参数，需及时更新信息。

      R2: 如果无人机属于中型、大型，且改装属于重大设计更改，则需重新申请适航许可。

      注意: 改装合规性检查结果需返回。'
    params:
      registration_number:
        type: str
        description: 实名登记号
      modification_description:
        type: str
        description: 改装描述
  check_radio_frequency_compliance:
    summary: 检查无人机无线电频率是否属于特定频率且设备已获型号核准，以判断是否免于频率使用许可和电台执照。
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第十五条，检查无人机使用的无线电频率是否属于国家无线电管理机构确定的特定频率，且无线电发射设备是否取得型号核准。若两者均满足，则无需取得频率使用许可和电台执照。
    depends_on: []
    hint: 'R1: 如果无线电频率属于国家无线电管理机构确定的特定频率，且发射设备取得型号核准，则无需取得频率使用许可和电台执照。

      注意: 仅适用于无人机管理场景。'
    params:
      frequency:
        type: str
        description: 无线电频率
      equipment_model:
        type: str
        description: 无线电发射设备型号
  check_operator_medical_certificate:
    summary: 检查操控员是否持有有效体检合格证（适用于国际IFR运行或局方确定的情况）
    group: 无人机管理
    description: 对于国际IFR运行或局方确定的情况，操控员需持有有效体检合格证。返回体检合格证状态（medical_certificate_valid字段）。
    depends_on: []
    hint: 'R1: 如果运行类型为国际IFR运行或局方确定的情况 → 操控员需持有有效体检合格证。

      R2: 检查操控员的 medical_certificate_valid 字段是否为 true。

      注意: 仅适用于国际IFR运行或局方确定的情况，其他情况不要求。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_operator_recent_experience:
    summary: 检查操控员最近24个月定期检查/飞行经历及12个月熟练检查（大型/国际IFR）
    group: 无人机管理
    description: 检查操控员最近24个日历月内是否满足定期检查或飞行经历要求（recent_flight_experience_24m），以及最近12个日历月内是否通过熟练检查（proficiency_check_12m，适用于大型或国际IFR运行）。
    depends_on: []
    hint: 'R1: 如果操控员执照类型为“操控员执照”，则检查最近24个日历月内是否满足定期检查或飞行经历要求（recent_flight_experience_24m）。

      R2: 如果运行类型为大型或国际IFR运行，则检查最近12个日历月内是否通过熟练检查（proficiency_check_12m）。

      注意: 仅当操控员执照类型为“操控员执照”时适用；大型或国际IFR运行需额外检查熟练检查。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_operator_language_proficiency:
    summary: 检查操控员语言能力等级是否满足局方要求
    group: 无人机管理
    description: 根据局方规定，检查操控员语言能力等级是否满足要求。输入为操控员执照编号，输出为检查结果。
    depends_on: []
    hint: 'R1: 如果操控员语言能力等级不满足局方规定，则检查不通过。

      注意: 具体等级要求需参考局方最新规定。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_operator_radio_qualification:
    summary: 检查操控员是否具备无线电通信资格
    group: 无人机管理
    description: 根据操控员执照类型和相关信息，检查其是否具备无线电通信资格。对于'操控员执照'，检查license_info或radio_communication_qualified字段；对于'操作证书'，检查training_record中是否包含无线电通信培训且考核合格。
    depends_on: []
    hint: 'R1: 如果操控员执照类型为''操控员执照''且license_info中包含''无线电通信资格''或radio_communication_qualified为true，则具备无线电通信资格。

      R2: 如果操控员执照类型为''操作证书''，则需检查training_record中是否包含无线电通信培训且考核合格。

      注意: 具体规则以文档为准，若无明确规则，则默认返回false。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_uas_production_license:
    summary: 根据生产者名称查询生产许可证信息
    group: 无人机管理
    description: 根据生产者名称查询民用无人驾驶航空器生产许可证，返回许可证编号、持有人名称、许可生产项目、颁发日期和有效期。如果未找到匹配记录，返回空结果。
    depends_on: []
    hint: 'R1: 如果 manufacturer_name 不为空，则查询 UASProductionLicense 中 holder_name 匹配的记录。

      R2: 如果查询到记录，则返回许可证信息，包括 license_number、holder_name、production_items、issue_date、valid_until。

      R3: 如果未查询到记录，则返回空结果。

      注意: 许可证有效期字段 valid_until 可能为“长期有效”。'
    params:
      manufacturer_name:
        type: str
        description: 生产者名称
  check_uas_recall:
    summary: 查询无人机型号是否存在缺陷召回记录
    group: 无人机管理
    description: 根据无人机型号查询是否有缺陷召回记录。微型、轻型、小型无人机投放市场后发现缺陷的，生产者应召回。
    depends_on: []
    hint: 'R1: 如果无人机型号存在缺陷召回记录，则返回该记录。

      R2: 如果无人机型号不存在缺陷召回记录，则返回空。

      注意: 仅适用于微型、轻型、小型无人机。'
    params:
      drone_model:
        type: str
        description: 无人机型号
  check_emergency_response_plan_for_uas:
    summary: 检查无人机相关应急预案制定情况
    group: 应急处置
    description: 检查空中交通管理机构、民用航空管理部门、县级以上公安机关是否制定无人机飞行安全管理应急预案，以及使用无人机的单位或个人是否制定飞行紧急情况处置预案。
    depends_on: []
    hint: 'R1: 如果单位名称不为空，则检查该单位是否制定了飞行紧急情况处置预案。

      R2: 如果单位名称为空，则检查空中交通管理机构、民用航空管理部门、县级以上公安机关是否制定了无人机飞行安全管理应急预案。

      注意: 预案类型为专项预案或现场处置方案。'
    params:
      unit_name:
        type: str
        description: 单位名称
  check_uas_emergency_function:
    summary: 检查无人机是否具备应急处置功能（紧急避让、降落等）
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第三十九条，检查无人机设计者、生产者是否确保无人机具备紧急避让、降落等应急处置功能。
    depends_on: []
    hint: 'R1: 无人机设计者、生产者应当确保无人机具备紧急避让、降落等应急处置功能。'
    params:
      drone_model:
        type: str
        description: 无人机型号
  check_uas_airworthiness_certificate_type:
    summary: 根据适航证编号查询适航证类型及使用限制
    group: 无人机管理
    description: 根据适航证编号查询适航证类型（标准、特殊、特许、出口）及使用限制，如特殊适航证不得载人、不得融合飞行等。
    depends_on: []
    hint: 'R1: 适航证编号存在且有效 → 返回适航证类型（标准适航证、特殊适航证、特许飞行证、出口适航证）及使用限制。

      R2: 适航证类型为特殊适航证 → 使用限制包括不得载人、不得融合飞行。

      注意: 标准/特殊适航证长期有效；特许飞行证有效期由局方规定。'
    params:
      certificate_number:
        type: str
        description: 适航证编号
  check_uas_operator_criminal_record:
    summary: 检查操控员近5年内是否有危害国家安全等故意犯罪记录，有则禁止申请执照。
    group: 无人机管理
    description: 检查操控员近5年内是否有因危害国家安全、公共安全等故意犯罪受到刑事处罚的记录。有记录者不得申请操控员执照。依据《无人驾驶航空器飞行管理暂行条例》第二章第十六条。
    depends_on: []
    hint: 'R1: 如果操控员近5年内有因危害国家安全、公共安全等故意犯罪受到刑事处罚的记录，则不得申请操控员执照。

      注意: 检查依据为 DroneOperator 对象的 criminal_record_5y 字段。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_uas_operator_drug_history:
    summary: 检查操控员是否有吸毒行为记录，有记录者不得申请操控员执照。
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第二章第十六条，检查指定操控员执照编号对应的操控员是否有吸毒行为记录。如果有吸毒记录，则不允许其申请操控员执照。
    depends_on: []
    hint: 'R1: 如果操控员有吸毒行为记录，则不得申请操控员执照。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_uas_operator_medical_history:
    summary: 检查操控员是否有影响操控的疾病病史，有则禁止申请执照。
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第二章第十六条，检查操控员是否有可能影响无人驾驶航空器操控行为的疾病病史。若有，则不得申请操控员执照。
    depends_on: []
    hint: 'R1: 如果操控员有影响无人驾驶航空器操控行为的疾病病史，则不得申请操控员执照。

      注意: 疾病病史的具体范围由相关医疗标准确定。'
    params:
      license_number:
        type: str
        description: 操控员执照编号
  check_uas_operator_training:
    summary: 检查操控员是否接受安全操控培训并经考核合格，根据无人机类别和飞行空域决定是否需要执照或培训合格。
    group: 无人机管理
    description: 检查操控员是否接受安全操控培训并经考核合格。对于小型、中型、大型无人机操控员，需取得执照；对于轻型无人机在管制空域内飞行，需培训合格。
    depends_on: []
    hint: 'R1: 如果 uas_category 为“小型”、“中型”或“大型”，则操控员必须持有操控员执照。

      R2: 如果 uas_category 为“轻型”且飞行空域为管制空域，则操控员必须经安全操控培训并考核合格。

      注意: 对于轻型无人机在非管制空域飞行，无需培训合格。'
    params:
      license_number:
        type: str
        description: 操控员执照编号或身份信息
      uas_category:
        type: str
        description: 无人机类别
  check_uas_operator_age_capacity:
    summary: 检查操控员是否具备完全民事行为能力，并验证其可操控的无人机类别是否符合年龄与行为能力限制。
    group: 无人机管理
    description: 根据操控员的民事行为能力（full_civil_capacity）和年龄，判断其能否操控指定类别（uas_category）的无人机。无民事行为能力人只能操控微型无人机；限制民事行为能力人只能操控微型、轻型无人机，且需完全民事行为能力人现场指导。
    depends_on: []
    hint: 'R1: 如果操控员不具备完全民事行为能力（full_civil_capacity = false），则只能操控微型无人机（uas_category
      = ''微型''）。

      R2: 如果操控员是限制民事行为能力人（full_civil_capacity = false 且年龄在8周岁以上不满18周岁），则只能操控微型或轻型无人机（uas_category
      in [''微型'',''轻型'']），且需完全民事行为能力人现场指导。

      注意: 无民事行为能力人（不满8周岁或不能辨认自己行为的成年人）只能操控微型无人机。'
    params:
      operator_id:
        type: str
        description: 操控员身份信息
      uas_category:
        type: str
        description: 无人机类别
  check_uas_flight_plan_content:
    summary: 检查飞行计划内容是否包含所有必要信息，返回缺失项列表。
    group: 飞行管理
    description: 根据飞行计划ID，检查计划内容是否包含所有必要信息：组织单位（applicant_unit）、操控人员（无对应字段，忽略）、无人机信息（无对应字段，忽略）、飞行任务（无对应字段，忽略）、起降场地（无对应字段，忽略）、通信联络（communication_method）、时间（flight_date、flight_time）、航线（route）、高度（altitude）、速度（speed）、空域（airspace）、无线电频率（radio_frequency）、监视能力（无对应字段，忽略）、应急处置程序（emergency_procedure）等。返回缺失项列表。
    depends_on: []
    hint: 'R1: 如果飞行计划缺少 applicant_unit、flight_date、flight_time、airspace、route、altitude、speed、emergency_procedure、communication_method、radio_frequency
      中的任意一项，则返回缺失项列表。

      注意: 仅检查上述字段，不检查 approval_status 等非必要字段。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_plan_approval_authority:
    summary: 根据飞行空域范围确定审批权限：分区内由分区批准，跨分区由管制区批准，跨管制区由国家授权机构批准。
    group: 飞行管理
    description: 根据飞行空域范围（airspace_scope），判断其所属或跨越的空域层级（飞行管制分区、飞行管制区、跨管制区），并返回对应的审批机构：飞行管制分区内由分区机构批准，跨分区由管制区机构批准，跨管制区由国家授权的机构批准。
    depends_on: []
    hint: 'R1: 如果飞行空域范围在飞行管制分区内 → 由飞行管制分区机构批准。

      R2: 如果飞行空域范围跨飞行管制分区但未跨飞行管制区 → 由飞行管制区机构批准。

      R3: 如果飞行空域范围跨飞行管制区 → 由国家授权的机构批准。

      注意: 飞行空域范围描述需与空域区划（AirspaceZone）中的scope字段匹配。'
    params:
      airspace_scope:
        type: str
        description: 飞行空域范围描述
  check_uas_flight_plan_approval_deadline:
    summary: 检查飞行计划审批时限是否超时
    group: 飞行管理
    description: 根据飞行计划提交时间和类型（常规或紧急），检查是否满足审批时限要求。常规飞行：拟飞行前1日12时前申请，21时前批准；紧急任务：起飞30分钟前申请，10分钟前批准。返回是否超时。
    depends_on: []
    hint: 'R1: is_emergency = false → 拟飞行前1日12时前提交申请，21时前批准。

      R2: is_emergency = true → 起飞30分钟前提交申请，10分钟前批准。

      注意: 返回是否超时，即当前时间是否超过批准截止时间。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
      submission_time:
        type: str
        description: 提交时间，格式YYYY-MM-DD HH:MM
      is_emergency:
        type: bool
        description: 是否为紧急任务
        default: false
  check_uas_flight_plan_approval_result:
    summary: 根据飞行计划ID查询审批结果，返回批准或不批准及原因。
    group: 飞行管理
    description: 根据飞行计划ID查询审批结果，返回批准或不批准及原因。如果未找到对应审批记录，返回“未找到审批记录”。
    depends_on: []
    hint: 'R1: 根据 plan_id 查询 FlightApproval 对象，获取 approval_result 字段。

      R2: 如果 approval_result 为“批准”，则返回“批准”；否则返回“不批准”及原因（原因从 approval_result 字段获取）。

      注意: 如果未找到对应 plan_id 的审批记录，返回“未找到审批记录”。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_plan_approval_conditions:
    summary: 综合检查无人机登记、适航、操控员资质、空域、保险、无线电频率等条件，判断飞行计划是否具备批准条件。
    group: 飞行管理
    description: 根据飞行计划ID，依次检查：1) 无人机是否完成实名登记（通过check_uas_registration）；2) 无人机是否取得有效适航证件（通过check_uas_airworthiness）；3)
      操控员是否持有有效执照或操作证书（通过check_operator_license）；4) 空域是否为管制空域且已获审批（通过check_airspace_classification）；5)
      无人机是否投保责任保险（通过check_uas_insurance）；6) 无线电频率是否合规（通过check_radio_frequency_compliance）。返回所有条件的满足情况列表。
    depends_on:
    - check_uas_registration
    - check_uas_airworthiness
    - check_operator_license
    - check_airspace_classification
    - check_uas_insurance
    - check_radio_frequency_compliance
    hint: 'R1: 如果飞行计划对应的无人机未完成实名登记，则条件不满足。

      R2: 如果飞行计划对应的无人机未取得有效适航证件，则条件不满足。

      R3: 如果飞行计划对应的操控员未持有有效执照或操作证书，则条件不满足。

      R4: 如果飞行计划对应的空域为管制空域且未获得审批，则条件不满足。

      R5: 如果飞行计划对应的无人机未投保责任保险，则条件不满足。

      R6: 如果飞行计划使用的无线电频率未遵守国家无线电管理要求，则条件不满足。

      注意: 返回所有条件的满足情况列表，每个条件对应一个布尔值。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_identification:
    summary: 检查飞行日志中识别信息报送及广播情况
    group: 无人机管理
    description: 根据飞行日志ID，检查无人机是否按规定向一体化综合监管服务平台报送识别信息，以及微型、轻型、小型无人机是否广播式自动发送识别信息。
    depends_on: []
    hint: 'R1: 如果飞行日志中的无人机类型为微型、轻型或小型，则必须检查是否广播式自动发送识别信息。

      R2: 所有飞行日志必须检查是否按规定向一体化综合监管服务平台报送识别信息。

      注意: 具体无人机类型分类标准参考相关法规。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_report:
    summary: 检查飞行异常报告是否在降落后24小时内提交
    group: 应急处置
    description: 根据飞行日志ID，检查该日志对应的飞行是否发生异常（flight_status='异常'），若异常则判断异常报告是否在降落时间（end_time）后24小时内提交，返回布尔值表示是否及时报告。
    depends_on: []
    hint: 'R1: 如果飞行日志的 flight_status 为“异常”，则检查报告时间是否在降落时间（end_time）后24小时内。

      R2: 如果报告时间在降落时间后24小时内，则返回 true，否则返回 false。

      注意: 仅当 flight_status 为“异常”时才需检查；正常状态无需报告。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_plan:
    summary: 根据飞行日志ID，检查日志中是否包含应急处置预案。
    group: 飞行管理
    description: 根据飞行日志ID，检查飞行日志中 emergency_plan 字段是否非空，以判断是否包含应急处置预案。
    depends_on: []
    hint: 'R1: 如果飞行日志的 emergency_plan 字段不为空且非空字符串，则视为包含应急处置预案。

      R2: 如果飞行日志的 emergency_plan 字段为空或空字符串，则视为不包含应急处置预案。

      注意: 仅检查 emergency_plan 字段是否存在内容，不验证其具体内容是否合规。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_communication:
    summary: 检查飞行日志中通信联络是否畅通（基于c2_link_status字段）
    group: 飞行管理
    description: 根据飞行日志ID，检查飞行过程中是否与空中交通管理机构保持通信联络畅通。规则：若c2_link_status为'正常'则畅通，为'故障'则不畅通；若字段缺失则返回错误。
    depends_on: []
    hint: 'R1: 飞行日志中 c2_link_status 字段为 ''正常'' → 通信联络畅通。

      R2: 飞行日志中 c2_link_status 字段为 ''故障'' → 通信联络不畅通。

      注意: 若 c2_link_status 字段缺失或为空，则无法判断，应返回错误。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_lighting:
    summary: 检查夜间或低能见度飞行时灯光系统是否开启且工作正常
    group: 飞行管理
    description: 根据飞行日志，检查在夜间（当地日落至日出）或低能见度气象条件下飞行时，是否开启灯光系统并处于良好工作状态。低能见度条件包括雾、霾、雨、雪等导致能见度低于标准的情况。
    depends_on: []
    hint: 'R1: 如果飞行时间在夜间（当地日落至日出）或气象条件为低能见度（如雾、霾、雨雪等导致能见度低于标准），则必须开启灯光系统。

      R2: 灯光系统必须处于良好工作状态，即所有航行灯、防撞灯等按规定开启且无故障。

      注意: 低能见度条件包括但不限于气象条件描述中包含“雾”、“霾”、“雨”、“雪”、“低能见度”等关键词。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_beyond_visual:
    summary: 检查超视距飞行时是否掌握其他航空器动态并采取避撞措施
    group: 飞行管理
    description: 根据飞行日志，检查超视距飞行时是否掌握飞行空域内其他航空器的飞行动态，并采取避免相撞措施。
    depends_on: []
    hint: 'R1: 超视距飞行时，必须掌握飞行空域内其他航空器的飞行动态。

      R2: 超视距飞行时，必须采取避免相撞的措施。

      注意: 规则适用于超视距飞行场景，检查依据为飞行日志。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_alcohol_drug:
    summary: 检查操控员是否受酒精或药物影响
    group: 飞行管理
    description: 根据飞行日志或相关记录，检查操控员是否在酒精、麻醉剂或其他药物影响下操控无人机。依据《无人驾驶航空器飞行管理暂行条例》第三章第三十二条。
    depends_on: []
    hint: 'R1: 如果飞行日志中 operator_id 对应的操控员在酒精、麻醉剂或其他药物影响下，则禁止操控无人机。

      注意: 具体判断依据需结合其他数据源（如酒精检测记录），本函数仅检查飞行日志中是否有相关记录。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_speed_limit:
    summary: 检查小型无人机在适飞空域内是否遵守最大速度不超过120千米/小时的限速规定。
    group: 飞行管理
    description: 根据飞行日志，检查小型无人机在适飞空域内飞行时，其最大飞行速度（max_speed）是否超过120千米/小时。若超过，则判定为违规。
    depends_on: []
    hint: 'R1: 如果飞行日志中的无人机类型为小型无人机，且飞行区域为适飞空域，则最大飞行速度（max_speed）不得超过 120 千米/小时。

      注意: 本规则仅适用于小型无人机在适飞空域内的飞行。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_visual_line_of_sight:
    summary: 检查微型无人机是否保持视距内飞行
    group: 飞行管理
    description: 根据飞行日志，检查微型无人机是否保持视距内飞行。视距内飞行指操控员能通过肉眼或辅助设备持续观察无人机，通常水平距离不超过500米，高度不超过120米。
    depends_on: []
    hint: 'R1: 飞行日志中记录的飞行活动必须保持视距内飞行，即操控员应能通过肉眼或辅助设备（如望远镜）持续观察无人机。

      注意：视距内飞行通常指无人机与操控员之间的水平距离不超过500米，高度不超过120米，但具体以实际飞行日志记录为准。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_airspace_clearance:
    summary: 检查飞行结束后是否在24小时内向空中交通管理机构报告
    group: 飞行管理
    description: 根据飞行日志的结束时间，判断是否在飞行结束后24小时内向空中交通管理机构报告。如果报告时间超过24小时，则视为未及时报告。报告时间以空中交通管理机构收到报告的时间为准。
    depends_on: []
    hint: 'R1: 飞行日志的 flight_status 为“正常”或“异常” → 检查 end_time 是否在飞行结束后 24 小时内向空中交通管理机构报告。

      R2: 如果报告时间超过 24 小时 → 视为未及时报告。

      注意: 报告时间以空中交通管理机构收到报告的时间为准。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_electronic_fence:
    summary: 检查飞行前是否更新电子围栏并确认无人机状态正常
    group: 飞行管理
    description: 根据飞行日志，检查飞行前是否完成无人机状态检查（包括c2_link_status、fuel_or_battery_level等）并及时更新电子围栏信息，确保飞行安全。
    depends_on: []
    hint: 'R1: 飞行前必须检查无人机状态，包括c2_link_status、fuel_or_battery_level等，确保正常。

      R2: 飞行前必须更新电子围栏信息，确保flight_route不超出电子围栏范围。

      注意: 电子围栏信息需从最新数据源获取。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_license_carry:
    summary: 根据飞行日志确认操控员是否随身携带有关许可证书、证件。
    group: 飞行管理
    description: 根据飞行日志中的 operator_license_number 字段判断操控员是否随身携带有关许可证书、证件。如果该字段不为空，则视为已携带；否则视为未携带。
    depends_on: []
    hint: 'R1: 如果飞行日志中 operator_license_number 字段不为空，则视为已携带相关证件。

      R2: 如果飞行日志中 operator_license_number 字段为空，则视为未携带相关证件。

      注意: 本函数仅基于飞行日志记录判断，不涉及现场检查。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_airspace_approval:
    summary: 检查实际飞行空域是否与批准的空域一致
    group: 飞行管理
    description: 根据飞行日志和审批记录，检查实际飞行空域是否与批准的空域一致。通过 flight_log_id 获取飞行日志，再通过飞行日志的 flight_id
      关联审批记录（通过 plan_id），比较飞行日志的 flight_route 与审批记录的 airspace。
    depends_on: []
    hint: 'R1: 根据 flight_log_id 获取 UASFlightLog 对象，根据其 flight_id 关联的 FlightApproval
      对象（通过 plan_id 关联）。

      R2: 比较 UASFlightLog.flight_route 与 FlightApproval.airspace，判断实际飞行空域是否在批准空域内。

      注意: 如果未找到对应的 FlightApproval 记录，则视为未批准。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_altitude_compliance:
    summary: 检查飞行日志中的最大高度是否在批准或规定的范围内。
    group: 飞行管理
    description: 根据飞行日志中的 max_altitude 字段，与批准或规定的最大高度进行比较，判断实际飞行高度是否合规。
    depends_on: []
    hint: 'R1: 如果飞行日志的 max_altitude 大于批准或规定的最大高度，则判定为高度违规。

      R2: 如果飞行日志的 max_altitude 小于或等于批准或规定的最大高度，则判定为高度合规。

      注意: 批准或规定的最大高度需根据飞行区域和无人机类型确定，具体数值不在本函数内判断。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_speed_compliance:
    summary: 检查飞行日志中的实际飞行速度是否在批准或规定的范围内。
    group: 飞行管理
    description: 根据飞行日志中的最大飞行速度（max_speed）字段，验证其是否满足相关法规或批准的速度限制。规则依据飞行目的（如作业、训练）等条件确定具体限值。
    depends_on: []
    hint: 'R1: 如果飞行日志中的 max_speed 字段存在，则检查该值是否在批准或规定的范围内。

      R2: 如果飞行日志中的 flight_purpose 为“作业”或“训练”，则 max_speed 不得超过 100 千米/小时。

      注意: 具体速度限制可能因空域类型或无人机类型而异，需参考相关法规。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_route_compliance:
    summary: 检查实际飞行航线是否与飞行计划一致
    group: 飞行管理
    description: 根据飞行日志，检查实际飞行航线是否与飞行计划一致。需要比较 flight_log.flight_route 与对应飞行计划的航线。
    depends_on: []
    hint: 'R1: 如果飞行日志中的 flight_route 与飞行计划中的航线不一致，则判定为不合规。

      注意: 飞行计划需从关联的飞行任务中获取。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_time_compliance:
    summary: 检查实际飞行起止时间是否与飞行计划一致
    group: 飞行管理
    description: 根据飞行日志，检查实际起飞时间（start_time）和降落时间（end_time）是否与对应的飞行计划中的计划起飞时间和计划降落时间一致。如果不一致，则判定为违规。
    depends_on: []
    hint: 'R1: 如果飞行日志的 start_time 与飞行计划中的计划起飞时间不一致，则判定为违规。

      R2: 如果飞行日志的 end_time 与飞行计划中的计划降落时间不一致，则判定为违规。

      注意: 时间格式为 YYYY-MM-DD HH:MM，需精确到分钟。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_communication_frequency:
    summary: 检查指挥控制链路频率使用是否合规
    group: 飞行管理
    description: 根据飞行日志，检查实际使用的无线电频率是否与飞行计划中申报的一致。
    depends_on: []
    hint: 'R1: 如果飞行日志中的c2_link_status为“正常”，则检查实际使用的无线电频率是否与飞行计划中申报的一致。

      R2: 如果实际使用的无线电频率与飞行计划中申报的不一致，则判定为不合规。

      注意: 无。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_procedure_execution:
    summary: 检查异常飞行日志是否按应急处置程序处置
    group: 应急处置
    description: 根据飞行日志ID，获取飞行日志，若飞行状态为异常，则检查紧急情况处置预案是否已执行，返回处置结果。
    depends_on: []
    hint: 'R1: 如果飞行日志的 flight_status 为“异常”，则检查 emergency_plan 是否已执行。

      R2: 如果 emergency_plan 已执行，则返回“已按应急处置程序处置”；否则返回“未按应急处置程序处置”。

      注意: 仅当 flight_status 为“异常”时触发检查。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_c2_link_status:
    summary: 检查C2链路状态是否正常
    group: 飞行管理
    description: 根据飞行日志中的c2_link_status字段，判断指挥和控制链路是否正常。若状态为'正常'则正常，为'故障'则异常，其他状态需进一步确认。
    depends_on: []
    hint: 'R1: 如果飞行日志的 c2_link_status 为 ''正常''，则 C2 链路正常。

      R2: 如果飞行日志的 c2_link_status 为 ''故障''，则 C2 链路异常。

      注意: 其他状态值视为未知，需进一步确认。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_fuel_battery:
    summary: 检查飞行日志中燃油或电池储备是否充足
    group: 飞行管理
    description: 根据飞行日志ID获取对应的UASFlightLog对象，检查其fuel_or_battery_level字段是否为'充足'，返回布尔值表示储备是否充足。
    depends_on: []
    hint: 'R1: 如果 flight_log_id 对应的 UASFlightLog 对象中 fuel_or_battery_level 字段值为 ''充足''，则返回
      true，表示储备充足。

      R2: 如果 fuel_or_battery_level 字段值为 ''不足''，则返回 false，表示储备不足。

      注意: 如果 flight_log_id 无效或对应日志不存在，应返回错误。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_weather:
    summary: 检查飞行日志中的气象条件是否适合飞行
    group: 飞行管理
    description: 根据飞行日志中的气象条件描述，判断是否满足飞行安全要求。规则：气象条件必须明确表示适合飞行，否则判定为不合规。
    depends_on: []
    hint: 'R1: 飞行日志的 weather_conditions 字段必须包含“适合飞行”或类似明确表示气象条件良好的描述。

      R2: 如果 weather_conditions 包含“不适合飞行”、“恶劣”、“危险”等负面描述，则判定为不合规。

      注意: 若 weather_conditions 为空或缺失，视为不合规。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_secondary_surveillance_radar:
    summary: 检查飞行日志中二次雷达应答机或自动监视设备安装及代码申请情况
    group: 飞行管理
    description: 根据飞行日志，检查是否安装二次雷达应答机或有关自动监视设备，以及代码申请情况。依据《无人驾驶航空器飞行管理暂行条例》第三章第二十七条。
    depends_on: []
    hint: 'R1: 飞行日志中应记录是否安装二次雷达应答机或有关自动监视设备。

      R2: 若安装，应记录代码申请情况。

      注意: 具体规则依据《无人驾驶航空器飞行管理暂行条例》第三章第二十七条执行。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_special_mission_approval:
    summary: 检查飞行日志对应的特殊通用航空飞行任务是否持有有效批准文件
    group: 飞行管理
    description: 根据飞行日志中的飞行目的，判断是否属于国家规定的特殊通用航空飞行任务，并检查是否持有有效的任务批准文件。如果飞行目的属于特殊任务且无有效批准文件，则检查不通过。
    depends_on: []
    hint: 'R1: 如果飞行日志的 flight_purpose 属于国家规定的特殊通用航空飞行任务（如作业、训练、测试等），则必须持有有效的任务批准文件。

      R2: 任务批准文件的有效性需根据文件签发日期和有效期判断，若文件已过期或缺失，则检查不通过。

      注意: 具体哪些飞行目的属于特殊通用航空飞行任务，需参照国家相关规定。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_alternate_airport:
    summary: 检查飞行计划是否指定了备降机场
    group: 飞行管理
    description: 根据飞行计划ID，检查对应的UASFlightPlan对象中是否包含备降机场信息。备降机场信息可能存在于emergency_procedure或route字段中。
    depends_on: []
    hint: 'R1: 如果飞行计划中未指定备降机场，则检查不通过。

      注意：备降机场信息通常包含在飞行计划的应急预案或航线描述中。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_navigation_capability:
    summary: 检查飞行计划是否具备通信、导航和被监视能力
    group: 飞行管理
    description: 根据飞行计划，检查无人机是否具备所需的通信、导航和被监视能力。规则包括：飞行计划必须包含通信联络方法和指挥控制链路无线电频率及占用带宽；必须包含应急处置程序。
    depends_on: []
    hint: 'R1: 飞行计划必须包含通信联络方法（communication_method）和指挥控制链路无线电频率及占用带宽（radio_frequency）。

      R2: 飞行计划必须包含应急处置程序（emergency_procedure）。

      注意: 无。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_special_flight_support:
    summary: 检查飞行计划是否需要特殊飞行保障
    group: 飞行管理
    description: 根据飞行计划中的空域、航线、高度、速度等信息，判断该飞行计划是否涉及特殊飞行保障需求（如大型活动、重要任务等），并返回相应结果。
    depends_on: []
    hint: 'R1: 如果飞行计划涉及特殊飞行保障需求（如大型活动、重要任务等），则返回需要特殊保障。

      R2: 如果飞行计划不涉及特殊飞行保障需求，则返回无需特殊保障。

      注意: 特殊飞行保障需求的具体判断依据飞行计划中的空域、航线、高度、速度等信息，以及相关法规要求。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_other_info:
    summary: 检查飞行计划中是否包含国家规定的其他必要信息
    group: 飞行管理
    description: 根据飞行计划，检查是否包含国家空中交通管理领导机构规定的其他与空域使用和飞行安全有关的必要信息。
    depends_on: []
    hint: 'R1: 飞行计划必须包含国家空中交通管理领导机构规定的其他与空域使用和飞行安全有关的必要信息。

      注意: 具体信息内容需参照国家空中交通管理领导机构的规定。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_long_term_plan:
    summary: 检查固定空域内常态飞行活动的长期申请与备案
    group: 飞行管理
    description: 对于在固定空域内实施常态飞行活动的，检查是否提出长期飞行活动申请并获批准，以及是否在拟飞行前1日12时前将飞行计划报空中交通管理机构备案。
    depends_on: []
    hint: 'R1: 如果飞行活动属于在固定空域内实施常态飞行活动 → 检查是否已提出长期飞行活动申请并获批准。

      R2: 如果已获批准 → 检查是否在拟飞行前1日12时前将飞行计划报空中交通管理机构备案。

      注意: 本规则仅适用于固定空域内的常态飞行活动。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_emergency_plan_content:
    summary: 检查飞行计划的应急处置程序是否完整、可行。
    group: 应急处置
    description: 根据飞行计划ID，获取对应的UASFlightPlan对象，检查其emergency_procedure字段是否非空且内容完整可行。返回检查结果。
    depends_on: []
    hint: 'R1: 如果飞行计划中 emergency_procedure 字段为空或缺失，则检查不通过。

      R2: 如果 emergency_procedure 内容不完整（如缺少关键步骤、联系方式等），则检查不通过。

      注意: 具体完整性标准需结合飞行计划其他字段（如 altitude、route）判断。'
    params:
      plan_id:
        type: str
        description: 飞行计划ID
  check_uas_flight_log_risk_prevention:
    summary: 检查无人机单位或个人是否制定紧急预案并落实风险防范措施
    group: 应急处置
    description: 根据飞行日志或现场检查，确认使用无人机的单位或个人是否按照有关规定制定飞行紧急情况处置预案，落实风险防范措施，及时消除安全隐患。
    depends_on: []
    hint: 'R1: 如果存在飞行日志或现场检查记录，则确认单位或个人是否按照有关规定制定飞行紧急情况处置预案，落实风险防范措施，及时消除安全隐患。'
    params:
      unit_name:
        type: str
        description: 单位名称
  check_uas_flight_log_emergency_drill:
    summary: 检查空中交通管理机构、民用航空管理部门、县级以上公安机关是否定期进行无人机飞行安全管理应急预案演练。
    group: 应急处置
    description: 根据《无人驾驶航空器飞行管理暂行条例》第三十九条，检查空中交通管理机构、民用航空管理部门、县级以上公安机关是否定期进行无人机飞行安全管理应急预案演练。通过查询应急演练记录，判断相关单位是否按要求开展演练。
    depends_on: []
    hint: 'R1: 空中交通管理机构、民用航空管理部门、县级以上公安机关应当定期进行无人机飞行安全管理应急预案演练。

      注意: 检查应急演练记录中是否包含上述单位的演练记录。'
    params:
      unit_name:
        type: str
        description: 单位名称
  check_uas_flight_log_emergency_response_integration:
    summary: 检查县级以上地方人民政府是否将无人机安全应急管理纳入突发事件应急管理体系并健全信息互通、协同配合机制
    group: 应急处置
    description: 根据《无人驾驶航空器飞行管理暂行条例》第四章第三十九条，检查指定地区（县级以上地方人民政府）是否将无人驾驶航空器安全应急管理纳入突发事件应急管理体系，并健全信息互通、协同配合的应急处置工作机制。
    depends_on: []
    hint: 'R1: 如果地区为县级以上地方人民政府 → 检查该地区是否将无人驾驶航空器安全应急管理纳入突发事件应急管理体系。

      R2: 如果地区为县级以上地方人民政府 → 检查该地区是否健全信息互通、协同配合的应急处置工作机制。

      注意: 仅适用于县级以上地方人民政府，其他级别不适用。'
    params:
      region:
        type: str
        description: 地区名称
  check_uas_flight_log_emergency_landing:
    summary: 检查无人机是否具备紧急避让、降落等应急处置功能
    group: 无人机管理
    description: 根据无人机型号，检查该无人机是否具备紧急避让、降落等应急处置功能。输入参数为无人机型号，输出布尔值表示是否具备该功能。
    depends_on: []
    hint: 'R1: 如果无人机型号为空，则返回错误。

      R2: 检查无人机是否具备紧急避让、降落等应急处置功能，根据无人机型号查询其性能参数，判断是否包含相关功能描述。'
    params:
      drone_model:
        type: str
        description: 无人机型号
  check_uas_flight_log_emergency_report_timeliness:
    summary: 检查异常飞行后是否在降落后24小时内向空中交通管理机构报告
    group: 应急处置
    description: 根据飞行日志，检查异常情况发生后是否在降落后24小时内向空中交通管理机构报告。仅当flight_status为“异常”时触发检查，报告时间以接收记录为准，无记录视为未报告。
    depends_on: []
    hint: 'R1: 如果飞行日志的 flight_status 为“异常”，则检查该日志的 end_time（降落时间）后24小时内是否已向空中交通管理机构报告。

      R2: 报告时间以空中交通管理机构接收记录为准。

      注意: 若飞行日志中未记录报告时间，视为未报告。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_disposal:
    summary: 检查飞行日志中异常情况是否得到及时处置并服从指令
    group: 应急处置
    description: 根据飞行日志，检查异常情况发生时是否及时处置，并服从空中交通管理机构的指令。依据《无人驾驶航空器飞行管理暂行条例》第四章第四十条。
    depends_on: []
    hint: 'R1: 飞行日志中存在异常情况（flight_status为''异常''）时，检查日志中是否有对应的处置记录（如emergency_plan非空或c2_link_status变化等）。

      R2: 若存在异常情况且未及时处置，则判定为违规。

      注意: 具体处置是否及时需结合日志时间戳判断，但本函数仅检查是否存在处置记录。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_communication:
    summary: 根据飞行日志检查应急通信联络是否畅通
    group: 应急处置
    description: 根据飞行日志中的c2_link_status字段判断指挥和控制链路状态，若为故障或异常则判定通信不畅；若飞行状态异常但链路正常，需检查应急处置预案是否包含通信恢复措施。
    depends_on: []
    hint: 'R1: 如果飞行日志中c2_link_status字段值为''故障''或''异常''，则判定为通信联络不畅。

      R2: 如果飞行日志中flight_status字段值为''异常''，且c2_link_status字段值为''正常''，则需进一步检查emergency_plan字段是否包含通信恢复措施。

      注意: 若飞行日志中c2_link_status字段缺失或为空，视为通信联络不畅。'
    params:
      flight_log_id:
        type: str
        description: 飞行日志ID
  check_uas_flight_log_emergency_authority:
    summary: 检查紧急处置措施是否依法采取
    group: 应急处置
    description: 根据处置记录ID，检查空中交通管理机构、民用航空管理部门和公安机关在采取技术防控、扣押、责令停止飞行、查封等紧急处置措施时，是否依法进行。
    depends_on: []
    hint: 'R1: 处置记录ID对应的紧急处置措施必须由空中交通管理机构、民用航空管理部门或公安机关依法采取。

      注意: 本函数仅检查处置记录ID对应的措施是否依法采取，不涉及具体措施内容。'
    params:
      disposal_record_id:
        type: str
        description: 处置记录ID
  check_uas_flight_log_countermeasure_authorization:
    summary: 检查配备无人驾驶航空器反制设备的单位是否属于军队、警察或经公安机关授权的高风险反恐重点目标管理单位，并确保在公安机关或有关军事机关指导监督下使用。
    group: 无人机管理
    description: 根据《无人驾驶航空器飞行管理暂行条例》第四章第四十三条，检查配备无人驾驶航空器反制设备的单位是否属于军队、警察或经公安机关授权的高风险反恐重点目标管理单位，并确认其使用反制设备时是否在公安机关或有关军事机关指导监督下。
    depends_on: []
    hint: 'R1: 配备单位属于军队、警察或经公安机关授权的高风险反恐重点目标管理单位 → 允许配备无人驾驶航空器反制设备。

      R2: 配备单位不属于军队、警察或经公安机关授权的高风险反恐重点目标管理单位 → 不允许配备无人驾驶航空器反制设备。

      R3: 配备单位属于军队、警察或经公安机关授权的高风险反恐重点目标管理单位 → 必须在公安机关或有关军事机关指导监督下使用反制设备。

      注意: 反制设备的使用必须同时满足单位资格和指导监督条件。'
    params:
      unit_name:
        type: str
        description: 配备单位名称
  check_uas_flight_log_countermeasure_illegal:
    summary: 检查单位或个人是否非法拥有、使用无人驾驶航空器反制设备
    group: 无人机管理
    description: 根据举报或检查，确认任何单位或个人是否非法拥有、使用无人驾驶航空器反制设备。反制设备指用于干扰、阻断无人驾驶航空器正常飞行的设备。
    depends_on: []
    hint: 'R1: 如果单位或个人被举报或检查发现非法拥有、使用无人驾驶航空器反制设备，则确认其行为违法。

      注意: 反制设备指用于干扰、阻断无人驾驶航空器正常飞行的设备。'
    params:
      unit_or_person:
        type: str
        description: 单位或个人名称
  check_uas_flight_log_penalty:
    summary: 根据违规行为类型和严重程度，确定处罚金额。
    group: 法律责任
    description: 根据违规行为类型（未登记飞行、无执照飞行、违规进入管制空域）和严重程度（普通、严重），返回处罚建议（金额）。
    depends_on: []
    hint: 'R1: violation_type 为 ''未登记飞行'' → 处罚金额 = 200元。

      R2: violation_type 为 ''无执照飞行'' → 处罚金额 = 500元。

      R3: violation_type 为 ''违规进入管制空域'' → 处罚金额 = 1000元。

      R4: severity 为 ''严重'' → 处罚金额加倍。

      注意: 若 violation_type 不在上述列表中，返回 ''未知违规类型''。'
    params:
      violation_type:
        type: str
        description: 违规行为类型
      severity:
        type: str
        description: 严重程度
  initiate_emergency_response:
    summary: 启动应急响应，调集人员装备并上报初步信息
    group: 应急响应
    description: 根据灾害事件信息启动应急响应，包括调集人员装备、设立警告标志、研判事态、上报初步信息、提出应急需求。
    depends_on: []
    hint: 'R1: 事件类型为自然灾害或事故灾难时，启动应急响应。

      R2: 启动应急响应后，需调集人员装备、设立警告标志、研判事态、上报初步信息、提出应急需求。

      注意: 无。'
    params:
      event_type:
        type: str
        description: 事件类型，如自然灾害、事故灾难
      event_location:
        type: str
        description: 事件地点
      event_scale:
        type: str
        description: 事件规模描述
  conduct_road_network_damage_survey:
    summary: 开展路网灾情调查，评估受灾区域路网通行状况
    group: 应急检查
    description: 通过卫星遥感、航空遥感、地面监测等手段，获取受灾区域路网或重点区域的受灾线路数量、受损基础设施分布及灾情影响范围，初步明确应急抢通需求。
    depends_on: []
    hint: 'R1: 受灾区域描述（affected_area）应明确指定区域范围，如行政区划、地理坐标或路网名称。

      R2: 调查手段包括卫星遥感、航空遥感、地面监测等，应综合运用。

      R3: 调查对象包括受灾区域内的路网或重点区域，涉及RoadSegment、Bridge、Tunnel等基础设施。

      R4: 调查内容应包括受灾线路数量、受损基础设施分布及灾情影响范围。

      R5: 调查结果应初步明确应急抢通需求，如抢通目标等级、抢通难度等。

      注意: 本函数仅执行初步调查，不涉及详细评估或抢通方案制定。'
    params:
      affected_area:
        type: str
        description: 受灾区域描述
  conduct_route_damage_survey:
    summary: 对受损公路线路上的基础设施（路基路面、桥涵、隧道）进行实地快速评估，获取损伤位置、类型、规模及通行状况，确定损伤等级和抢通建议。
    group: 应急检查
    description: 对受损公路线路上的基础设施（路基路面、桥涵、隧道）进行实地快速评估，获取损伤位置、类型、规模及通行状况，确定损伤等级和抢通建议。依据《公路交通应急抢通技术规程》3.3.5和4.2.3条款，评估内容包括：路基路面、桥涵、隧道的损伤等级（I/II/III级），桥梁需分别评估整体稳定性、承载能力和桥面通行能力的损伤等级，隧道需评估抢通难度、抢通目标和次生事故风险等级。最终输出各设施的损伤等级和通行建议（正常通行、限制通行、禁止通行）。
    depends_on: []
    hint: 'R1: 如果设施类型为路基路面、桥涵或隧道，则根据 DamageGradeStandard 中的损伤等级（I级、II级、III级）确定损伤程度和通行建议。

      R2: 对于桥梁，损伤等级分为与结构整体稳定性相关的损伤等级、与结构承载能力相关的损伤等级、与桥面通行能力相关的损伤等级，分别赋值给 overall_stability_damage_grade、bearing_capacity_damage_grade、deck_passability_damage_grade，并综合确定
      damage_grade 和 passability_conclusion。

      R3: 对于隧道，根据 damage_grade 确定 clearance_difficulty_level、clearance_target_level、secondary_disaster_risk_level。

      注意: 损伤等级枚举值：I级（轻微损伤）、II级（中等损伤）、III级（严重损伤或坍塌）。通行结论枚举值：正常通行、限制通行、禁止通行。'
    params:
      road_name:
        type: str
        description: 公路名称
      start_stake:
        type: str
        description: 起始桩号
      end_stake:
        type: str
        description: 终止桩号
  conduct_facility_on_site_inspection:
    summary: 对路基路面、桥涵、隧道等结构物进行现场检查，获取具体灾损形态、程度及通行能力评估，填写现场检查表。
    group: 应急检查
    description: 根据设施类型（路基路面、桥涵、隧道），对指定的设施进行现场检查，获取结构物具体灾损形态、受损程度及通行能力评估，并创建相应的应急评估或调查记录（RoadSubgradeEmergencyAssessment、BridgeEmergencyAssessment、TunnelEmergencyInvestigation）。
    depends_on: []
    hint: 'R1: facility_type 为 ''路基路面'' 时，检查 RoadSegment 对象，并创建 RoadSubgradeEmergencyAssessment
      记录。

      R2: facility_type 为 ''桥涵'' 时，检查 Bridge 对象，并创建 BridgeEmergencyAssessment 记录。

      R3: facility_type 为 ''隧道'' 时，检查 Tunnel 对象，并创建 TunnelEmergencyInvestigation 记录。

      R4: 现场检查应通过检视、借助各种设备装备，对所属公路基础设施受损状况、结构物承载能力、抵御次生灾害能力开展核查工作。

      注意: 现场检查结果需填写对应的应急评估或调查表。'
    params:
      facility_type:
        type: str
        description: 设施类型：路基路面、桥涵、隧道
      facility_name:
        type: str
        description: 设施名称
  determine_damage_grade_for_road_subgrade:
    summary: 确定路基路面损伤等级
    group: 应急评估
    description: 根据路基路面、路基防护、路基支挡结构的损伤状况，按单项最大损伤等级确定受损路段整体损伤等级（I/II/III级）。
    depends_on:
    - conduct_facility_on_site_inspection
    hint: 'R1: 根据路基路面、路基防护、路基支挡结构的损伤状况，按单项最大损伤等级确定受损路段整体损伤等级（I/II/III级）。

      注意: 损伤等级从 subgrade_damage_grade、slope_damage_grade、retaining_structure_damage_grade
      中取最大值。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
  determine_damage_grade_for_bridge:
    summary: 确定桥涵损伤等级（I/II/III级）
    group: 应急评估
    description: 根据桥涵整体稳定、承载能力、车辆通行能力的损伤状况，按单项最大损伤等级确定桥涵整体损伤等级（I/II/III级）。
    depends_on:
    - conduct_facility_on_site_inspection
    hint: 'R1: 根据桥涵整体稳定、承载能力、车辆通行能力的损伤状况，按单项最大损伤等级确定桥涵整体损伤等级（I/II/III级）。

      注意: 损伤等级从高到低为I级（严重）、II级（中等）、III级（轻微），取三者中最高等级。'
    params:
      bridge_name:
        type: str
        description: 桥梁名称
  determine_damage_grade_for_tunnel:
    summary: 根据隧道各部位最大损伤等级确定隧道整体损伤等级（I/II/III级）
    group: 应急评估
    description: 根据隧道洞口边仰坡、洞门、衬砌、路面、吊顶预埋件等的损伤状况，按单项最大损伤等级确定隧道整体损伤等级（I/II/III级）。
    depends_on:
    - conduct_facility_on_site_inspection
    hint: 'R1: 根据隧道洞口边仰坡、洞门、衬砌、路面、吊顶预埋件等的损伤状况，按单项最大损伤等级确定隧道整体损伤等级（I/II/III级）。

      注意: 损伤等级分为I级、II级、III级。'
    params:
      tunnel_name:
        type: str
        description: 隧道名称
  propose_clearance_plan_for_road_subgrade:
    summary: 根据路基路面受损情况和抢通目标，按一路段一方案原则提出抢修技术方案，明确宽度、纵坡、曲线半径、轴载等指标。
    group: 应急抢通
    description: 根据路基路面受损情况、线路应急抢通目标，按“一路段一方案”原则提出抢修技术方案，明确宽度、纵坡、曲线半径、轴载等关键技术指标。
    depends_on:
    - determine_damage_grade_for_road_subgrade
    hint: 'R1: 实施抢通施工作业前，应根据现场实际情况及线路应急抢通目标，按“一路段一方案”的原则提出路基路面现场应急抢修技术方案建议。

      R2: 建议中应明确满足与路基路面应急通行需求相适应的宽度、纵坡、曲线半径、轴载等关键技术指标。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
      clearance_target:
        type: str
        description: 抢通目标描述
  propose_clearance_plan_for_bridge:
    summary: 根据桥涵受损情况和抢通目标，提出桥涵现场应急抢修技术方案建议，明确车辆行驶位置、载重、车道、间距、速度等指标。
    group: 应急抢通
    description: 根据桥涵受损情况、线路应急抢通目标，按“一桥涵一方案”原则提出抢修技术方案，明确车辆行驶位置、载重、车道、间距、速度等关键技术指标。
    depends_on:
    - determine_damage_grade_for_bridge
    hint: 'R1: 根据桥涵受损情况、线路应急抢通目标，按“一桥涵一方案”原则提出抢修技术方案。

      R2: 方案中应明确满足与桥涵应急通行需求相适应的车辆行驶位置、车辆行驶载重、单或多车道通行状况、车辆间距及行驶速度等关键技术指标。

      注意: 抢通技术方案可选用便道便桥、应急修复、快速补强与纠偏等。'
    params:
      bridge_name:
        type: str
        description: 桥梁名称
      clearance_target:
        type: str
        description: 抢通目标描述
  propose_clearance_plan_for_tunnel:
    summary: 根据隧道受损情况和抢通目标，提出隧道应急抢修技术方案，明确通行高度、宽度等指标。
    group: 应急抢通
    description: 根据隧道现场实际情况及线路应急抢通目标，按“一隧道一方案”原则提出隧道现场应急抢修技术方案建议，明确满足隧道应急通行需求相适应的隧道通行高度、宽度等关键技术指标要求。
    depends_on:
    - determine_damage_grade_for_tunnel
    hint: 'R1: 实施抢通施工作业前，应根据现场实际情况及线路应急抢通目标，按“一隧道一方案”的原则提出隧道现场应急抢修技术方案建议。

      R2: 建议应明确满足与隧道应急通行需求相适应的隧道通行高度、宽度等关键技术指标要求。

      注意: 本函数仅提出方案建议，不涉及具体施工操作。'
    params:
      tunnel_name:
        type: str
        description: 隧道名称
      clearance_target:
        type: str
        description: 抢通目标描述
  propose_detour_plan:
    summary: 制定绕行方案，用于受损设施短期内无法抢通时，包含绕行线路名称、起讫点、通行状况等。
    group: 应急决策
    description: 当受损设施短期内无法抢通时，制定绕行方案，包括绕行线路名称、起讫点、通行状况等。依据《公路交通应急抢通技术规程》3.3.6、5.2.5。
    depends_on: []
    hint: 'R1: 当受损设施短期内无法抢通时，应制定绕行方案。

      R2: 绕行方案应包括绕行线路名称、起讫点、通行状况等。

      注意: 制定绕行方案前，应已开展设施现场检查，并根据受损公路基础设施状况和线路应急抢通目标，制定受损公路基础设施现场应急抢修技术方案建议。'
    params:
      blocked_road_segment:
        type: str
        description: 阻断路段标识
      detour_route:
        type: str
        description: 绕行线路描述
  conduct_emergency_passability_assessment_for_road_subgrade:
    summary: 开展路基路面应急通行评估，判断是否达到应急通行条件。
    group: 应急评估
    description: 路基路面应急抢通施工作业完成后，通过试通行等方法评估是否达到应急通行条件，无异常后开放应急通行。评估结果包括路基本体、边坡、支挡结构的受损程度等级和通行建议。
    depends_on:
    - propose_clearance_plan_for_road_subgrade
    hint: 'R1: 评估路基路面应急通行条件时，应通过试通行等方法评估是否达到应急通行条件，无异常后开放应急通行。

      注意: 评估结果应记录在RoadSubgradeEmergencyAssessment对象中。'
    params:
      road_segment_id:
        type: str
        description: 路段标识
  conduct_emergency_passability_assessment_for_bridge:
    summary: 开展桥涵应急通行评估，根据损伤等级确定通行结论。
    group: 应急评估
    description: 桥涵应急抢通施工作业完成后，采用分级试加载、试通行等方法进行应急通行评估，加载检验安全且试通行无异常后开放应急通行。根据整体稳定性损伤等级、承载能力损伤等级、桥面通行能力损伤等级，确定通行结论（正常通行、限制通行、禁止通行）。
    depends_on:
    - propose_clearance_plan_for_bridge
    hint: 'R1: 整体稳定性损伤等级、承载能力损伤等级、桥面通行能力损伤等级均为I级 → 通行结论为正常通行。

      R2: 整体稳定性损伤等级、承载能力损伤等级、桥面通行能力损伤等级中任一为III级 → 通行结论为禁止通行。

      R3: 其他情况 → 通行结论为限制通行。

      注意: 评估日期格式为YYYY-MM-DD。'
    params:
      bridge_name:
        type: str
        description: 桥梁名称
  conduct_emergency_passability_assessment_for_tunnel:
    summary: 开展隧道应急通行评估，判定结构稳定、限界达标且试通行无异常后开放应急通行。
    group: 应急评估
    description: 隧道应急抢通施工作业完成后，判定结构稳定、限界达标后，试通行无异常可开放应急通行。
    depends_on:
    - propose_clearance_plan_for_tunnel
    hint: 'R1: 隧道应急抢通施工作业完成后，判定结构稳定、限界达标后，试通行无异常可开放应急通行。'
    params:
      tunnel_name:
        type: str
        description: 隧道名称
  select_clearance_technique_for_road_subgrade:
    summary: 根据灾损类型和规模选择路基路面抢通技术
    group: 应急抢通
    description: 根据路基路面灾损类型（沉陷开裂、坍塌、水毁、滑坡、崩塌落石、泥石流、沙害、低温雨雪冰冻）和规模（小型、中型、大型），从ClearanceTechniqueRule中匹配适用的抢通技术措施。
    depends_on:
    - propose_clearance_plan_for_road_subgrade
    hint: 'R1: 如果灾损类型为沉陷开裂，则抢通技术选用规则为：小型规模采用回填夯实，中型规模采用注浆加固，大型规模采用重建。

      R2: 如果灾损类型为坍塌，则抢通技术选用规则为：小型规模采用清理坍塌体，中型规模采用清理+支挡，大型规模采用重建。

      R3: 如果灾损类型为水毁，则抢通技术选用规则为：小型规模采用抛石防护，中型规模采用浆砌片石防护，大型规模采用重建。

      R4: 如果灾损类型为滑坡，则抢通技术选用规则为：小型规模采用削坡减载，中型规模采用抗滑桩，大型规模采用重建。

      R5: 如果灾损类型为崩塌落石，则抢通技术选用规则为：小型规模采用清除危岩，中型规模采用主动防护网，大型规模采用重建。

      R6: 如果灾损类型为泥石流，则抢通技术选用规则为：小型规模采用清淤排导，中型规模采用拦挡坝，大型规模采用重建。

      R7: 如果灾损类型为沙害，则抢通技术选用规则为：小型规模采用清除积沙，中型规模采用固沙措施，大型规模采用重建。

      R8: 如果灾损类型为低温雨雪冰冻，则抢通技术选用规则为：小型规模采用撒布融雪剂，中型规模采用机械除雪，大型规模采用综合除雪。

      注意：以上规则基于公路交通应急抢通技术规程6.3.2-6.3.9，具体技术选择需结合现场实际情况。'
    params:
      damage_type:
        type: str
        description: 灾损类型
      scale:
        type: str
        description: 规模描述
  select_clearance_technique_for_bridge:
    summary: 根据桥涵灾损类型选择抢通技术（便道便桥、应急修复、快速补强与纠偏）
    group: 应急抢通
    description: 根据桥涵灾损类型和应急通行需求，选用便道便桥、应急修复、快速补强与纠偏等技术方案。输入参数包括 damage_type（灾损类型）和
      bridge_name（桥梁名称）。规则依据《公路交通应急抢通技术规程》7.3.2-7.3.14，具体规则存储在 ClearanceTechniqueRule
      对象中。
    depends_on:
    - propose_clearance_plan_for_bridge
    hint: 'R1: 如果 damage_type 为 ''桥台冲毁'' 或 ''桥墩冲毁''，则推荐 ''便道便桥''。

      R2: 如果 damage_type 为 ''梁体断裂'' 或 ''支座失效''，则推荐 ''应急修复''。

      R3: 如果 damage_type 为 ''桥墩倾斜'' 或 ''基础冲刷''，则推荐 ''快速补强与纠偏''。

      注意: 具体规则需参考 ClearanceTechniqueRule 对象中的 recommended_technique 字段，以上仅为示例。'
    params:
      damage_type:
        type: str
        description: 灾损类型
      bridge_name:
        type: str
        description: 桥梁名称
  select_clearance_technique_for_tunnel:
    summary: 根据隧道灾损类型选择抢通技术措施
    group: 应急抢通
    description: 根据给定的隧道灾损类型（如洞口掩埋、落石、泥石流倒灌、洪水淹没、衬砌受损、涌水突泥等），从 ClearanceTechniqueRule
      中匹配适用的抢通技术。规则来源于《公路交通应急抢通技术规程》8.3.2-8.3.10。
    depends_on:
    - propose_clearance_plan_for_tunnel
    hint: 'R1: 如果 damage_type 为“洞口掩埋”，则推荐抢通技术为“清除洞口堆积物”。

      R2: 如果 damage_type 为“落石”，则推荐抢通技术为“清除危石、加固边坡”。

      R3: 如果 damage_type 为“泥石流倒灌”，则推荐抢通技术为“清淤、疏通排水”。

      R4: 如果 damage_type 为“洪水淹没”，则推荐抢通技术为“排水、通风、检测”。

      R5: 如果 damage_type 为“衬砌受损”，则推荐抢通技术为“临时支撑、加固衬砌”。

      R6: 如果 damage_type 为“涌水突泥”，则推荐抢通技术为“注浆堵水、清淤”。

      注意: 以上规则基于《公路交通应急抢通技术规程》8.3.2-8.3.10，具体技术选择需结合现场实际情况。'
    params:
      damage_type:
        type: str
        description: 灾损类型
      tunnel_name:
        type: str
        description: 隧道名称
  allocate_emergency_equipment_and_materials:
    summary: 调配应急装备物资
    group: 应急保障
    description: 根据应急抢通方案和现场应急抢修技术方案，就近便捷调配通用和专用应急装备物资，满足功能适用、环境适应、安全可靠的要求。
    depends_on: []
    hint: 'R1: 根据 clearance_plan 和 required_equipment、required_materials，从就近的 EmergencyDepot
      中调配 EquipmentStock 和 MaterialStock。

      R2: 优先选择距离目的地最近的储备点，且装备物资状态为良好或充足。

      R3: 调配的装备需满足功能适用、环境适应、安全可靠的要求。

      注意: 若最近储备点库存不足，可考虑次近储备点；调配记录需写入 EmergencyResourceDispatchRecord。'
    params:
      clearance_plan:
        type: str
        description: 抢通方案描述
      required_equipment:
        type: str
        description: 所需装备清单
      required_materials:
        type: str
        description: 所需物资清单
  deploy_emergency_communication_equipment:
    summary: 调配应急通信装备（卫星电话、北斗终端、短波电台等）
    group: 应急保障
    description: 根据应急抢通需求，按照表9.2.1调配卫星电话、北斗终端、短波电台、无线自组网电台、对讲机、应急通信车、应急通信方舱等通信装备。
    depends_on: []
    hint: 'R1: 应急通信装备包括卫星电话、手持/车载北斗终端、短波电台、无线自组网电台、对讲机、应急通信车、应急通信方舱。

      R2: 根据应急抢通需求，按照表9.2.1调配应急通信装备。

      注意: 装备调配应满足通信需求描述中的具体场景。'
    params:
      communication_requirements:
        type: str
        description: 通信需求描述
  deploy_information_acquisition_equipment:
    summary: 根据灾情调查需求（路网/线路/设施），调配无人机等装备
    group: 应急保障
    description: 根据灾情调查需求（路网、线路、设施），调配遥感卫星、航空遥感装备、无人船/艇、爬行机器人、视频监控设备等信息获取装备，优先使用无人机。
    depends_on: []
    hint: 'R1: 如果 survey_type 为 ''路网''，则优先调配无人机进行路网巡查。

      R2: 如果 survey_type 为 ''线路''，则优先调配无人机沿线路飞行调查。

      R3: 如果 survey_type 为 ''设施''，则优先调配无人机对设施进行定点拍摄。

      注意: 具体调配的无人机需满足空域保持能力、可靠被监视能力、全程可随时人工介入操控等要求。'
    params:
      survey_type:
        type: str
        description: 调查类型：路网、线路、设施
  conduct_technical_monitoring_during_clearance:
    summary: 在抢通过程中开展技术监测，包括巡查、地表沉降、边仰坡变形、拱顶下沉、周边收敛、隧底隆起、裂缝发展、水压水量变化等。
    group: 应急抢通
    description: 在隧道等抢通过程中开展技术监测，包括巡查、地表沉降、边仰坡变形、拱顶下沉、周边收敛、隧底隆起、裂缝发展、水压水量变化等。监测数据记录应包含监测项目、数值（毫米）、时间等信息。
    depends_on: []
    hint: 'R1: 监测项目包括巡查、地表沉降、边仰坡变形、拱顶下沉、周边收敛、隧底隆起、裂缝发展、水压水量变化等。

      R2: 监测数据记录应包含监测项目、数值、时间等信息。

      注意: 监测数值单位为毫米。'
    params:
      facility_type:
        type: str
        description: 设施类型
      facility_name:
        type: str
        description: 设施名称
  generate_emergency_clearance_overall_plan:
    summary: 生成灾害事件应急抢通总体方案
    group: 应急决策
    description: 根据路网灾情调查评估结果，确定路网抢通范围、优先抢通重点线路和关键节点清单、应急队伍调配、应急装备物资调配、收费站绿色通道开辟、应急支援等内容。
    depends_on:
    - conduct_road_network_damage_survey
    hint: 'R1: 根据路网灾情调查评估结果，确定路网抢通范围。

      R2: 根据路网灾情调查评估结果，确定优先抢通重点线路和关键节点清单。

      R3: 根据路网灾情调查评估结果，确定应急队伍调配方案。

      R4: 根据路网灾情调查评估结果，确定应急装备物资调配方案。

      R5: 根据路网灾情调查评估结果，确定收费站绿色通道开辟方案。

      R6: 根据路网灾情调查评估结果，确定应急支援内容。

      注意: 所有决策应基于 survey_result 中的灾情调查评估结果。'
    params:
      survey_result:
        type: str
        description: 路网灾情调查结果
  generate_route_clearance_plan:
    summary: 根据线路灾损调查结果，生成受损公路线路应急抢通方案，包括抢通量、物资装备需求、队伍需求及工作量测算。
    group: 应急决策
    description: 根据线路灾损调查评估结果，确定路基路面、桥涵、隧道的抢通量，应急装备物资种类、规格/型号、数量需求，应急队伍专业知识与技能、数量需求，抢通工作量测算等。
    depends_on:
    - conduct_route_damage_survey
    hint: 'R1: 根据线路灾损调查结果，确定路基路面、桥涵、隧道的抢通量。

      R2: 根据线路灾损调查结果，确定应急装备物资种类、规格/型号、数量需求。

      R3: 根据线路灾损调查结果，确定应急队伍专业知识与技能、数量需求。

      R4: 根据线路灾损调查结果，进行抢通工作量测算。

      注意: 本函数不涉及具体数值计算，仅生成方案框架。'
    params:
      route_survey_result:
        type: str
        description: 线路灾损调查结果
  generate_facility_clearance_technical_plan:
    summary: 生成受损公路基础设施现场应急抢修技术方案
    group: 应急决策
    description: 根据设施现场检查评估结果，确定满足现场应急抢通目标的关键技术指标、工艺工法、应急装备物资、应急队伍等。涉及对象包括路段、桥梁、隧道。
    depends_on:
    - conduct_facility_on_site_inspection
    hint: 'R1: 根据设施现场检查评估结果，确定满足现场应急抢通目标的关键技术指标、工艺工法、应急装备物资、应急队伍等。

      注意: 规则来源于《公路交通应急抢通技术规程》5.2.4，具体规则需结合文档中关于应急通行、观察通行、限制通行、禁止通行等术语的定义。'
    params:
      facility_type:
        type: str
        description: 设施类型
      facility_name:
        type: str
        description: 设施名称
  make_emergency_passability_decision:
    summary: 依据应急通行评估结果，做出应急通行决策，包括决策结果（限制通行或禁止通行）、通行限制条件和提示信息。
    group: 应急决策
    description: 根据设施类型（road_subgrade/bridge/tunnel）调用对应的应急通行评估函数获取评估结果，然后基于评估结果做出决策：若评估结果为'passable'则决策为限制通行并设置具体限制条件；若为'impassable'则决策为禁止通行。最终将决策信息记录到TrafficControlImplementation对象中。
    depends_on:
    - conduct_emergency_passability_assessment_for_road_subgrade
    - conduct_emergency_passability_assessment_for_bridge
    - conduct_emergency_passability_assessment_for_tunnel
    hint: 'R1: 如果 facility_type 为 ''road_subgrade''，则调用 conduct_emergency_passability_assessment_for_road_subgrade
      获取评估结果。

      R2: 如果 facility_type 为 ''bridge''，则调用 conduct_emergency_passability_assessment_for_bridge
      获取评估结果。

      R3: 如果 facility_type 为 ''tunnel''，则调用 conduct_emergency_passability_assessment_for_tunnel
      获取评估结果。

      R4: 根据 assessment_result 做出决策：若评估结果为 ''passable''，则决策结果为 ''限制通行''，并设置通行限制条件（如限速、限载等）；若评估结果为
      ''impassable''，则决策结果为 ''禁止通行''。

      R5: 决策结果、通行限制条件和提示信息应记录到 TrafficControlImplementation 对象中。

      注意: 评估结果 assessment_result 由对应的评估函数返回，本函数不直接计算。'
    params:
      facility_type:
        type: str
        description: 设施类型
