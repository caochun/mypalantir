name: drone
description: 领域本体，包含 50 个对象类型（DisasterEvent, AccidentEvent, RoadSegment, Bridge, Tunnel
  等）
objects:
  DisasterEvent:
    summary: 自然灾害事件，如地震、暴雨、泥石流等，需记录类型、时间、地点、影响范围等
    description: 自然灾害事件，如地震、暴雨、泥石流等，需记录类型、时间、地点、影响范围等
    properties:
      event_level:
        type: str
        description: 事件等级，枚举值：特别重大、重大、较大、一般
      event_id:
        type: str
        description: 事件唯一标识
  AccidentEvent:
    summary: 交通事故事件，不涉及设施损伤检查，需记录类型、时间、地点等
    description: 交通事故事件，不涉及设施损伤检查，需记录类型、时间、地点等
    properties:
      road_segment_id:
        type: str
        description: 涉事路段编号
      road_name:
        type: str
        description: 涉事路段名称
      accident_location_station:
        type: str
        description: 事故发生位置（起止桩号）
      direction:
        type: str
        description: 运行方向
      management_unit:
        type: str
        description: 管理单位
      accident_type:
        type: str
        description: 事故类型（如碰撞、侧翻、追尾等）
      accident_form:
        type: str
        description: 事故形态（如单方、多方等）
      severity:
        type: str
        description: 事故严重程度（如轻微、一般、重大等）
      preliminary_cause:
        type: str
        description: 事故原因初步勘测结果
      hazardous_material:
        type: str
        description: 危险物品化学性质（若有）
      vehicle_types:
        type: str
        description: 涉事车辆类型及数量
      casualties_info:
        type: str
        description: 人员伤亡情况
      property_damage_info:
        type: str
        description: 车辆损失情况
      road_blockage:
        type: str
        description: 道路阻隔情况
      road_surface_condition:
        type: str
        description: 路面状况（如湿滑、积冰等）
      weather_condition:
        type: str
        description: 气象环境信息（包括温度及雾、冰雪、霜、雨等天气状况）
      traffic_condition:
        type: str
        description: 事故周边道路交通拥堵情况
      event_id:
        type: str
        description: 事件唯一标识
  RoadSegment:
    summary: 公路基本单元，按桩号搜索，用于定位灾损位置
    description: 公路基本单元，按桩号搜索，用于定位灾损位置
    properties:
      road_id:
        type: str
        description: 路段编号（唯一标识）
        required: true
      road_name:
        type: str
        description: 路段名称
      start_station:
        type: str
        description: 起点桩号
      end_station:
        type: str
        description: 终点桩号
      direction:
        type: str
        description: 运行方向（如上行、下行、双向）
      technical_indicators:
        type: str
        description: 技术指标（如道路等级、车道数等）
      management_unit:
        type: str
        description: 管理单位
      damage_length:
        type: float
        description: 灾损长度，单位：米
      damage_type:
        type: str
        description: 灾损类型，如沉陷、坍塌、水毁、滑坡、泥石流、沙害、低温雨雪冰冻等
      blockage_level:
        type: str
        description: 阻断程度，枚举值：完全阻断、部分阻断、未阻断
      clearance_suggestion:
        type: str
        description: 抢通建议，枚举值：观察通行、限制通行并加强观测、禁止通行并实施抢通
  Bridge:
    summary: 桥梁设施，含桥涵，按bridge_id查询
    description: 桥梁设施，含桥涵，按bridge_id查询
    properties:
      bridge_name:
        type: str
        description: 桥梁名称
      route_number:
        type: str
        description: 路线编号
      station_number:
        type: str
        description: 桩号
      structure_type:
        type: str
        description: 结构类型，如梁桥、拱桥、斜拉桥等
      overall_stability_grade:
        type: str
        description: 整体稳定等级，枚举值：I/II/III
      bearing_capacity_grade:
        type: str
        description: 承载能力等级，枚举值：I/II/III
      traffic_capacity_grade:
        type: str
        description: 车辆通行能力等级，枚举值：I/II/III
      bridge_id:
        type: str
        description: 桥梁唯一标识
  Tunnel:
    summary: 隧道设施，按tunnel_id查询
    description: 隧道设施，按tunnel_id查询
    properties:
      damage_grade:
        type: int
        description: 隧道受损程度等级，1=无损伤或轻微损伤，2=损伤中等，3=损伤严重或坍塌
      tunnel_name:
        type: str
        description: 隧道名称
      route_number:
        type: str
        description: 路线编号
      station_number:
        type: str
        description: 桩号
      tunnel_length:
        type: float
        description: 隧道长度，单位：米
      portal_side_slope_grade:
        type: str
        description: 洞口边仰坡损伤等级，枚举值：I/II/III
      portal_grade:
        type: str
        description: 洞门损伤等级，枚举值：I/II/III
      lining_grade:
        type: str
        description: 衬砌损伤等级，枚举值：I/II/III
      pavement_grade:
        type: str
        description: 路面损伤等级，枚举值：I/II/III
      ceiling_embedded_parts_grade:
        type: str
        description: 吊顶预埋件损伤等级，枚举值：I/II/III
      water_inrush_mud_grade:
        type: str
        description: 涌水突泥等级，枚举值：I/II/III（仅在出现涌水突泥时评估）
      tunnel_id:
        type: str
        description: 隧道唯一标识
  EmergencyDepot:
    summary: 应急物资储备点，按坐标搜索，存储装备和物资
    description: 应急物资储备点，按坐标搜索，存储装备和物资
    properties: {}
  RescueTeam:
    summary: 应急队伍，按坐标搜索，用于调度
    description: 应急队伍，按坐标搜索，用于调度
    properties: {}
  EquipmentStock:
    summary: 装备库存，关联储备点，记录装备类型、数量
    description: 装备库存，关联储备点，记录装备类型、数量
    properties: {}
  MaterialStock:
    summary: 物资库存，关联储备点，记录物资类型、数量
    description: 物资库存，关联储备点，记录物资类型、数量
    properties: {}
  DamageGradeStandard:
    summary: 损伤分级标准，定义设施类型+等级对应的通行建议
    description: 损伤分级标准，定义设施类型+等级对应的通行建议
    properties:
      facility_type:
        type: str
        description: 设施类型，枚举值：路基本体/边坡/支挡结构
        required: true
      grade:
        type: str
        description: 损毁等级，枚举值：I(轻微破坏)/II(中度破坏)/III(严重破坏或毁坏)
        required: true
      damage_description:
        type: str
        description: 主要特征描述（如'路基无明显破坏，路面存在轻微裂缝或凹凸鼓胀现象'）
      hazard_risk:
        type: str
        description: 危险性，枚举值：不影响正常使用/行车不便/车辆无法通行
      traffic_advisory:
        type: str
        description: 可否通行建议，枚举值：正常通行/限制通行/禁止通行
  EventLevelStandard:
    summary: 突发事件分级标准，定义I~IV级事件对应的响应要求
    description: 突发事件分级标准，定义I~IV级事件对应的响应要求
    properties:
      event_level:
        type: str
        description: 事件等级，枚举值：特别重大、重大、较大、一般
        required: true
      severity_description:
        type: str
        description: 事件严重程度描述，例如'突发事件导致国家干线公路交通毁坏、中断、阻塞，通行能力影响周边省份，抢修、处置时间预计在24小时以上'
  ClearanceTechniqueRule:
    summary: 抢通技术选用规则，根据设施类型和灾损推荐技术
    description: 抢通技术选用规则，根据设施类型和灾损推荐技术
    properties: {}
  TrafficControlRule:
    summary: 交通管制措施规则，根据损伤等级确定管制措施
    description: 交通管制措施规则，根据损伤等级确定管制措施
    properties: {}
  TunnelImportanceLevel:
    summary: 隧道重要等级，根据道路等级和交通量确定
    description: 隧道重要等级，根据道路等级和交通量确定
    properties: {}
  TunnelDifficultyMatrix:
    summary: 隧道抢通难度矩阵，根据时长和风险确定难度
    description: 隧道抢通难度矩阵，根据时长和风险确定难度
    properties: {}
  TunnelTargetMatrix:
    summary: 隧道抢通目标矩阵，根据难度和重要等级确定目标
    description: 隧道抢通目标矩阵，根据难度和重要等级确定目标
    properties: {}
  BridgeTypeSelection:
    summary: 便桥选型参考，根据场景和跨径推荐桥型
    description: 便桥选型参考，根据场景和跨径推荐桥型
    properties: {}
  ResponseLevelRule:
    summary: 响应级别规则，根据事件级别确定响应要求
    description: 响应级别规则，根据事件级别确定响应要求
    properties: {}
  FacilityInspection:
    summary: 设施现场检查记录，包括检查结果和评估
    description: 设施现场检查记录，包括检查结果和评估
    properties:
      inspection_type:
        type: str
        description: 检查类型，枚举值：路网灾情调查、线路灾损调查、设施现场检查
      inspection_date:
        type: str
        description: 检查日期
      weather:
        type: str
        description: 检查时天气状况
      inspector:
        type: str
        description: 检查人员姓名
      damage_grade_overall:
        type: str
        description: 综合损伤等级，枚举值：I/II/III
      clearance_suggestion:
        type: str
        description: 抢通建议，枚举值：观察通行、限制通行并加强观测、禁止通行并实施抢通
      remarks:
        type: str
        description: 附记事项
      facility_id:
        type: str
        description: 被检查设施的ID（road_id/bridge_id/tunnel_id）
      facility_type:
        type: str
        description: 设施类型枚举：路段/桥梁/隧道
  ClearancePlan:
    summary: 抢通方案，包括候选、执行、完成状态
    description: 抢通方案，包括候选、执行、完成状态
    properties:
      plan_type:
        type: str
        description: 方案类型，枚举值：总体方案、线路方案、现场技术方案、绕行方案
      target_road:
        type: str
        description: 目标道路或设施描述
      key_technical_indicators:
        type: str
        description: 关键技朮指标，如宽度、纵坡、曲线半径、轴载、车辆行驶位置、载重、车道数、间距、速度、通行高度等
      construction_method:
        type: str
        description: 施工工艺工法
      equipment_material_requirements:
        type: str
        description: 应急装备物资需求
      team_requirements:
        type: str
        description: 应急队伍需求
      target_road_segment_id:
        type: str
        description: 目标路段ID（当目标为路段时）
      target_bridge_id:
        type: str
        description: 目标桥梁ID（当目标为桥梁时）
      target_tunnel_id:
        type: str
        description: 目标隧道ID（当目标为隧道时）
  ResourceDispatch:
    summary: 资源调度单，记录队伍、装备、物资的调度
    description: 资源调度单，记录队伍、装备、物资的调度
    properties: {}
  TrafficControl:
    summary: 交通管制措施执行记录
    description: 交通管制措施执行记录
    properties: {}
  TrafficEvaluation:
    summary: 通行评估，抢通后评估通行条件
    description: 通行评估，抢通后评估通行条件
    properties:
      evaluation_result:
        type: str
        description: 应急通行评估结果，枚举值：限制通行、禁止通行
      restriction_conditions:
        type: str
        description: 通行限制条件，如限重、限速、限宽、限高、限流及车辆行驶位置限制等
      notice_info:
        type: str
        description: 提示信息，用于电子显示屏等发布
  DetourPlan:
    summary: 绕行方案，无法抢通时的替代路线
    description: 绕行方案，无法抢通时的替代路线
    properties:
      detour_route_name:
        type: str
        description: 绕行线路名称
      detour_start_station:
        type: str
        description: 绕行线路起点桩号
      detour_end_station:
        type: str
        description: 绕行线路终点桩号
      traffic_status:
        type: str
        description: 绕行线路通行状况
  Drone:
    summary: 无人机单机，按drone_id查询
    description: 无人机单机，按drone_id查询
    properties:
      drone_id:
        type: str
        description: 无人机唯一标识，主键
        required: true
      drone_type:
        type: str
        description: 无人机类别，枚举值：微型/轻型/小型/中型/大型
      empty_weight:
        type: float
        description: 空机重量，单位：千克
      max_takeoff_weight:
        type: float
        description: 最大起飞重量，单位：千克
      max_height:
        type: float
        description: 最大飞行真高，单位：米
      max_speed:
        type: float
        description: 最大平飞速度，单位：千米/小时
      has_airspace_keeping:
        type: bool
        description: 是否具备空域保持能力
      has_monitor_capability:
        type: bool
        description: 是否具备可靠被监视能力
      product_identification_code:
        type: str
        description: 生产者设置的唯一产品识别码
      registration_code:
        type: str
        description: 实名登记号，8位阿拉伯数字、罗马体大写字母或二者组合
      owner_identity:
        type: str
        description: 所有人合法身份信息
      owner_contact:
        type: str
        description: 所有人联系信息
      usage:
        type: str
        description: 民用无人驾驶航空器的使用用途
      registration_id:
        type: str
        description: 国籍登记唯一标识，主键
        required: true
      nationality_mark:
        type: str
        description: 国籍标志，罗马体大写字母B
      registration_mark:
        type: str
        description: 登记标志，即实名登记号
      producer:
        type: str
        description: 民用无人驾驶航空器生产者名称
      model:
        type: str
        description: 民用无人驾驶航空器型号
      serial_number:
        type: str
        description: 民用无人驾驶航空器出厂序号
      owner_name:
        type: str
        description: 民用无人驾驶航空器所有人名称
      owner_address:
        type: str
        description: 民用无人驾驶航空器所有人地址
      occupant_name:
        type: str
        description: 民用无人驾驶航空器占有人名称
      occupant_address:
        type: str
        description: 民用无人驾驶航空器占有人地址
      registration_date:
        type: str
        description: 民用无人驾驶航空器登记日期
      certificate_issuer:
        type: str
        description: 民用无人驾驶航空器国籍登记证书签发人姓名
      change_date:
        type: str
        description: 变更登记日期
      cancellation_date:
        type: str
        description: 注销登记日期
  DroneOperator:
    summary: 无人机操控员，按operator_id查询
    description: 无人机操控员，按operator_id查询
    properties:
      operator_id:
        type: str
        description: 操控员唯一标识，主键
        required: true
      license_number:
        type: str
        description: 操控员执照号
      certificate_type:
        type: str
        description: 资质类型，枚举值：操控员执照/操作证书/无需
      has_full_civil_capacity:
        type: bool
        description: 是否具备完全民事行为能力
      training_passed:
        type: bool
        description: 是否通过安全操控培训考核
      no_disease_history:
        type: bool
        description: 无可能影响操控的疾病病史
      no_drug_abuse:
        type: bool
        description: 无吸毒行为记录
      no_crime_5years:
        type: bool
        description: 近5年内无危害国家安全等故意犯罪记录
  DroneBase:
    summary: 无人机基地/起降点，按坐标搜索
    description: 无人机基地/起降点，按坐标搜索
    properties: {}
  AirspaceZone:
    summary: 空域区划，包括管制、适飞、禁飞区域
    description: 空域区划，包括管制、适飞、禁飞区域
    properties:
      zone_id:
        type: str
        description: 空域区划唯一标识，主键
        required: true
      zone_type:
        type: str
        description: 空域类型，枚举值：管制空域/适飞空域/临时管制空域
      horizontal_range:
        type: str
        description: 水平范围描述
      vertical_range:
        type: str
        description: 垂直范围描述，如真高≥120米
      time_limit:
        type: str
        description: 使用时间限制，如24小时前公告
  DroneClassRule:
    summary: 无人机分类标准，定义微型、轻型等
    description: 无人机分类标准，定义微型、轻型等
    properties:
      class_name:
        type: str
        description: 类别名称，枚举值：微型/轻型/小型/中型/大型
        required: true
      empty_weight_max:
        type: float
        description: 空机重量上限，单位：千克
      max_takeoff_weight_max:
        type: float
        description: 最大起飞重量上限，单位：千克
      max_height_max:
        type: float
        description: 最大飞行真高上限，单位：米
      max_speed_max:
        type: float
        description: 最大平飞速度上限，单位：千米/小时
      requires_airspace_keeping:
        type: bool
        description: 是否要求具备空域保持能力
      requires_monitor_capability:
        type: bool
        description: 是否要求具备可靠被监视能力
  OperatorLicenseRule:
    summary: 操控员资质要求，定义执照条件
    description: 操控员资质要求，定义执照条件
    properties:
      license_type:
        type: str
        description: 执照类型，枚举值：操控员执照/操作证书
        required: true
      requires_full_civil_capacity:
        type: bool
        description: 是否需要完全民事行为能力
      requires_training:
        type: bool
        description: 是否需要安全操控培训并考核合格
      no_disease_required:
        type: bool
        description: 是否要求无可能影响操控的疾病病史
      no_drug_required:
        type: bool
        description: 是否要求无吸毒行为记录
      no_crime_5years_required:
        type: bool
        description: 是否要求近5年内无危害国家安全等故意犯罪记录
  OperationClassRule:
    summary: 运行分类规则，开放类、特定类、审定类
    description: 运行分类规则，开放类、特定类、审定类
    properties: {}
  AirspaceRule:
    summary: 空域使用规则，包括管制空域划设等
    description: 空域使用规则，包括管制空域划设等
    properties:
      rule_type:
        type: str
        description: 规则类型，枚举值：隔离飞行/融合飞行
        required: true
      conditions:
        type: str
        description: 适用条件描述
  FlightApprovalRule:
