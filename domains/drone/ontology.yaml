functions:
  evaluate_defense_response_level:
    summary: 根据气象预警名称、预警颜色级别及预计中心风力等级，判定应启动的一级至四级防御响应级别。
    group: 防御响应
    description: 该函数通过比对输入的预警名称（warning_name）、预警级别颜色（warning_level_color）以及预计中心风力等级（wind_force），对照交通运输综合应急预案附件中的启动条件与参考条件，自动判定应启动的一级、二级、三级或四级防御响应级别。规则涵盖了热带气旋、寒潮、风暴潮、海冰、海啸、沙尘暴、大雾、大风等多种极端天气场景的量化指标。
    depends_on: []
    hint: 'R1: 热带气旋预计在未来48小时内登陆我国大陆（或明显影响我国沿海海域），且 wind_force >= 16 (级) → 启动一级防御响应。

      R2: 热带气旋对交通造成特别重大损失和影响，已经达到二级响应标准但仍可能持续发展或影响其他地区的 → 启动一级防御响应。

      R3: 热带气旋预计在未来48小时内登陆我国大陆（或明显影响我国沿海海域），且 wind_force >= 14 (级) → 启动二级防御响应。

      R4: 热带气旋对交通造成重大损失和影响，已经达到三级响应标准但仍可能持续发展或影响其他地区的 → 启动二级防御响应。

      R5: 热带气旋预计在未来48小时内登陆我国大陆（或明显影响我国沿海海域），且 wind_force >= 12 (级) → 启动三级防御响应。

      R6: 热带气旋对交通造成较大损失和影响，已经达到四级响应标准但仍可能持续发展或影响其他地区的 → 启动三级防御响应。

      R7: 热带气旋预计在未来4天内登陆我国大陆（或明显影响我国沿海海域），且 wind_force >= 8 (级) → 启动四级防御响应。

      R8: 热带气旋已经对交通运输安全及生产造成一定损失和影响 → 启动四级防御响应。

      R9: 6小时内可能或者已经受冬季大风影响，沿海和陆地平均风力 >= 11 (级)，或者阵风 >= 12 (级)并可能持续 → 研究启动一级防御响应。

      R10: 风暴潮达到红色警戒潮位 → 研究启动一级防御响应。

      R11: 海冰达到辽东湾浮冰外缘线 >= 105 (海里)，或黄海北部/渤海湾/莱州湾浮冰外缘线 >= 45 (海里)，且浮冰范围内冰量 >= 70 (%)且预计继续增长
      → 研究启动一级防御响应。

      R12: 受海啸影响，预计沿岸验潮站出现海啸波高 >= 200 (厘米) → 研究启动一级防御响应。

      R13: 极端恶劣天气对交通造成特别重大损失和影响，或上述灾害达到橙色预警标准但仍可能持续发展或影响其他地区的 → 研究启动一级防御响应。

      R14: 寒潮预计未来48小时2个及以上省（自治区、直辖市）气温大幅下降并伴有 wind_force >= 6 (级)及以上大风，且最低气温 <= 2
      (摄氏度) → 研究启动二级防御响应。

      R15: 海上大风预计未来48小时我国海区平均 wind_force >= 11 (级) → 研究启动二级防御响应。

      R16: 冬季大风12小时内可能影响，沿海和陆地平均 wind_force >= 10 (级)，或阵风 >= 11 (级)并可能持续 → 研究启动二级防御响应。

      R17: 风暴潮达到橙色警戒潮位 → 研究启动二级防御响应。

      R18: 海冰达到辽东湾浮冰外缘线 >= 90 (海里)，或黄海北部/渤海湾/莱州湾浮冰外缘线 >= 40 (海里)，且浮冰范围内冰量 >= 70 (%)且预计继续增长
      → 研究启动二级防御响应。

      R19: 海啸预计沿岸验潮站出现 150 (厘米) <= 海啸波高 < 200 (厘米) → 研究启动二级防御响应。

      R20: 极端恶劣天气对交通造成重大损失和影响，或上述灾害达到黄色预警标准但仍可能持续发展或影响其他地区的 → 研究启动二级防御响应。

      R21: 寒潮预计未来48小时2个及以上省（自治区、直辖市）气温明显下降并伴有 wind_force >= 5 (级)及以上大风，且最低气温 <= 4
      (摄氏度) → 研究启动三级防御响应。

      R22: 预计未来48小时我国海区平均 wind_force 在 9-10 (级)之间；或24小时内可能受大风影响，沿海平均 wind_force >=
      9 (级)，或阵风 >= 10 (级) → 研究启动三级防御响应。

      R23: 预计未来24小时2个及以上省（自治区、直辖市）出现强沙尘暴天气 → 研究启动三级防御响应。

      R24: 预计未来24小时3个及以上省（自治区、直辖市）大部地区出现浓雾天气 → 研究启动三级防御响应。

      R25: 24小时内可能受冬季大风影响，沿海和陆地平均 wind_force >= 9 (级)，或阵风 >= 10 (级)并可能持续 → 研究启动三级防御响应。

      R26: 风暴潮达到黄色警戒潮位 → 研究启动三级防御响应。

      R27: 海冰达到辽东湾浮冰外缘线 >= 75 (海里)，或黄海北部/渤海湾/莱州湾浮冰外缘线 >= 35 (海里)，且浮冰范围内冰量 >= 70 (%)且预计继续增长
      → 研究启动三级防御响应。

      R28: 受海啸影响，预计沿岸验潮站出现 100 (厘米) <= 海啸波高 < 150 (厘米) → 研究启动三级防御响应。

      R29: 极端恶劣天气对交通造成较大损失和影响，或上述灾害达到蓝色预警标准但仍可能持续发展或影响其他地区的 → 研究启动三级防御响应。

      R30: 寒潮预计未来48小时2个及以上省（自治区、直辖市）将出现较明显大风降温天气 → 研究启动四级防御响应。

      R31: 预计未来24小时2个及以上省（自治区、直辖市）出现沙尘暴天气 → 研究启动四级防御响应。

      R32: 预计未来24小时3个及以上省（自治区、直辖市）大部地区出现大雾天气 → 研究启动四级防御响应。

      R33: 预计未来24小时3个及以上省（自治区、直辖市）大部地区出现霾天气 → 研究启动四级防御响应。

      R34: 24小时内可能受冬季大风影响，沿海和陆地平均 wind_force >= 8 (级)，或阵风 >= 9 (级)并可能持续 → 研究启动四级防御响应。

      R35: 风暴潮达到蓝色警戒潮位，或预计未来24小时内热带气旋将登陆我国沿海地区，或在离岸100 (公里)以内转向/滞留（即使受影响岸段潮位低于蓝色警戒潮位）
      → 研究启动四级防御响应。

      R36: 海冰达到辽东湾浮冰外缘线 >= 60 (海里)，或黄海北部/渤海湾/莱州湾浮冰外缘线 >= 25 (海里)，且浮冰范围内冰量 >= 70 (%)且预计继续增长
      → 研究启动四级防御响应。

      R37: 受海啸影响，预计沿岸验潮站出现 50 (厘米) <= 海啸波高 < 100 (厘米) → 研究启动四级防御响应。

      R38: 对交通运输安全及生产造成一定损失和影响的极端恶劣天气 → 研究启动四级防御响应。

      注意: 规则分为“启动条件”和“研究启动参考条件”两类，前者为直接启动标准，后者为研究启动标准。'
    params:
      warning_name:
        type: str
        description: 预警名称，如台风、暴雨等
      warning_level_color:
        type: str
        description: 预警级别颜色：红色、橙色、黄色、蓝色
      wind_force:
        type: int
        description: 预计中心风力等级（级）
  determine_emergency_response_level:
    summary: 根据突发事件的性质、规模等级及影响程度，判定应启动的一级至四级应急响应级别。
    group: 应急响应
    description: 根据突发事件的性质（如自然灾害、事故灾难等）、事故规模等级（特别重大、重大、较大、一般）以及对交通运输的影响程度（如热带气旋风力等级、风暴潮警戒潮位、海冰范围、海啸波高、寒潮气温等），判定应启动的一级、二级、三级或四级应急响应。
    depends_on: []
    hint: 'R1: 应对大震时，response_level = 一级 或 二级。

      R2: 应对除大震外的一般地震时，response_level = 三级 或 四级，且牵头司局为公路局。

      R3: 应对热带气旋（预计未来48h内登陆且中心风力>=16级）或达到二级响应标准但可能持续发展的事件时，response_level = 一级。

      R4: 应对热带气旋（预计未来48h内登陆且中心风力>=14级）或达到三级响应标准但可能持续发展的事件时，response_level = 二级。

      R5: 应对热带气旋（预计未来48h内登陆且中心风力>=12级）或达到四级响应标准但可能持续发展的事件时，response_level = 三级。

      R6: 应对热带气旋（预计未来4天内登陆且中心风力>=8级）或对交通运输安全及生产造成一定损失和影响的事件时，response_level = 四级。

      R7: 应对极端恶劣天气（如冬季大风、风暴潮、海冰、海啸等）时，需根据具体的预警标准（橙色、黄色、蓝色等）及风力、潮位、冰量、波高数值判定响应等级。

      注意: 响应等级的判定需综合考虑 event_nature、accident_scale_level 以及 impact_severity 的描述。'
    params:
      event_nature:
        type: str
        description: 事件性质
      accident_scale_level:
        type: str
        description: 事故规模等级：特别重大、重大、较大、一般
      impact_severity:
        type: str
        description: 影响程度描述
  assess_infrastructure_risk:
    summary: 通过遍历路段关键部位（桥梁、隧道、风险点）并结合实时监测数据，识别公路水运工程的重大风险隐患。
    group: 风险监测
    description: 该函数用于评估公路水运工程关键部位的风险隐患。它会遍历指定 road_id 对应的 RoadSegment，识别其包含的所有 Bridge（结合损伤等级与通行状态）、Tunnel（结合重要等级、技术状况、氧气浓度、衬砌及涌水情况）以及
      ProjectSafetyRisk（结合风险部位与类型）。通过结合输入的 monitoring_data（如水位、风力、位移、土壤含水量等实时数据），识别是否存在重大风险隐患点，为后续应急响应提供决策支持。
    depends_on: []
    hint: 'R1: 识别重大风险隐患点需遍历 RoadSegment 包含的 Bridge、Tunnel 及 ProjectSafetyRisk 等关键部位。

      R2: 评估 Bridge 的风险时，需结合 stability_damage_level、load_bearing_damage_level、traffic_capacity_damage_level
      及 traffic_status。

      R3: 评估 Tunnel 的风险时，需结合 tunnel_importance_level、tunnel_clearance_difficulty_level、tunnel_clearance_target_level、technical_status_category、oxygen_concentration、tunnel_lining_status
      及 water_seepage_status。

      R4: 评估 ProjectSafetyRisk 时，需结合 risk_location 及 risk_type。

      R5: 结合 monitoring_data 中的实时监测数据（如水位、风力、位移、土壤含水量等）进行综合研判。

      注意: 风险识别应遵循“早发现、早报告、早处置”的原则，并结合公路水运工程关键部位（如大型围堰、高边坡、深基坑、挂篮、瓦斯隧道、沉箱浮运安装、桥梁猫道等）的监测情况。'
    params:
      road_id:
        type: str
        description: 路段编号
      monitoring_data:
        type: str
        description: 实时监测数据（如水位、风力、位移等）
  calculate_resource_deployment_plan:
    summary: 根据应急响应级别和事件类型，匹配并计算所需应急队伍、物资及运输工具的调度方案。
    group: 应急保障
    description: '根据当前启动的应急响应级别（response_level: 一级至四级）以及事件类型（event_type），自动匹配并计算需要调用的应急队伍（EmergencyTeam）、应急物资（EmergencyResource）及运输工具的数量和部署位置。该函数遵循分级响应原则，并根据不同事件（如自然灾害、涉外事件、疫情、跨省保障等）的牵头司局职责进行资源调度规划。'
    depends_on:
    - determine_emergency_response_level
    hint: 'R1: 响应级别 = 一级 $\rightarrow$ 应对大震时启动，由部应急办牵头，公路局、水运局、运输服务司、路网中心、通信信息中心按职责开展处置。

      R2: 响应级别 = 二级 $\rightarrow$ 应对大震时启动，由部应急办牵头，公路局、水运局、运输服务司、路网中心、通信信息中心按职责开展处置。

      R3: 响应级别 = 三级 $\rightarrow$ 应对一般地震时启动，由公路局作为牵头处置司局。

      R4: 响应级别 = 四级 $\rightarrow$ 应对一般地震时启动，由公路局作为牵头处置司局。

      R5: 事件类型 = 涉外突发事件 $\rightarrow$ 由部应急办、国际司牵头，水运局、运输服务司、海事局配合处置。

      R6: 事件类型 = 交通运输行业内或工具上发现疫情/甲类传染病 $\rightarrow$ 由部应急办牵头，公路局、水运局、运输服务司、海事局负责指导省级部门做好防疫工作，部国际司负责国际合作，部人教司负责物资分配。

      R7: 事件类型 = 部属院校集体食物中毒 $\rightarrow$ 由部人教司牵头，办公厅配合处置。

      R8: 事件类型 = 需跨省份跨运输方式保障 $\rightarrow$ 由部运输服务司牵头，公路局、水运局、应急办、海事局配合处置。

      R9: 响应终止条件 $\rightarrow$ 必须同时满足：经论证人员无生还可能、险情得到控制且人员安全安置、现场应急救援结束、次生灾害基本消除。

      注意: 响应终止遵循“谁启动，谁降级，谁终止”原则，由牵头司局评估后报批执行。'
    params:
      response_level:
        type: str
        description: 当前应急响应级别
      event_type:
        type: str
        description: 事件类型
      location_id:
        type: str
        description: 事件发生地点/路段ID
  generate_post_event_summary_report:
    summary: 汇总事件概况、响应过程、处置措施、救援成效、存在问题及改进建议，生成标准化的应急响应总结评估报告。
    group: 后期处置
    description: 根据事件概况、响应过程、处置措施、救援成效、存在问题、经验教训及改进建议，生成标准化的总结评估报告材料。该函数需结合 EmergencyEvent（事件性质、等级、伤亡、损失）、ResponseAction（响应等级、状态、牵头司局）以及
      InspectionRecord（现场检查详情、路况、气象）等信息，按照预案要求的评估维度（预防措施、自救效果、信息报送、组织运行、决策效率、技术方案、应急保障）进行综合评估，并严格遵守重大事故或部级响应下的报告报备时限要求。
    depends_on:
    - determine_emergency_response_level
    hint: 'R1: 评估内容应包含：预防预警和预控措施、项目应急自救效果及能力、信息报送的时效性与准确性、事故救援组织机构设置及运行、现场救援决策/指挥/协调机制及效率、技术方案及实施情况、应急协作及应急保障。

      R2: 评估程序应遵循：搜集评估相关信息 → 邀请专家协助开展评估 → 事发地交通运输主管部门编写事故应急评估报告。

      R3: 评估报告提交规则：发生重大以上事故，或交通运输部启动应急响应时，省级交通运输主管部门应于应急响应终止后的 45 (个工作日) 内将本级部门的应急工作总结、事故应急评估报告向部安质司报备。

      R4: 响应终止条件（公路水运工程生产安全事故）：需同时满足：经论证人员无生还可能、险情得到控制且涉险人员安全离开危险区域并得到安置、现场应急救援工作已经结束、次生灾害基本消除。

      R5: 响应终止条件（公路交通突发事件）：需满足：现场应急处置已基本完成且路网运行能够满足基本交通需求、自然灾害已减弱或消除至不影响交通的程度且不再影响交通安全且次生/衍生灾害隐患消除。'
    params:
      event_id:
        type: str
        description: 事件唯一标识符
      response_duration:
        type: str
        description: 响应持续时间
      recovery_status:
        type: str
        description: 恢复重建进度
  check_pilot_qualification:
    summary: 校验操控员执照类型、资质状态（民事能力、犯罪记录、吸毒记录）、执照有效期、医疗合格证及农用特殊资质是否与无人机类别匹配。
    group: 无人机管理
    description: 校验操控员（Pilot）是否具备操控特定类别（aircraft_category）无人机（UnmannedAircraft）的法定资质。校验内容包括：1.
      执照类型（license_type）与无人机类别是否匹配；2. 操控员是否具备完全民事行为能力、无犯罪记录（has_criminal_record）及无吸毒记录（has_drug_use_record）；3.
      执照是否在有效期内（license_expiry_date）；4. 医疗合格证状态（medical_certificate_status）是否有效；5.
      针对农用无人机（is_agricultural_use）且最大起飞重量（max_takeoff_weight）≤ 150kg 的特殊豁免规则；6. 超视距飞行（BVLOS）所需的等级要求。
    depends_on: []
    hint: 'R1: 操控员执照类型匹配规则：若 aircraft_category 为 ''小型''，则 pilot.license_type 必须为 ''小型''；若
      aircraft_category 为 ''中型''，则 pilot.license_type 必须为 ''中型''；若 aircraft_category
      为 ''大型''，则 pilot.license_type 必须为 ''大型''。

      R2: 操控员资质要求：pilot.civil_capacity_status = ''完全民事行为能力人'' 且 pilot.has_criminal_record
      = false 且 pilot.has_drug_use_record = false。

      R3: 执照有效期校验：当前日期 <= pilot.license_expiry_date。

      R4: 医疗合格证校验：pilot.medical_certificate_status = ''有效''。

      R5: 农用无人机特殊规则：若 aircraft_category 为 ''农用'' 且 max_takeoff_weight <= 150 (kg)，则无需操控员执照，但需持有由生产者培训考核合格的操作证书。

      R6: 超视距飞行要求：若进行超视距飞行，小型/中型操控员需具备相应的超视距等级，大型操控员需具备相应的类别、级别、型别等级。

      注意: 无民事行为能力人只能操控微型无人机；限制民事行为能力人只能操控微型、轻型无人机，且操控轻型时需由完全民事行为能力人现场指导。'
    params:
      pilot_id:
        type: str
        description: 操控员ID
      aircraft_category:
        type: str
        description: 无人机类别
  check_aircraft_airworthiness_requirement:
    summary: 根据无人驾驶航空器性能指标分类判定其是否必须依法取得适航许可。
    group: 适航管理
    description: 根据输入的无人驾驶航空器性能指标分类（aircraft_category：微型、轻型、小型、中型、大型），判定该无人驾驶航空器在设计、生产、进口、飞行和维修活动中，是否必须依法向民用航空主管部门申请取得适航许可。根据《无人驾驶航空器飞行管理暂行条例》第八条：中型、大型必须取得适航许可；微型、轻型、小型无需取得适航许可。
    depends_on: []
    hint: 'R1: 若 aircraft_category = ''中型'' 或 ''大型''，则必须依法向民用航空主管部门申请取得适航许可。

      R2: 若 aircraft_category = ''微型''、''轻型'' 或 ''小型''，则无需取得适航许可，但相关产品应当符合产品质量法律法规及有关强制性国家标准。

      注意: 适航许可的判定仅基于 aircraft_category 字段。'
    params:
      aircraft_category:
        type: str
        description: 无人驾驶航空器性能指标分类：微型、轻型、小型、中型、大型
  verify_operating_certificate_requirement:
    summary: 判定无人驾驶航空器是否需要申请运营合格证及是否需要投保责任保险。
    group: 运营管理
    description: 根据无人驾驶航空器的性能指标分类（aircraft_category）以及是否从事经营性飞行活动（is_commercial_operation），判定使用单位是否应当向民用航空管理部门申请取得运营合格证，并根据分类和活动性质判定是否需要依法投保责任保险。特别豁免规则：最大起飞重量不超过150kg的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用作业，无需取得运营合格证。
    depends_on: []
    hint: 'R1: aircraft_category = ''微型'' → 无需申请运营合格证。

      R2: aircraft_category = ''轻型'' 且 is_commercial_operation = false → 无需申请运营合格证。

      R3: aircraft_category = ''小型'' 且 is_commercial_operation = false → 无需申请运营合格证。

      R4: aircraft_category = ''中型'' 且 is_commercial_operation = false → 无需申请运营合格证。

      R5: aircraft_category = ''大型'' 且 is_commercial_operation = false → 无需申请运营合格证。

      R6: aircraft_category IN [''轻型'', ''小型'', ''中型'', ''大型''] 且 is_commercial_operation
      = true → 应当申请取得运营合格证。

      R7: aircraft_category IN [''轻型'', ''小型'', ''中型'', ''大型''] 且 is_commercial_operation
      = false → 应当依法投保责任保险。

      注意: 使用最大起飞重量不超过150kg的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用无人驾驶航空器作业飞行活动，无需取得运营合格证。'
    params:
      aircraft_category:
        type: str
        description: 无人驾驶航空器性能指标分类：微型、轻型、小型、中型、大型
      is_commercial_operation:
        type: bool
        description: 是否从事经营性飞行活动
  validate_pilot_civil_capacity:
    summary: 校验操控员的民事行为能力状态是否符合特定类别无人驾驶航空器的飞行法律要求。
    group: 人员资质
    description: 根据操控员的民事行为能力状态（civil_capacity_status）与无人驾驶航空器的性能指标分类（aircraft_category）进行匹配校验。具体规则：1.
      小型、中型、大型及在管制空域内操控轻型无人机，要求操控员必须为完全民事行为能力人；2. 轻型无人机允许限制民事行为能力人操控，微型无人机允许无民事行为能力人操控；3.
      若无民事行为能力人操控微型或限制民事行为能力人操控轻型无人机，必须有完全民事行为能力人现场指导。
    depends_on: []
    hint: 'R1: 操控小型、中型、大型民用无人驾驶航空器的人员，其 civil_capacity_status = ''完全民事行为能力人''。

      R2: 操控轻型民用无人驾驶航空器在管制空域内飞行的人员，其 civil_capacity_status = ''完全民事行为能力人''。

      R3: 操控微型民用无人驾驶航空器的人员，其 civil_capacity_status 可为 ''完全民事行为能力人'' 或 ''限制民事行为能力人''
      或 ''无民事行为能力人''。

      R4: 操控轻型民用无人驾驶航空器的人员，其 civil_capacity_status 可为 ''完全民事行为能力人'' 或 ''限制民事行为能力人''。

      R5: 操控微型民用无人驾驶航空器且为 ''无民事行为能力人''，或操控轻型民用无人驾驶航空器且为 ''限制民事行为能力人'' 时，应当由 ''完全民事行为能力人''
      进行现场指导。

      注意: 操控微型、轻型民用无人驾驶航空器的人员无需取得操控员执照，但需符合上述民事行为能力及现场指导要求。'
    params:
      civil_capacity_status:
        type: str
        description: 民事行为能力状态：完全民事行为能力人、限制民事行为能力人、无民事行为能力人
      aircraft_category:
        type: str
        description: 无人驾驶航空器性能指标分类：微型、轻型、小型、中型、大型
  check_flight_application_deadline:
    summary: 根据飞行任务性质（常规、紧急、特别紧急）判定飞行活动申请的截止时间。
    group: 飞行活动管理
    description: 根据任务性质（task_nature）判定应当提前多久向空中交通管理机构提出飞行活动申请。规则如下：1. 常规任务（含巡检、勘察、校验等）需在拟飞行前
      1 日 12 时前申请；2. 紧急任务（含抢险救灾、医疗救护等）需在计划起飞 30 分钟前申请；3. 特别紧急任务可随时申请。
    depends_on: []
    hint: 'R1: task_nature = ''常规任务'' 或 ''巡检'' 或 ''勘察'' 或 ''校验'' → 应当在拟飞行前 1 日 12
      时前提出飞行活动申请。

      R2: task_nature = ''抢险救灾'' 或 ''医疗救护'' 或 ''紧急任务'' → 应当在计划起飞 30 分钟前提出飞行活动申请。

      R3: task_nature = ''特别紧急任务'' → 可以随时提出飞行活动申请。

      注意: 对于在固定空域内实施的常态飞行活动，可以提出长期飞行活动申请，但仍需在拟飞行前 1 日 12 时前将飞行计划报空中交通管理机构备案。'
    params:
      task_nature:
        type: str
        description: 任务性质：常规、抢险救灾、医疗救护、紧急任务、特别紧急任务
  evaluate_flight_mode_restriction:
    summary: 判定飞行模式是否属于无需申请的豁免情形，或是否必须按规定提出飞行活动申请。
    group: 飞行活动管理
    description: 根据 flight_mode（飞行方式）判定是否属于无需向空中交通管理机构提出飞行活动申请的豁免情形，或者是否属于必须依法提出申请的特定飞行模式（如分布式操作、集群飞行、中继飞行、运载危险品、投放物品、飞越集会人群、移动交通工具操控等）。
    depends_on: []
    hint: 'R1: flight_mode = ''分布式操作'' 或 ''集群飞行'' → 必须向空中交通管理机构提出飞行活动申请。

      R2: flight_mode = ''中继飞行'' → 必须向空中交通管理机构提出飞行活动申请。

      R3: flight_mode = ''运载危险品'' 或 ''投放物品'' → 必须向空中交通管理机构提出飞行活动申请（常规农用无人驾驶航空器作业飞行活动除外）。

      R4: flight_mode = ''飞越集会人群上空'' → 必须向空中交通管理机构提出飞行活动申请。

      R5: flight_mode = ''在移动的交通工具上操控'' → 必须向空中交通管理机构提出飞行活动申请。

      R6: flight_mode = ''在民用运输机场管制地带内执行巡检、勘察、校验等任务'' → 无需提出飞行活动申请，但需定期报空中交通管理机构备案，并在计划起飞1小时前经空中交通管理机构确认后方可起飞。

      注意: 常规农用无人驾驶航空器作业飞行活动（指最大飞行真高不超过30m，最大平飞速度不超过50km/h，最大飞行半径不超过2000m的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事作业）无需取得运营合格证，且在运载危险品或投放物品时属于豁免情形。'
    params:
      flight_mode:
        type: str
        description: 飞行方式：常规飞行、集群飞行、分布式操作、中继飞行、运载危险品等
  calculate_legal_penalty:
    summary: 根据违规行为类型及无人机货值计算法律罚款金额。
    group: 法律责任
    description: 根据违反的条例条款（如未取得适航许可、未进行实名登记、未取得运营合格证、未取得操控员执照、非法测绘等）以及无人驾驶航空器货值（aircraft_value）或指定的罚款区间，计算可能的罚款金额。
    depends_on: []
    hint: 'R1: 中型、大型民用无人驾驶航空器系统未依法取得适航许可的，罚款金额 = aircraft_value * [1, 5] (元)。

      R2: 对已取得适航许可的系统进行重大设计更改，未重新申请取得适航许可并用于飞行活动的，罚款金额 = aircraft_value * [1, 5] (元)。

      R3: 改变微型、轻型、小型民用无人驾驶航空器系统的空域保持能力、可靠被监视能力、速度或者高度等出厂性能及参数，未及时在一体化综合监管服务平台更新信息的，拒不改正的，罚款金额
      = [2000, 20000] (元)。

      R4: 民用无人驾驶航空器未经实名登记实施飞行活动的，罚款金额 = [0, 200] (元)；情节严重的，罚款金额 = [2000, 20000] (元)。

      R5: 涉及境外飞行的民用无人驾驶航空器未依法进行国籍登记的，罚款金额 = [10000, 100000] (元)。

      R6: 民用无人驾驶航空器未依法投保责任保险的，罚款金额 = [2000, 20000] (元)。

      R7: 未取得运营合格证或者违反运营合格证要求实施飞行活动的，罚款金额 = [50000, 500000] (元)。

      R8: 未取得操控员执照操控民用无人驾驶航空器飞行的，罚款金额 = [5000, 50000] (元)；情节严重的，罚款金额 = [10000, 100000]
      (元)。

      R9: 超出操控员执照载明范围操控民用无人驾驶航空器飞行的，罚款金额 = [2000, 20000] (元)。

      R10: 未取得操作证书从事常规农用无人驾驶航空器作业飞行活动的，罚款金额 = [1000, 10000] (元)。

      R11: 未经批准操控微型、轻型、小型民用无人驾驶航空器在管制空域内飞行，或者操控模型航空器在空域外飞行的，情节严重的，罚款金额 = [1000, 10000]
      (元)。

      R12: 外国无人驾驶航空器或由外国人员操控的在我国境内实施测绘飞行活动的，罚款金额 = [100000, 500000] (元)；情节严重的，罚款金额
      = [500000, 1000000] (元)。

      注意: 罚款金额区间表示为 [最小值, 最大值]；若规则中提到“没收违法所得”或“责令停业整顿”，本函数仅计算罚款金额部分。'
    params:
      violation_type:
        type: str
        description: 违规类型：未取得适航许可、未实名登记、未取得运营合格证、未取得操控员执照等
      aircraft_value:
        type: float
        description: 无人驾驶航空器货值金额（用于计算倍数罚款）
        default: 0.0
  check_pilot_operating_restrictions:
    summary: 根据操控员的执照类型、类别等级、型别等级、超视距等级、体检状态、酒精/药物影响及犯罪记录，判定其是否具备执行特定飞行任务的权利。
    group: 操控员管理
    description: 判定操控员是否具备执行特定飞行任务（如超视距飞行、特定机型飞行、高风险运行等）的资质。规则涵盖：1. 执照要求：根据无人机类型（微型/轻型/小型/中型/大型）判定是否需要执照；2.
      等级要求：针对超视距（BVLOS）飞行、特定机型（type_rating）飞行、特定高风险运行的等级要求；3. 身体与行为能力：民事行为能力要求、体检合格证（medical_certificate_status）有效性；4.
      禁忌状态：血液酒精含量（blood_alcohol_content）是否 $\ge$ 0.04% (g/L)、是否有吸毒记录、近5年内是否有刑事处罚记录；5.
      特殊豁免：常规农用无人驾驶航空器作业人员的资质要求。
    depends_on: []
    hint: 'R1: 操控微型、轻型民用无人驾驶航空器飞行的人员，无需取得操控员执照，但应当具备完全民事行为能力（微型）或完全/限制民事行为能力（轻型）。

      R2: 操控小型、中型、大型民用无人驾驶航空器飞行的人员，应当取得局方规定的相应有效操控员执照，并随身携带。

      R3: 操控小型、中型民用无人驾驶航空器进行超视距运行时，应当持有相应类别、级别、型别（如适用）等级，以及超视距等级。

      R4: 操控大型民用无人驾驶航空器进行超视距运行时，应当持有相应类别、级别、型别（如适用）等级。

      R5: 操控民用无人驾驶航空器进行涉及特定高风险的特殊运行时，应当持有相应类别、级别、型别（如适用）等级的操控员执照，以及相应的特定运行安全风险等级。

      R6: 担任民用无人驾驶航空器飞行机组必需成员的操控员，应当持有有效的体检合格证。

      R7: 操控员在饮用任何含酒精饮料之后的 8 小时之内或者处在酒精作用之下，血液中酒精含量 $\ge$ 0.04% (g/L)，或者受到任何药物影响损及工作能力时，不得担任操控员。

      R8: 操控员应当无吸毒行为记录，且近 5 年内无因危害国家安全、公共安全或者侵犯公民人身权利、扰乱公共秩序的故意犯罪受到刑事处罚的记录。

      注意: 使用最大起飞重量不超过 150 千克的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用无人驾驶航空器作业飞行活动的人员，无需取得操控员执照，但应当取得操作证书。'
    params:
      license_type:
        type: str
        description: 操控员执照类型（小型、中型、大型）
      category_level:
        type: str
        description: 类别等级（飞机、旋翼飞行器等）
      type_rating:
        type: str
        description: 型别等级
      has_bvlos_rating:
        type: bool
        description: 是否具有超视距等级
      is_night_flight:
        type: bool
        description: 是否为夜间飞行
  validate_pilot_medical_and_substance_compliance:
    summary: 校验操控员的体检合格证状态、血液酒精含量及药物影响，以判定其是否符合飞行安全要求。
    group: 操控员管理
    description: 根据 CCAR-92.51(f), 92.55(d), 92.611 条规定，检查操控员是否持有有效的体检合格证（medical_certificate_status
      为 '有效'），并校验血液酒精含量（blood_alcohol_content）是否低于 0.04 (g/L) 且未受到药物影响（is_under_drug_influence
      为 false），以判定其是否符合飞行安全要求。
    depends_on: []
    hint: 'R1: 操控员的 medical_certificate_status = ''有效''。

      R2: blood_alcohol_content < 0.04 (g/L)。

      R3: is_under_drug_influence = false。

      注意: 血液酒精含量 $\ge$ 0.04% 或受到药物影响时，不得担任操控员。'
    params:
      medical_certificate_status:
        type: str
        description: 体检合格证状态（有效、受限、失效）
      blood_alcohol_content:
        type: float
        description: 血液中酒精含量 (g/L)
      is_under_drug_influence:
        type: bool
        description: 是否受到药物影响损及工作能力
  check_aircraft_registration_status:
    summary: 校验无人机实名登记与国籍登记的合法性状态
    group: 登记管理
    description: 检查无人机是否已依法完成实名登记并取得登记标志（用于境内飞行），以及是否已完成国籍登记并具备国籍标志（用于境外飞行），以判定其是否具备合法的飞行资格。参考
      CCAR-92.201, 92.205, 92.215, 92.231 等条款。
    depends_on: []
    hint: 'R1: 民用无人驾驶航空器在中华人民共和国境内从事飞行活动，应当完成实名登记，且取得登记标志后方可激活使用。

      R2: 从事境外飞行的民用无人驾驶航空器，应当完成国籍登记，并具有国籍标志和登记标志。

      R3: 取得实名登记的民用无人驾驶航空器，遇所有权或占有权发生变更、退出使用、报废、失事或所有权依法转移境外并已办理出口适航证的情形，应当申请注销登记。

      注意: 涉及境外飞行的民用无人驾驶航空器必须完成国籍登记。'
    params:
      has_real_name_registration:
        type: bool
        description: 是否已完成实名登记
      registration_number:
        type: str
        description: 实名登记号
      has_nationality_registration:
        type: bool
        description: 是否已完成国籍登记
  evaluate_airworthiness_certificate_validity:
    summary: 评估适航证、型号合格证或生产许可证的有效期及状态，判定航空器是否处于合法适航状态。
    group: 适航管理
    description: 根据输入的证件类型（certificate_type）、有效期截止日期（expiry_date）以及是否被暂停或吊销（is_suspended）的状态，判定航空器当前是否处于合法适航状态。该函数参考
      CCAR-92.363, 92.393, 92.463 等规定，通过校验证件是否过期以及是否处于被暂停/吊销状态来输出评估结果。
    depends_on: []
    hint: 'R1: certificate_type = ''适航证'' 且 is_suspended = true → 状态为无效。

      R2: certificate_type = ''型号合格证'' 且 is_suspended = true → 状态为无效。

      R3: certificate_type = ''生产许可证'' 且 is_suspended = true → 状态为无效。

      R4: expiry_date < 当前日期 → 状态为无效。

      R5: certificate_type 属于上述证件类型且 expiry_date >= 当前日期且 is_suspended = false → 状态为有效。

      注意: 中型、大型民用无人驾驶航空器系统不能持续处于适航状态的，由民用航空管理部门依照有关适航管理的规定处理。'
    params:
      certificate_type:
        type: str
        description: 证件类型（适航证、型号合格证、生产许可证等）
      expiry_date:
        type: str
        description: 有效期截止日期
      is_suspended:
        type: bool
        description: 是否被暂停或吊销
  calculate_operating_permit_requirement:
    summary: 判定民用无人驾驶航空器是否需要申请运营合格证。
    group: 运营管理
    description: 根据飞行活动的运行分类（operation_category）、运行类型（operation_type）、是否为经营性活动（is_commercial）以及无人机类别（aircraft_category）判定是否必须取得运营合格证。规则参考
      CCAR-92.601 和 92.603。
    depends_on: []
    hint: 'R1: operation_category = ''开放类'' → 不需要取得运营合格证。

      R2: operation_type = ''特定类'' → 需要取得运营合格证。

      R3: operation_type = ''审定类'' → 需要取得运营合格证。

      R4: aircraft_category IN [''微型'', ''轻型''] AND is_commercial = false → 不需要取得运营合格证。

      R5: aircraft_category IN [''微型'', ''轻型'', ''小型''] AND operation_type = ''常规农用无人驾驶航空器作业飞行活动''
      → 不需要取得运营合格证。

      注意: 常规农用无人驾驶航空器作业飞行活动指使用最大起飞重量不超过150千克的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事农林牧渔作业飞行活动。'
    params:
      operation_type:
        type: str
        description: 运行类型（开放类、特定类、审定类）
      is_commercial:
        type: bool
        description: 是否为经营性活动
      aircraft_category:
        type: str
        description: 无人机类别（微型、轻型、小型、中型、大型）
  assess_flight_activity_risk_and_service:
    summary: 评估飞行活动风险并匹配所需的空中交通服务（如间隔服务、流量管理等）。
    group: 空中交通管理
    description: 根据飞行活动的风险特征（是否为超视距运行、是否沿公共航线、是否在人口密集区）来判定该飞行活动需要接受哪些空中交通服务（如间隔服务、流量管理、运行识别等）。该函数依据
      CCAR-92 规章中关于飞行性质与服务匹配的规定进行逻辑判定。
    depends_on: []
    hint: 'R1: is_bvlos = True → 必须具备超视距运行能力，且操控员需持有相应类别、级别、型别等级及超视距等级的执照。

      R2: is_public_route = True → 飞行活动需符合公共航线运行规则，并确保与有人驾驶航空器保持安全间隔。

      R3: is_in_populated_area = True → 属于高风险运行场景，需符合审定类运行要求，并可能需要额外的运营规范及应急救生设备。

      R4: is_bvlos = True AND is_public_route = True AND is_in_populated_area = True
      → 必须同时满足超视距、公共航线及高风险区域的复合监管要求。

      注意: 评估结果应参考 CCAR-92.525, 92.531, 92.543 条关于空中交通服务的匹配要求。'
    params:
      is_bvlos:
        type: bool
        description: 是否为超视距运行
      is_public_route:
        type: bool
        description: 是否沿公共航线运行
      is_in_populated_area:
        type: bool
        description: 是否在人口密集区域运行
  calculate_violation_penalty:
    summary: 根据违规行为类型、货值金额及情节严重程度，计算民用无人驾驶航空器的行政处罚金额或措施。
    group: 法律责任
    description: 根据输入的违规类型（violation_type）、无人机系统货值金额（aircraft_value）以及是否属于情节严重（is_serious_case），依据《无人驾驶航空器飞行管理暂行条例》及CCAR-92相关规定，计算对应的罚款金额区间或行政处罚措施（如没收、吊销证件、停业整顿等）。
    depends_on: []
    hint: 'R1: 违规类型 = 未依法取得适航许可 (针对中型、大型民用无人驾驶航空器系统) → 没收违法所得，并处无人驾驶航空器系统货值金额 = 1倍以上5倍以下的罚款
      (元)；情节严重的，责令停业整顿。

      R2: 违规类型 = 生产者未按规定设置唯一产品识别码 → 责令改正，没收违法所得，并处罚款 = 3万元以上30万元以下 (元)；拒不改正的，责令停业整顿。

      R3: 违规类型 = 对已取得适航许可的系统进行重大设计更改，未重新申请取得适航许可并用于飞行活动 → 责令改正，处无人驾驶航空器系统货值金额 = 1倍以上5倍以下的罚款
      (元)。

      R4: 违规类型 = 改变微型、轻型、小型民用无人驾驶航空器系统的性能参数（空域保持能力、可靠被监视能力、速度或高度）未及时更新信息 → 责令改正；拒不改正的，处罚款
      = 2000元以上2万元以下 (元)。

      R5: 违规类型 = 未经实名登记实施飞行活动 → 责令改正，可以处罚款 = 200元以下 (元)；情节严重的，处罚款 = 2000元以上2万元以下 (元)。

      R6: 违规类型 = 涉及境外飞行的民用无人驾驶航空器未依法进行国籍登记 → 责令改正，处罚款 = 1万元以上10万元以下 (元)。

      R7: 违规类型 = 未依法投保责任保险 → 责令改正，处罚款 = 2000元以上2万元以下 (元)；情节严重的，责令从事飞行活动的单位停业整顿直至吊销其运营合格证。

      R8: 违规类型 = 未取得运营合格证或者违反运营合格证的要求实施飞行活动 → 责令改正，处罚款 = 5万元以上50万元以下 (元)；情节严重的，责令停业整顿直至吊销其运营合格证。

      R9: 违规类型 = 无民事行为能力人、限制民事行为能力人违规操控飞行 → 对监护人处罚款 = 500元以上5000元以下 (元)；情节严重的，没收实施违规飞行的无人驾驶航空器。

      R10: 违规类型 = 未取得操控员执照操控飞行 → 处罚款 = 5000元以上5万元以下 (元)；情节严重的，处罚款 = 1万元以上10万元以下 (元)。

      R11: 违规类型 = 超出操控员执照载明范围操控飞行 → 处罚款 = 2000元以上2万元以下 (元)，并处暂扣操控员执照6个月至12个月；情节严重的，吊销其操控员执照，2年内不受理其操控员执照申请。

      R12: 违规类型 = 未取得操作证书从事常规农用无人驾驶航空器作业飞行活动 → 责令停止作业，并处罚款 = 1000元以上1万元以下 (元)。

      R13: 违规类型 = 组织飞行活动违反行为规范（第32、33条） → 责令改正，可以处罚款 = 1万元以下 (元)；拒不改正的，处罚款 = 1万元以上5万元以下
      (元)，并处暂扣运营合格证、操控员执照1个月至3个月；情节严重的，由空中交通管理机构责令停止飞行6个月至12个月，处罚款 = 5万元以上10万元以下 (元)，并可以吊销相应许可证件，2年内不受理其相应许可申请。

      R14: 违规类型 = 未经批准操控微型、轻型、小型民用无人驾驶航空器在管制空域内飞行，或者操控模型航空器在空域外飞行 → 责令停止飞行，可以处罚款 =
      500元以下 (元)；情节严重的，没收实施违规飞行的无人驾驶航空器，并处罚款 = 1000元以上1万元以下 (元)。

      R15: 违规类型 = 非法拥有、使用无人驾驶航空器反制设备 → 没收，可以处罚款 = 5万元以下 (元)；情节严重的，处罚款 = 5万元以上20万元以下
      (元)。

      R16: 违规类型 = 外国无人驾驶航空器或由外国人员操控的在我国境内实施测绘飞行活动 → 责令停止违法行为，没收违法所得、测绘成果和实施违规飞行的无人驾驶航空器，并处罚款
      = 10万元以上50万元以下 (元)；情节严重的，并处罚款 = 50万元以上100万元以下 (元)，并决定限期出境或者驱逐出境。

      注意: 罚款金额范围内的具体数值需根据实际违规情节判定，本规则仅提供法定区间。'
    params:
      violation_type:
        type: str
        description: 违规类型（未取得执照、未进行实名登记、酒精违规、未报告故障等）
      aircraft_value:
        type: float
        description: 无人机系统货值金额（用于计算比例罚款）
      is_serious_case:
        type: bool
        description: 是否属于情节严重
  assess_tunnel_importance_level:
    summary: 根据公路等级和年日均交通量判定隧道重要等级（I级、II级、III级）。
    group: 隧道应急评估
    description: 依据隧道所属公路技术等级（road_technical_level：高速、一级、二级、三级、四级）以及年日均交通量（annual_average_daily_traffic，单位：pcu/d/ln）的数值，对照标准判定隧道的隧道重要等级（tunnel_importance_level：I级、II级、III级）。
    depends_on: []
    hint: 'R1: road_technical_level = ''高速'' 且 annual_average_daily_traffic >= 100000
      (pcu/d/ln) → tunnel_importance_level = ''I级''。

      R2: road_technical_level = ''高速'' 且 10000 <= annual_average_daily_traffic <
      100000 (pcu/d/ln) → tunnel_importance_level = ''II级''。

      R3: road_technical_level = ''高速'' 且 annual_average_daily_traffic < 10000 (pcu/d/ln)
      → tunnel_importance_level = ''III级''。

      R4: road_technical_level = ''一级'' 且 annual_average_daily_traffic >= 50000 (pcu/d/ln)
      → tunnel_importance_level = ''I级''。

      R5: road_technical_level = ''一级'' 且 10000 <= annual_average_daily_traffic <
      50000 (pcu/d/ln) → tunnel_importance_level = ''II级''。

      R6: road_technical_level = ''一级'' 且 annual_average_daily_traffic < 10000 (pcu/d/ln)
      → tunnel_importance_level = ''III级''。

      R7: road_technical_level = ''二级'' 且 annual_average_daily_traffic >= 20000 (pcu/d/ln)
      → tunnel_importance_level = ''I级''。

      R8: road_technical_level = ''二级'' 且 5000 <= annual_average_daily_traffic < 20000
      (pcu/d/ln) → tunnel_importance_level = ''II级''。

      R9: road_technical_level = ''二级'' 且 annual_average_daily_traffic < 5000 (pcu/d/ln)
      → tunnel_importance_level = ''III级''。

      R10: road_technical_level = ''三级'' 且 annual_average_daily_traffic >= 10000 (pcu/d/ln)
      → tunnel_importance_level = ''I级''。

      R11: road_technical_level = ''三级'' 且 2000 <= annual_average_daily_traffic <
      10000 (pcu/d/ln) → tunnel_importance_level = ''II级''。

      R12: road_technical_level = ''三级'' 且 annual_average_daily_traffic < 2000 (pcu/d/ln)
      → tunnel_importance_level = ''III级''。

      R13: road_technical_level = ''四级'' 且 annual_average_daily_traffic >= 5000 (pcu/d/ln)
      → tunnel_importance_level = ''I级''。

      R14: road_technical_level = ''四级'' 且 1000 <= annual_average_daily_traffic <
      5000 (pcu/d/ln) → tunnel_importance_level = ''II级''。

      R15: road_technical_level = ''四级'' 且 annual_average_daily_traffic < 1000 (pcu/d/ln)
      → tunnel_importance_level = ''III级''。'
    params:
      road_technical_level:
        type: str
        description: 公路技术等级：高速、一级、二级、三级、四级
      annual_average_daily_traffic:
        type: int
        description: 年日均交通量 (pcu/d/ln)
  calculate_secondary_accident_risk_level:
    summary: 根据次生事故概率及预期损失（财产、人员、环境、社会影响）评估隧道抢通过程中的次生事故风险等级（I-IV级）。
    group: 隧道应急评估
    description: 结合次生灾害发生的概率值（occurrence_probability）和预期的损失程度（包括财产损失 property_loss、人员伤亡
      casualties、环境影响范围 environmental_impact_scope 以及社会影响规模 social_impact_scale），通过风险矩阵计算得出次生事故风险等级（I级至IV级）。该函数用于评估隧道抢通过程中的安全风险，指导应急处置决策。
    depends_on: []
    hint: 'R1: 次生事故风险等级的计算需结合 occurrence_probability (0-1) 与预期损失程度（包含 property_loss
      (元)、casualties (人)、environmental_impact_scope (str) 和 social_impact_scale (人)）进行矩阵评估。

      R2: 风险等级分为 I 级、II 级、III 级和 IV 级。

      注意: 具体的风险等级判定矩阵需参考《公路交通应急处置技术规范.md》中的 8.3.3/8.3.4 章节。'
    params:
      occurrence_probability:
        type: float
        description: 次生灾害发生的概率值 (0-1之间)
      property_loss:
        type: float
        description: 预计财产损失金额 (元)
      casualties:
        type: int
        description: 预计人员伤亡人数
      environmental_impact_scope:
        type: str
        description: 环境影响范围描述
      social_impact_scale:
        type: int
        description: 社会影响规模（需紧急转移安置的人数）
  determine_tunnel_clearance_difficulty:
    summary: 根据抢通时长评级和次生事故风险等级，判定隧道的抢通难度等级（I级、II级、III级、IV级）。
    group: 隧道应急评估
    description: '结合抢通时长评级（clearance_time_rating: A-太长, B-较长, C-基本满足, D-很短）和次生事故风险等级（secondary_risk_level:
      I级, II级, III级, IV级），对照《公路交通应急处置技术规范》标准表，确定隧道的抢通难度等级（tunnel_clearance_difficulty_level:
      I级、II级、III级、IV级）。'
    depends_on: []
    hint: 'R1: 判定逻辑需结合 clearance_time_rating 和 secondary_risk_level 进行对照标准表判定。

      R2: clearance_time_rating 的取值范围为 A(太长), B(较长), C(基本满足), D(很短)。

      R3: secondary_risk_level 的取值范围为 I级, II级, III级, IV级。

      注意: 具体的判定矩阵（即不同评级组合对应的难度等级）需严格参照《公路交通应急处置技术规范.md》中的 8.3.7 标准表执行。'
    params:
      clearance_time_rating:
        type: str
        description: 抢通时长评级：A(太长), B(较长), C(基本满足), D(很短)
      secondary_risk_level:
        type: str
        description: 次生事故风险等级：I级, II级, III级, IV级
  determine_tunnel_clearance_target:
    summary: 根据隧道重要等级和抢通难度等级确定最终的抢通目标等级。
    group: 隧道应急决策
    description: 结合隧道的隧道_importance_level（I级、II级、III级）和隧道_clearance_difficulty_level（I级、II级、III级、IV级），对照标准表确定隧道_clearance_target_level（I级：禁止通行并改道；II级：限制性通行；III级：保证基本抢险车辆通行）。
    depends_on:
    - determine_tunnel_clearance_difficulty
    - assess_tunnel_importance_level
    hint: 'R1: tunnel_clearance_target_level = I级 (禁止通行并另行改道), 当 tunnel_importance_level
      = I级 且 clearance_difficulty_level = I级 时。

      R2: tunnel_clearance_target_level = I级 (禁止通行并另行改道), 当 tunnel_importance_level
      = I级 且 clearance_difficulty_level = II级 时。

      R3: tunnel_clearance_target_level = I级 (禁止通行并另行改道), 当 tunnel_importance_level
      = II级 且 clearance_difficulty_level = I级 时。

      R4: tunnel_clearance_target_level = II级 (限制性通行), 当 tunnel_importance_level =
      II级 且 clearance_difficulty_level = II级 时。

      R5: tunnel_clearance_target_level = II级 (限制性通行), 当 tunnel_importance_level =
      III级 且 clearance_difficulty_level = I级 时。

      R6: tunnel_clearance_target_level = III级 (保证基本抢险车辆通行), 当 tunnel_importance_level
      = III级 且 clearance_difficulty_level = III级 时。

      R7: tunnel_clearance_target_level = III级 (保证基本抢险车辆通行), 当 tunnel_importance_level
      = III级 且 clearance_difficulty_level = IV级 时。

      注意: 最终抢通目标等级需对照隧道重要等级（I, II, III级）和抢通难度等级（I, II, III, IV级）的标准对照表确定。'
    params:
      tunnel_importance_level:
        type: str
        description: 隧道重要等级
      clearance_difficulty_level:
        type: str
        description: 隧道抢通难度等级
  evaluate_bridge_safety_status:
    summary: 综合评估桥梁稳定性、承载力及通行能力的损伤等级，并判定最终的通行状态。
    group: 桥涵应急评估
    description: 对桥梁的上部结构、下部结构、基础及桥面进行综合评估。输入参数包括结构整体稳定性损伤等级 (stability_damage_level)、结构承载能力损伤等级
      (load_bearing_damage_level) 以及桥面通行能力损伤等级 (traffic_capacity_damage_level)，均为
      I, II, III 级。根据损伤等级判定最终的 traffic_status（正常通行、限制通行、禁止通行）。规则：若任一指标为 III 级，则整体为禁止通行；若任一指标为
      II 级（且无 III 级），则整体为限制通行；仅当所有指标均为 I 级时，为正常通行。
    depends_on: []
    hint: 'R1: stability_damage_level = III 或 load_bearing_damage_level = III 或 traffic_capacity_damage_level
      = III → traffic_status = 禁止通行。

      R2: stability_damage_level = II 或 load_bearing_damage_level = II 或 traffic_capacity_damage_level
      = II → traffic_status = 限制通行。

      R3: stability_damage_level = I 且 load_bearing_damage_level = I 且 traffic_capacity_damage_level
      = I → traffic_status = 正常通行。

      注意: 判定遵循“就高原则”，即若任何一项损伤等级达到 III 级，则整体判定为 III 级并禁止通行。'
    params:
      stability_damage_level:
        type: str
        description: 结构整体稳定性损伤等级 (I, II, III)
      load_bearing_damage_level:
        type: str
        description: 结构承载能力损伤等级 (I, II, III)
      traffic_capacity_damage_level:
        type: str
        description: 桥面通行能力损伤等级 (I, II, III)
  select_roadbase_repair_method:
    summary: 根据无人驾驶航空器类型、任务性质（如超视距、高风险、农用）、操控员资质及酒精/药物状态，判断其是否符合飞行合规要求。
    group: 路基路面应急处置
    description: 该函数用于校验无人驾驶航空器飞行活动的合规性。需输入无人驾驶航空器的类型（微型、轻型、小型、中型、大型、农用）、飞行模式（常规、超视距、分布式操作、特定高风险运行）、操控员的资质信息（执照类型、等级、操作证书、是否携带执照、是否具备理论培训合格证明）、操控员的民事行为能力状态、以及操控员的生理状态（酒精含量、药物影响情况），以判断是否违反飞行安全及管理规定。
    depends_on: []
    hint: 'R1: 操控微型、轻型民用无人驾驶航空器飞行的人员，无需取得操控员执照，但应当熟练掌握有关机型操作方法，了解风险警示信息和有关管理制度。

      R2: 无民事行为能力人只能操控微型民用无人驾驶航空器飞行，限制民事行为能力人只能操控微型、轻型民用无人驾驶航空器飞行。

      R3: 无民事行为能力人操控微型民用无人驾驶航空器飞行或者限制民事行为能力人操控轻型民用无人驾驶航空器飞行的，应当由符合完全民事行为能力条件的人员现场指导。

      R4: 操控轻型民用无人驾驶航空器在管制空域内飞行的人员，应当具有完全民事行为能力，并通过局方规定的理论培训和考试，取得安全操控理论培训合格证明。

      R5: 操控小型、中型、大型民用无人驾驶航空器飞行的人员，应当取得局方规定的相应有效操控员执照，并在行使相应权利时随身携带该执照。

      R6: 使用最大起飞重量 <= 150kg (kg) 的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用无人驾驶航空器作业飞行活动的人员，无需取得操控员执照，但应当取得由生产者按照规定培训考核后取得的操作证书。

      R7: 实施民用无人驾驶航空器系统分布式操作的运行人，应当按照局方规定取得相应操控员执照。

      R8: 操控民用无人驾驶航空器进行超视距运行时，持有小型或中型执照的人员应当具有相应的类别、级别、型别等级以及超视距等级；持有大型执照的人员应当具有相应的类别、级别、型别等级。

      R9: 操控民用无人驾驶航空器进行涉及特定高风险的特殊运行时，应当持有相应类别、级别、型别等级的操控员执照，以及相应的特定运行安全风险等级。

      R10: 操控员在饮用任何含酒精饮料之后的 8h (h) 之内或者处在酒精作用之下，血液中酒精含量 >= 0.04% (percentage) ，或者受到任何药物影响损及工作能力时，不得担任民用无人驾驶航空器操控员。

      注意: 操控微型、轻型民用无人驾驶航空器的人员无需取得操控员执照，但需满足安全操控要求。'
    params:
      damage_type:
        type: str
        description: 损伤类型：沉陷、坍塌、水毁、滑坡、沙害等
      engineering_volume:
        type: str
        description: 工程量大小：大、中、小
      site_conditions:
        type: str
        description: 现场条件：取土方便、场地水环境敏感、地形复杂等
  match_accident_clearing_equipment:
    summary: 根据事故类型、车辆重量等级及作业需求，匹配合适的应急清障救援装备。
    group: 事故处理
    description: 根据事故类型（如碰撞、碾压、翻车、坠车、落水、烧毁、货物散落等）、事故车辆的质量等级（轻型 < 4.5t, 中型 4.5-12t,
      重型 > 12t）以及具体的作业需求（如牵拉、起吊、扶正、拖运、撑涨破拆、消防、侦检等），从应急资源库中匹配最合适的应急装备。
    depends_on: []
    hint: 'R1: 操控微型、轻型民用无人驾驶航空器飞行的人员，无需取得操控员执照，但应当熟练掌握有关机型操作方法，了解风险警示信息和有关管理制度。

      R2: 无民事行为能力人只能操控微型民用无人驾驶航空器飞行，限制民事行为能力人只能操控微型、轻型民用无人驾驶航空器飞行。

      R3: 无民事行为能力人操控微型民用无人驾驶航空器飞行或者限制民事行为能力人操控轻型民用无人驾驶航空器飞行的，应当由符合完全民事行为能力条件的完全民事行为能力人现场指导。

      R4: 操控轻型民用无人驾驶航空器在管制空域内飞行的人员，应当具有完全民事行为能力，并通过局方规定的理论培训和考试，取得安全操控理论培训合格证明。

      R5: 操控小型、中型、大型民用无人驾驶航空器飞行的人员，应当取得局方规定的相应有效操控员执照，并在行使相应权利时随身携带该执照。

      R6: 使用最大起飞重量 <= 150kg (kg) 的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用无人驾驶航空器作业飞行活动的人员，无需取得操控员执照，但应当取得由生产者按照规定培训和考核后取得的操作证书。

      R7: 实施民用无人驾驶航空器系统分布式操作的运行人，应当按照局方规定取得相应操控员执照。

      R8: 操控民用无人驾驶航空器进行超视距运行时，持有小型或中型执照的人员应当具有相应的类别、级别、型别等级及超视距等级；持有大型执照的人员应当具有相应的类别、级别、型别等级。

      R9: 操控民用无人驾驶航空器进行涉及特定高风险的特殊运行时，应当持有相应类别、级别、型别等级的操控员执照，以及相应的特定运行安全风险等级。

      R10: 操控员在饮用任何含酒精饮料之后的 8h (h) 之内或者血液中酒精含量 >= 0.04% (percentage)，或者受到任何药物影响损及工作能力时，不得担任操控员。

      注意: 操控微型、轻型民用无人驾驶航空器飞行的人员，无需取得操控员执照，但需满足安全操控要求。'
    params:
      accident_type:
        type: str
        description: 事故类型
      vehicle_weight_class:
        type: str
        description: 车辆重量等级：轻型(<4.5t), 中型(4.5-12t), 重型(>12t)
      operation_mode:
        type: str
        description: 作业方式：牵拉、起吊、扶正、拖运、破拆等
  calculate_emergency_response_reporting_deadline:
    summary: 根据突发事件级别（I级至IV级）判定公路应急组织机构完成信息上报的时限要求。
    group: 指挥调度
    description: 依据输入的突发事件级别（event_level，取值为 'I级', 'II级', 'III级', 'IV级'），对照《公路交通应急处置技术规范.md》中的规定，计算并返回公路应急组织机构应当在多长时间内完成信息上报的具体时限。
    depends_on: []
    hint: 'R1: event_level = ''I级'' → 判定结果为 ''I级'' 对应的上报时限。

      R2: event_level = ''II级'' → 判定结果为 ''II级'' 对应的上报时限。

      R3: event_level = ''III级'' → 判定结果为 ''III级'' 对应的上报时限。

      R4: event_level = ''IV级'' → 判定结果为 ''IV级'' 对应的上报时限。

      注意: 判定逻辑需严格依据《公路交通应急处置技术规范.md》中关于不同级别事件对应的具体时间要求进行匹配。'
    params:
      event_level:
        type: str
        description: 事件级别：I级, II级, III级, IV级
  assess_roadbase_damage_level:
    summary: 根据路基路面、防护及支挡的损伤等级，按单项最大原则评估路段整体损伤等级。
    group: 路基路面抢通
    description: 根据路基路面损伤等级 (roadbase_damage_level)、路基防护损伤等级 (protection_damage_level)
      和路基支挡损伤等级 (support_damage_level) 三个维度的等级（I, II, III），按照“单项最大原则”确定受损路段 (RoadSegment)
      的整体评估损伤等级。具体逻辑：若任一项目为 III 级，整体为 III 级；若无 III 级但存在 II 级，整体为 II 级；若全部项目均为 I 级，则整体为
      I 级。
    depends_on: []
    hint: 'R1: 整体损伤等级 = max(roadbase_damage_level, protection_damage_level, support_damage_level)。

      R2: 若 roadbase_damage_level = ''III'' 或 protection_damage_level = ''III'' 或
      support_damage_level = ''III''，则整体损伤等级 = ''III''。

      R3: 若任一项目不为 ''III'' 但存在 ''II'' 级，则整体损伤等级 = ''II''。

      R4: 若全部项目均为 ''I'' 级，则整体损伤等级 = ''I''。'
    params:
      roadbase_damage_level:
        type: str
        description: 路基路面损伤等级 (I, II, III)
      protection_damage_level:
        type: str
        description: 路基防护损伤等级 (I, II, III)
      support_damage_level:
        type: str
        description: 路基支挡损伤等级 (I, II, III)
  determine_roadbase_clearance_suggestion:
    summary: 根据路基路面损伤等级（I, II, III）确定受损路段的抢通建议。
    group: 路基路面抢通
    description: 依据输入的路基路面损伤等级 (damage_level)，按照规程要求明确受损路基路面的抢通建议。损伤等级 I 对应观察通行；损伤等级
      II 对应限制通行并加强观测；损伤等级 III 对应禁止通行并实施抢通。
    depends_on: []
    hint: 'R1: damage_level = ''I'' → 建议为 ''观察通行''。

      R2: damage_level = ''II'' → 建议为 ''限制通行并加强观测''。

      R3: damage_level = ''III'' → 建议为 ''禁止通行并实施抢通''。'
    params:
      damage_level:
        type: str
        description: 路基路面损伤等级 (I, II, III)
  evaluate_bridge_overall_damage_level:
    summary: 根据桥梁稳定性、承载能力及通行能力的最高损伤等级，评估并确定桥梁整体损伤等级。
    group: 桥涵抢通
    description: 根据桥梁的三个单项损伤等级（稳定性损伤等级 stability_damage_level、承载能力损伤等级 load_bearing_damage_level、车辆通行能力损伤等级
      traffic_capacity_damage_level）来确定桥梁的整体评估损伤等级。评估逻辑遵循“就高不就低”原则：若任一单项为 III 级，整体即为
      III 级；若无 III 级但存在 II 级，整体即为 II 级；若全部为 I 级，整体则为 I 级。
    depends_on: []
    hint: 'R1: 整体损伤等级 = max(stability_damage_level, load_bearing_damage_level, traffic_capacity_damage_level)。

      R2: 若 stability_damage_level, load_bearing_damage_level, traffic_capacity_damage_level
      中任一单项为 ''III''，则整体损伤等级 = ''III''。

      R3: 若无单项为 ''III''，但存在单项为 ''II''，则整体损伤等级 = ''II''。

      R4: 若全部单项均为 ''I''，则整体损伤等级 = ''I''。'
    params:
      stability_damage_level:
        type: str
        description: 整体稳定损伤等级 (I, II, III)
      load_bearing_damage_level:
        type: str
        description: 承载能力损伤等级 (I, II, III)
      traffic_capacity_damage_level:
        type: str
        description: 车辆通行能力损伤等级 (I, II, III)
  evaluate_tunnel_overall_damage_level:
    summary: 根据隧道各部位损伤等级评估隧道整体损伤等级。
    group: 隧道抢通
    description: 根据隧道洞口边仰坡 (slope_damage_level)、洞门 (door_damage_level)、衬砌 (lining_damage_level)、路面
      (roadway_damage_level)、吊顶预埋件 (hanging_part_damage_level) 以及涌水突泥 (water_seepage_damage_level)
      的单项最大损伤等级来确定受损隧道的整体损伤等级。判定逻辑：若任一项目为 III 级，整体为 III 级；若全部项目均为 I 级，整体为 I 级；其余情况整体为
      II 级。
    depends_on: []
    hint: 'R1: 若 slope_damage_level, door_damage_level, lining_damage_level, roadway_damage_level,
      hanging_part_damage_level, water_seepage_damage_level 中任一项目 = ''III''，则整体损伤等级
      = ''III''。

      R2: 若上述所有项目均为 ''I''，则整体损伤等级 = ''I''。

      R3: 除上述两种情况外，整体损伤等级 = ''II''。'
    params:
      slope_damage_level:
        type: str
        description: 洞口边仰坡损伤等级 (I, II, III)
      door_damage_level:
        type: str
        description: 洞门损伤等级 (I, II, III)
      lining_damage_level:
        type: str
        description: 衬砌损伤等级 (I, II, III)
      roadway_damage_level:
        type: str
        description: 路面损伤等级 (I, II, III)
      hanging_part_damage_level:
        type: str
        description: 吊顶预埋件损伤等级 (I, II, III)
      water_seepage_damage_level:
        type: str
        description: 涌水突泥损伤等级 (I, II, III)
  match_roadbase_repair_equipment:
    summary: 根据路基路面受损类别及处置措施，匹配相应的应急装备物资。
    group: 应急物资保障
    description: 根据输入的受损类别（damage_category，如路基沉陷开裂、路基坍塌、路基水毁、滑坡体阻塞、崩塌落石、泥石流掩埋、沙害、低温雨雪冰冻等）以及对应的处置措施（treatment_measure，如机械回填、路基拓宽、注浆加固、填筑土石料、凹形竖曲线法、机械清淤、铺设制式路面等），从应急物资库中检索并匹配最合适的应急装备物资（EmergencyResource）。
    depends_on: []
    hint: 'R1: 当 damage_category = ''路基沉陷开裂'' 或 ''路基坍塌'' 或 ''路基水毁'' 时，应匹配包含 ''机械回填''、''注浆加固''
      或 ''填筑土石料'' 等处置措施的 EmergencyResource。

      R2: 当 damage_category = ''滑坡体阻塞'' 或 ''泥石流掩埋'' 时，应匹配包含 ''机械清淤'' 或 ''土方机械'' 等处置措施的
      EmergencyResource。

      R3: 当 damage_category = ''崩塌落石'' 时，应匹配包含 ''机械清淤'' 或 ''土方机械'' 等处置措施的 EmergencyResource。

      R4: 当 damage_category = ''沙害'' 时，应匹配包含 ''清沙车'' 等处置措施的 EmergencyResource。

      R5: 当 damage_category = ''低温雨雪冰冻'' 时，应匹配包含 ''除冰雪装备'' 等处置措施的 EmergencyResource。

      注意: 匹配时需综合考虑 damage_category 与 treatment_measure 的逻辑关联，确保所选 EmergencyResource
      的 application_scenario 与受损场景匹配。'
    params:
      damage_category:
        type: str
        description: 受损类别（如：路基沉陷开裂、路基坍塌、路基水毁、滑坡体阻塞、崩塌落石、泥石流掩埋、沙害、低温雨雪冰冻）
      treatment_measure:
        type: str
        description: 处置措施（如：机械回填、路基拓宽、注浆加固、填筑土石料、凹形竖曲线法、机械清淤、铺设制式路面等）
  match_bridge_repair_equipment:
    summary: 根据桥涵受损类型及处置措施，匹配所需的应急装备物资。
    group: 应急物资保障
    description: 根据输入的桥涵受损类型（damage_type，如：垮塌、严重受损、承载力等级、渡河需求等）及预期的处置措施（treatment_measure，如：便道、便桥、临时铺垫、临时支撑、防落梁、桥上架桥、快速补强、纠偏、抗冲击、渡河、索道等），从应急物资库中筛选并匹配最合适的应急装备（EmergencyResource）。匹配逻辑应综合考虑装备的类别（equipment_category）、应用场景（application_scenario）、通行保障能力（traffic_guarantee_capacity）以及资源细分类型（resource_sub_category）。
    depends_on: []
    hint: 'R1: 匹配逻辑应基于 damage_type（桥涵受损类型）与 treatment_measure（处置措施）的组合，从 EmergencyResource
      集合中筛选符合条件的 equipment_category 或 application_scenario 的装备。

      R2: 匹配结果应优先考虑满足特定处置措施需求的装备，例如：若 treatment_measure 为“渡河”，则应匹配 equipment_category
      为“舟桥”或“机械化桥”的资源。

      R3: 若 damage_type 涉及“承载力等级”或“渡河需求”，应结合 equipment_name 或 traffic_guarantee_capacity（通行保障能力）进行精细化匹配。

      注意: 匹配时需兼顾 resource_sub_category（资源细分类型）中的“桥梁装备”或“作业辅助物资”以提高匹配准确度。'
    params:
      damage_type:
        type: str
        description: 桥涵受损类型（如：垮塌、严重受损、承载力等级、渡河需求等）
      treatment_measure:
        type: str
        description: 处置措施（如：便道、舟桥、机械化桥、装配式桥、临时支撑、快速补强等）
  match_tunnel_repair_equipment:
    summary: 根据无人驾驶航空器类型、飞行场景及任务性质，匹配并校验操控员的执照、等级及资质要求。
    group: 应急物资保障
    description: 根据无人驾驶航空器的分类（微型、轻型、小型、中型、大型）、飞行模式（视距内、超视距）、运行场景（常规农用、高风险特殊运行、管制空域、融合飞行）以及操控员的资质状态（执照类型、等级、体检合格证、酒精/药物状态），匹配所需的操控员资质要求及安全操控规则。
    depends_on: []
    hint: 'R1: 操控微型民用无人驾驶航空器飞行的人员，无需取得操控员执照，但应当保持视距内飞行。

      R2: 操控轻型民用无人驾驶航空器在管制空域内飞行的人员，应当具有完全民事行为能力，并取得安全操控理论培训合格证明。

      R3: 操控小型、中型、大型民用无人驾驶航空器飞行的人员，应当取得局方规定的相应有效操控员执照，并在行使相应权利时随身携带该执照。

      R4: 使用最大起飞重量不超过150千克的农用无人驾驶航空器在农林牧渔区域上方的适飞空域内从事常规农用无人驾驶航空器作业飞行活动的人员，无需取得操控员执照，但应当取得操作证书。

      R5: 操控民用无人驾驶航空器进行超视距运行时，应当持有相应类别、级别和型别等级的操控员执照，并具备相应的超视距等级。

      R6: 操控民用无人驾驶航空器进行涉及特定高风险的特殊运行时，应当持有相应类别、级别和型别等级的操控员执照，以及相应的特定运行安全风险等级。

      R7: 操控员在饮用任何含酒精饮料之后的8小时之内或者处在酒精作用之下，血液中酒精含量 >= 0.04%，或者受到任何药物影响损及工作能力时，不得担任操控员。

      R8: 操控小型、中型、大型民用无人驾驶航空器飞行的人员，应当具备完全民事行为能力，无可能影响操控行为的疾病病史，无吸毒行为记录，且近5年内无因危害国家安全、公共安全或扰乱公共秩序的故意犯罪受到刑事处罚的记录。

      注意: 无民事行为能力人只能操控微型民用无人驾驶航空器飞行，限制民事行为能力人只能操控微型、轻型民用无人驾驶航空器飞行，且应当由符合条件的完全民事行为能力人现场指导。'
    params:
      damage_location:
        type: str
        description: 受损部位（如：洞口边仰坡、洞门、衬砌、路面、吊顶预埋件、涌水突泥等）
      treatment_measure:
        type: str
        description: 处置措施（如：临时支挡、清除障碍物、管道排水、集中抽排、补强加固、封堵涌水等）
  generate_detour_plan:
    summary: 当受损公路基础设施短期内无法抢通时，根据线路信息、通行状况及灾情评估结果制定绕行方案。
    group: 应急决策
    description: 在公路交通应急抢通过程中，若经研判确定受损公路基础设施在一定时限内无法实现应急抢通，则需要调用此函数。该函数通过整合绕行线路名称
      (detour_route_name)、线路起讫点 (start_point)、线路通行状况 (traffic_status) 以及受损公路路段的基础信息
      (RoadSegment) 和灾情评估结果，来制定科学的绕行方案，以保障交通连续性。
    depends_on: []
    hint: 'R1: 制定绕行方案的前提条件是：在现场应急抢通流程中，判断“一定时限内实现应急抢通”的结果为“否”。

      R2: 制定绕行方案的依据应包括：绕行线路名称 (detour_route_name)、线路起讫点 (start_point)、线路通行状况 (traffic_status)、受损公路基础信息
      (RoadSegment) 及灾情评估结果。

      注意: 制定绕行方案属于“应急决策”阶段，贯穿于应急抢通全过程。'
    params:
      detour_route_name:
        type: str
        description: 绕行线路名称
      start_point:
        type: str
        description: 线路起讫点
      traffic_status:
        type: str
        description: 线路通行状况
