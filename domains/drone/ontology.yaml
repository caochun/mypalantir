  generate_event_information_report:
    summary: 按照首报要快、续报要准、终报要全的原则，生成灾情信息报告（首报/续报/终报），包含事件基本信息、处置进展、发展趋势等。
    group: 信息报送
    description: 根据报告类型（首报、续报、终报）生成灾情信息报告。首报需快速报送事件基本信息（事件类型、时间、地点、来源、性质、影响范围、损害程度、伤亡、趋势、措施、报送单位、联系人、电话）；续报需准确补充事件起因、性质详情、基本过程、下一步计划；终报需全面汇总所有信息。所有报告必须关联事件标识（event_id）。
    depends_on: []
    hint: 'R1: 报告类型为“首报”时，应遵循“首报要快”原则，优先报送事件基本信息，包括事件类型、事件时间、事件地点、信息来源、事件性质、影响范围、损害程度、人员伤亡和失踪情况、发展趋势、已采取的措施、信息报送单位、联系人、联系电话。

      R2: 报告类型为“续报”时，应遵循“续报要准”原则，在首报基础上补充事件起因、事件性质详细描述、基本过程、下一步工作计划。

      R3: 报告类型为“终报”时，应遵循“终报要全”原则，在续报基础上汇总所有信息，确保完整。

      注意: 所有报告类型均需包含事件标识（event_id）以关联事件。'
    params:
      report_type:
        type: str
        description: 报告类型：首报、续报、终报
      event_id:
        type: str
        description: 事件标识
