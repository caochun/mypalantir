name: drone
description: 领域本体，包含 16 个对象类型（EmergencyEvent, RoadSegment, Bridge, Tunnel, EmergencyResource
  等）
objects:
  EmergencyEvent:
    summary: 突发事件记录，包含事件性质、级别、发生时间、地点、影响范围及损害程度等核心信息
    description: 突发事件记录，包含事件性质、级别、发生时间、地点、影响范围及损害程度等核心信息
    properties:
      event_level:
        type: str
        description: 事件等级：特别重大、重大、较大、一般
      event_nature:
        type: str
        description: 事件性质，如自然灾害、事故灾难、公共卫生和社会安全事件
      casualties:
        type: int
        description: 人员伤亡人数
      missing_persons:
        type: int
        description: 失踪人数
      economic_loss:
        type: float
        description: 直接经济损失金额
      event_type:
        type: str
        description: 事件类型：普通交通事故、火灾及爆炸、隧道土建结构破坏（自然灾害导致）等
      impact_range_description:
        type: str
        description: 灾情影响范围（地点、范围）
      event_id:
        type: str
        description: 事件唯一标识符
  RoadSegment:
    summary: 公路路段，包含公路编号、技术等级、起讫桩号、位置坐标及路基/路面类型等基础信息
    description: 公路路段，包含公路编号、技术等级、起讫桩号、位置坐标及路基/路面类型等基础信息
    properties:
      road_id:
        type: str
        description: 路段编号
        required: true
      road_name:
        type: str
        description: 路段名称
      road_management_unit:
        type: str
        description: 管理单位名称
      road_technical_level:
        type: str
        description: 公路技术等级：高速、一级、二级、三级、四级、其他
      road_type:
        type: str
        description: 路基类型：填方路基、挖方路基、半填半挖路基、其他
      pavement_type:
        type: str
        description: 路面类型：沥青路面、水泥混凝土路面、砂石路面、其他
      lane_count:
        type: int
        description: 车道数量
      traffic_direction:
        type: str
        description: 通行方式：单向、双向
      bridge_id_list:
        type: list[str]
        description: 该路段包含的所有桥梁ID列表
      tunnel_id_list:
        type: list[str]
        description: 该路段包含的所有隧道ID列表
  Bridge:
    summary: 桥梁及涵洞设施，包含桥型、结构型式、材质、受损部位及损伤等级等详细信息
    description: 桥梁及涵洞设施，包含桥型、结构型式、材质、受损部位及损伤等级等详细信息
    properties:
      bridge_id:
        type: str
        description: 桥梁唯一标识/编号
        required: true
      stability_damage_level:
        type: str
        description: 结构整体稳定性损伤等级：I级（轻微损伤）、II级（中等损伤）、III级（严重损伤或坍塌）
      load_bearing_damage_level:
        type: str
        description: 结构承载能力损伤等级：I级（无损伤或轻微损伤）、II级（中等损伤）、III级（严重损伤或坍塌）
      traffic_capacity_damage_level:
        type: str
        description: 桥面通行能力损伤等级：I级（无损伤或轻微损伤）、II级（中等损伤）、III级（严重损伤或坍塌）
      traffic_status:
        type: str
        description: 通行状态：正常通行、限制通行、禁止通行
      bridge_type:
        type: str
        description: 桥型类型：公路、连续、拱、缆索、连续刚构、其他
      structural_form:
        type: str
        description: 结构型式：简支、连续、悬臂、桁架、其他
      bridge_length:
        type: float
        description: 桥梁总长，单位：米 (m)
      pier_type:
        type: str
        description: 墩台材质：混凝土、圬工、钢、其他
      bearing_type:
        type: str
        description: 支座类型：板式、盆式、球型、摆柱式、钢、其他
      road_id:
        type: str
        description: 所属路段的编号
  Tunnel:
    summary: 隧道设施，包含洞口边坡、洞门、衬砌、路面、吊顶预埋件等部位的损伤等级和状态
    description: 隧道设施，包含洞口边坡、洞门、衬砌、路面、吊顶预埋件等部位的损伤等级和状态
    properties:
      tunnel_id:
        type: str
        description: 隧道唯一标识/编号
        required: true
      tunnel_importance_level:
        type: str
        description: 隧道重要等级：I级、II级、III级（根据道路等级和年日均交通量确定）
      tunnel_clearance_difficulty_level:
        type: str
        description: 隧道抢通难度等级：I级、II级、III级、IV级
      tunnel_clearance_target_level:
        type: str
        description: 隧道抢通目标等级：I级（禁止通行并另行改道）、II级（限制性通行）、III级（保证基本抢险车辆通行）
      technical_status_category:
        type: str
        description: 技术状况评定类别：1-3类（好至中等破损）、4类（严重破损）、5类（危险状态）
      oxygen_concentration:
        type: float
        description: 隧道内氧气浓度，单位：%
      tunnel_type:
        type: str
        description: 隧道类型：山岭隧道、水下隧道、其他
      tunnel_length:
        type: float
        description: 隧道长度，单位：米 (m)
      tunnel_width:
        type: float
        description: 隧道宽度，单位：米 (m)
      tunnel_height:
        type: float
        description: 隧道高度，单位：米 (m)
      tunnel_longitudinal_slope:
        type: str
        description: 隧道纵坡：人字坡、单向坡、折线坡、U形坡
      tunnel_lining_status:
        type: str
        description: 衬砌支护状态：裸洞、喷锚支护、复合式衬砌、管片、管节、其他
      water_seepage_status:
        type: str
        description: 涌水突泥检查情况：涌突水侵占路面及限界、排水系统堵塞、二次衬砌渗漏水、最大涌水量变化、涌水含泥含砂量等
      road_id:
        type: str
        description: 所属路段的编号
  EmergencyResource:
    summary: 应急装备与物资，分为通用型和专用型，包含类型、规格、数量及当前储备状态
    description: 应急装备与物资，分为通用型和专用型，包含类型、规格、数量及当前储备状态
    properties:
      resource_category:
        type: str
        description: 资源类别：应急队伍、应急装备、应急物资、运输工具
      is_emergency_reserve:
        type: bool
        description: 是否为储备资源
      resource_weight_level:
        type: str
        description: 装备重量等级：微型（<1t）、轻型（1t-12t）、中型（12t-30t）、重型（>30t）
      deployment_method:
        type: str
        description: 部署方式：人力携行、自行运输、陆地运输、空中运输
      resource_sub_category:
        type: str
        description: 资源细分类型：侦察装备、桥梁装备、除冰雪装备、排水装备、多功能救援装备、人员防护物资、生活保障物资、作业辅助物资等
      equipment_name:
        type: str
        description: 装备名称（如：21m机械化桥、CB300型装配式桥、铝合金板等）
        required: true
      equipment_category:
        type: str
        description: 装备类别：舟桥、机械化桥、应急路面、装配式桥
      application_scenario:
        type: str
        description: 应用场景描述
      traffic_guarantee_capacity:
        type: str
        description: 通行保障能力（含跨度、车行道宽度、最大承载能力、连续流速等）
      setup_efficiency:
        type: str
        description: 架设时效（含作业人数、完成时间）
      other_considerations:
        type: str
        description: 其他限制因素（如温度范围、运输条件、场地要求等）
      resource_id:
        type: str
        description: 资源唯一标识
  EmergencyTeam:
    summary: 应急救援队伍，包含队伍类型（专业/兼职）、分布位置及所属单位
    description: 应急救援队伍，包含队伍类型（专业/兼职）、分布位置及所属单位
    properties:
      team_type:
        type: str
        description: 队伍类型：专业、兼职
      specialization:
        type: str
        description: 专业领域：建、管、养、运、应急等
      team_id:
        type: str
        description: 队伍唯一标识
  ResponseAction:
    summary: 应急响应记录，记录响应级别（一级至四级）、启动时间、牵头司局及当前状态（进行中/终止）
    description: 应急响应记录，记录响应级别（一级至四级）、启动时间、牵头司局及当前状态（进行中/终止）
    properties:
      response_level:
        type: str
        description: 响应等级：一级、二级、三级、四级
      response_type:
        type: str
        description: 响应类型：防御响应、应急响应
      lead_department:
        type: str
        description: 牵头司局/单位名称
      status:
        type: str
        description: 当前状态：进行中、终止、调整
  InspectionRecord:
    summary: 现场检查记录，包含检查人员、时间、设施损伤详情（桩号、类型、程度）及抢通建议
    description: 现场检查记录，包含检查人员、时间、设施损伤详情（桩号、类型、程度）及抢通建议
    properties:
      inspection_location:
        type: str
        description: 事故发生位置（起止桩号、运行方向、位置信息）
        required: true
      road_condition:
        type: str
        description: 路面状况描述
      weather_condition:
        type: str
        description: 周边气象环境（温度、天气状况如雾、冰雪、霜、雨等）
      inspection_team_id:
        type: str
        description: 检查组编号
      inspection_personnel:
        type: str
        description: 检查人员姓名
      inspection_unit:
        type: str
        description: 所属单位
      inspection_id:
        type: str
        description: 检查记录唯一标识
  UnmannedAircraft:
    summary: 无人驾驶航空器，包含型号、性能参数、实名登记信息及适航状态
    description: 无人驾驶航空器，包含型号、性能参数、实名登记信息及适航状态
    properties:
      aircraft_category:
        type: str
        description: 无人驾驶航空器性能指标分类：微型、轻型、小型、中型、大型
      empty_weight:
        type: float
        description: 空机重量，单位：千克 (kg)
      max_takeoff_weight:
        type: float
        description: 最大起飞重量，单位：千克 (kg)
      max_horizontal_speed:
        type: float
        description: 最大平飞速度，单位：千米/小时 (km/h)
      max_flight_altitude:
        type: float
        description: 最大飞行真高，单位：米 (m)
      product_id:
        type: str
        description: 唯一产品识别码
      is_agricultural_use:
        type: bool
        description: 是否为农用无人驾驶航空器（用于植保、播种、投饵等农林牧渔作业）
      max_flight_radius:
        type: float
        description: 最大飞行半径（仅限农用无人驾驶航空器），单位：米 (m)
      has_airspace_maintenance_capability:
        type: bool
        description: 是否具备空域保持能力（通过电子围栏等技术措施控制高度与水平范围的能力）
      has_reliable_surveillance_capability:
        type: bool
        description: 是否具备可靠被监视能力
      registration_number:
        type: str
        description: 实名登记号，由8位阿拉伯数字、罗马体大写字母或二者组合而成
        required: true
      nationality_mark:
        type: str
        description: 国籍标志，中华人民共和国民用无人驾驶航空器为罗马体大写字母 B
      aircraft_category_type:
        type: str
        description: 适航批准类别：正常类、运输类、限用类
      manufacturer_name:
        type: str
        description: 生产者名称
      serial_number:
        type: str
        description: 出厂序号/制造序列号
      owner_name:
        type: str
        description: 无人驾驶航空器的所有者名称
  Pilot:
    summary: 操控员，包含执照类型、等级（小型/中型/大型）、超视距等级及资质有效期
    description: 操控员，包含执照类型、等级（小型/中型/大型）、超视距等级及资质有效期
    properties:
      civil_capacity_status:
        type: str
        description: 民事行为能力状态：完全民事行为能力人、限制民事行为能力人、无民事行为能力人
      has_criminal_record:
        type: bool
        description: 近5年内是否有因危害国家安全、公共安全等故意犯罪受到刑事处罚的记录
      has_drug_use_record:
        type: bool
        description: 是否有吸毒行为记录
      is_trained_for_agricultural_use:
        type: bool
        description: 是否取得农用无人驾驶航空器操作证书
      license_type:
        type: str
        description: 操控员执照类型：小型、中型、大型
        required: true
      category_level:
        type: str
        description: 类别等级，包括：飞机、飞艇、滑翔机、旋翼飞行器、动力升空器、自由气球、特殊类
      type_rating:
        type: str
        description: 型别等级，指针对特定型号航空器的签注
      instructor_rating:
        type: bool
        description: 是否具有教员等级
      medical_certificate_status:
        type: str
        description: 体检合格证状态：有效、受限、失效
      license_expiry_date:
        type: str
        description: 执照有效期截止日期
      blood_alcohol_content:
        type: float
        description: 血液中酒精含量（g/L），禁止在含量 $\ge$ 0.04% 时操控
  WeatherWarning:
    summary: 气象灾害预警信息，用于触发防御响应
    description: 气象灾害预警信息，用于触发防御响应
    properties:
      warning_name:
        type: str
        description: 预警名称，如台风、暴雨、大雾等
        required: true
      warning_level_color:
        type: str
        description: 预警级别颜色：红色、橙色、黄色、蓝色
      wind_force:
        type: int
        description: 预计中心风力等级（级）
      impact_area:
        type: str
        description: 影响范围（地点、范围）
  ProjectSafetyRisk:
    summary: 公路水运工程项目风险隐患点
    description: 公路水运工程项目风险隐患点
    properties:
      risk_location:
        type: str
        description: 风险部位，如大型围堰、高边坡、深基坑、挂篮、瓦斯隧道、沉箱浮运安装、桥梁猫道等
        required: true
      risk_type:
        type: str
        description: 风险类型：自然灾害、生产安全事故隐患
  FlightActivityApplication:
    summary: 无人驾驶航空器飞行活动申请记录
    description: 无人驾驶航空器飞行活动申请记录
    properties:
      applicant_name:
        type: str
        description: 组织飞行活动的单位或者个人名称
        required: true
      task_nature:
        type: str
        description: 飞行任务性质（如：巡检、勘察、校验、紧急任务等）
      flight_mode:
        type: str
        description: 飞行方式（如：常规飞行、集群飞行、分布式操作等）
      takeoff_location:
        type: str
        description: 起飞机场或场地
        required: true
      landing_location:
        type: str
        description: 降落机场或场地
        required: true
      planned_start_time:
        type: str
        description: 预计飞行开始时刻
        required: true
      planned_end_time:
        type: str
        description: 预计飞行结束时刻
        required: true
      flight_route:
        type: str
        description: 飞行航线描述
      flight_altitude:
        type: float
        description: 飞行高度，单位：米 (m)
      flight_speed:
        type: float
        description: 飞行速度，单位：千米/小时 (km/h)
      control_link_frequency:
        type: str
        description: 指挥控制链路无线电频率
      operation_category:
        type: str
        description: 运行分类：开放类、特定类、审定类
      business_type:
        type: str
        description: 经营种类：载客类、载人类、载货类、培训类、其他类
      assigned_pilot_name:
        type: str
        description: 申请中指定的操控员姓名
      target_aircraft_id:
        type: str
        description: 申请中拟使用的无人机唯一识别码
  OperatingCertificate:
    summary: 民用无人驾驶航空器运营合格证及运营规范
    description: 民用无人驾驶航空器运营合格证及运营规范
    properties:
      certificate_id:
        type: str
        description: 运营合格证编号
        required: true
      holder_name:
        type: str
        description: 合格证持有人名称
        required: true
      base_address:
        type: str
        description: 主运行基地地址
      validity_period:
        type: str
        description: 生效日期和有效期
      approved_operation_types:
        type: str
        description: 被批准的运行种类（如：留空飞行、航线飞行、其他飞行）
      approved_business_types:
        type: str
        description: 被批准的经营种类
  AirspaceControlZone:
    summary: 无人驾驶航空器管制空域信息
    description: 无人驾驶航空器管制空域信息
    properties:
      zone_id:
        type: str
        description: 空域标识/ID
        required: true
      zone_type:
        type: str
        description: 空域类型：管制空域、适飞空域
        required: true
      spatial_range:
        type: str
        description: 空间范围描述
        required: true
      effective_time:
        type: str
        description: 有效时间段
      is_temporary:
        type: bool
        description: 是否为临时管制空域
      restricted_aircraft_category:
        type: str
        description: 该空域限制的无人机类别
  TrafficAccident:
    summary: 道路交通事故记录，包含事故类型、规模、处理需求及处理时限等信息
    description: 道路交通事故记录，包含事故类型、规模、处理需求及处理时限等信息
    properties:
      accident_type:
        type: str
        description: 事故类型：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
        required: true
      accident_scale_level:
        type: str
        description: 事故规模等级：I级（特大）、II级（重大）、III级（较大）、IV级（一般）
      handling_demand_level:
        type: str
        description: 处理需求等级：特大事故、重大事故、较大事故、一般事故
      handling_time_limit:
        type: str
        description: 应急处理时限：I级(>=12h)、II级(6-12h)、III级(3-6h)、IV级(<=3h)
      hazardous_material_present:
        type: bool
        description: 是否涉及危险化学品
      accident_location:
        type: str
        description: 事故发生的具体位置/路段编号
links:
  emergency_event_occurs_on_road_segment:
    source: EmergencyEvent
    target: RoadSegment
    join:
      source_key: impact_range_description
      target_key: road_id
    description: 突发事件发生在特定的公路路段上
  road_segment_contains_bridge:
    source: RoadSegment
    target: Bridge
    join:
      source_key: road_id
      target_key: road_id
